zás csapdájába esett: túl hosszú lett, sokat módosult, és számos ágazat kikerült a hatálya alól, így elveszítette általános jellegét. A Ket.-et 2018. január 1-jétől az általános közigazgatási rendtartásról szóló 2016. évi CL. törvény (Ákr.) váltotta fel, amely a szolgáltató állam jegyében az egyszerűségre, közérthetőségre és tömörségre törekszik, és valódi általános kódexként csak a minden eljárásban közös szabályokat rögzíti.","hv":"5.1.2 és 5.2.1 (3511-3635. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"15/7","pont":15,"q":"Ismertesse a közigazgatási eljárásjog fejlődése tekintetében releváns uniós és nemzetközi tendenciákat!","ks":["jó közigazgatás","alapjogi charta","41. cikk","megfelelő ügyintézés","európa tanács","cm/rec(2007)7","helyes hivatali magatartás európai kódexe","lisszaboni szerződés","reneual","uniós közigazgatási eljárási kódex","európai parlament állásfoglalása","esetjog","tisztességes eljárás"],"mv":"A tagállami közigazgatási eljárásjogot számos uniós és nemzetközi dokumentum befolyásolja. Az Európa Tanács Miniszteri Bizottsága 2007-ben fogadta el a Jó közigazgatásról szóló CM/rec(2007)7. ajánlást és 'A jó közigazgatás kódexét'. Az uniós primer jogforrások közül kiemelkedik az Alapjogi Charta, amelyet a Lisszaboni Szerződés ruházott fel kötelező erővel; a Charta 41. cikke a megfelelő ügyintézés alapelvét fogalmazza meg. Jelentős a Helyes hivatali magatartás európai kódexe, valamint a Bíróság joggyakorlata (esetjog). Az Európai Parlament 2013-as és 2016-os állásfoglalásaiban egy uniós közigazgatási eljárási kódex megalkotását szorgalmazta, a kutatói hálózat (ReNEUAL) Modell Szabályokat dolgozott ki.","hv":"5.2.1 (3650-3722. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"15/8","pont":15,"q":"Ismertesse az Ákr. alanyi (szervi és személyi) hatályát!","ks":["alanyi hatály","szervi hatály","személyi hatály","hatóság","ügyfél","eljárás egyéb résztvevője","ex lege ügyfél","ügyfélképesség","eljárási képesség","cselekvőképesség","jogutódlás","jogos érdek","hatósági nyilvántartás","hatósági ellenőrzés"],"mv":"Az Ákr. alanyi hatálya (szervi és személyi hatály) azt mutatja meg, milyen eljárási szereplőkre kell alkalmazni a törvényt. Az eljárás főszemélyei a hatóság és az ügyfél, mellettük az eljárás egyéb résztvevői (tanú, hatósági tanú, szakértő, tolmács, szemletárgy birtokosa, ügyfél képviselője) vesznek részt. Hatóság az a szerv, szervezet vagy személy, amelyet törvény, kormányrendelet vagy önkormányzati rendelet hatósági hatáskör gyakorlására jogosít fel. Ügyfél az a természetes vagy jogi személy, egyéb szervezet, akinek jogát vagy jogos érdekét az ügy közvetlenül érinti, akire a hatósági nyilvántartás adatot tartalmaz, vagy akit hatósági ellenőrzés alá vontak. Törvény vagy kormányrendelet ex lege ügyfélfogalmat is megállapíthat. Az ügyféllé válást befolyásolja az ügyfélképesség és az eljárási képesség, kieső ügyfél esetén pedig a jogutódlás szabályai.","hv":"5.2.3 (4190-4337. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"15/9","pont":15,"q":"Mutassa be a kérelem hatósághoz történő benyújtásának szabályait!","ks":["kérelem","benyújtás","írásban","személyesen","elektronikus út","kormányablak","illetékes hatóság","kérelem tartalma","azonosító adatok","hiánypótlás","áttétel","kérelem visszautasítása","kapcsolódó eljárás","kérelem módosítása"],"mv":"A kérelem az ügyfél olyan nyilatkozata, amellyel hatósági eljárás lefolytatását vagy a hatóság döntését kéri jogának, jogos érdekének érvényesítése érdekében. Főszabályként a kérelmet írásban (a Dáptv. szerinti elektronikus úton is) vagy személyesen lehet előterjeszteni; a szóbeli kérelemről jegyzőkönyvet vagy feljegyzést kell készíteni. A kérelem előterjesztésének helye az illetékes hatóság vagy a kormányablak. A kérelem tartalmazza az ügyfél és képviselője azonosításához szükséges adatokat és elérhetőségüket; nem kérhető szakhatósági állásfoglalás csatolása, illetve közhiteles nyilvántartásban szereplő adat. Ha a kérelem hiányos, egy ízben hiánypótlásra hívható fel az ügyfél. Az ügyfél a kérelmét addig módosíthatja, visszavonhatja, amíg a döntés közlése iránt a hatóság nem intézkedik.","hv":"5.4.1 (5037-5300. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"15/10","pont":15,"q":"Mutassa be az automatikus döntéshozatali eljárás és a sommás eljárás szabályait!","ks":["automatikus döntéshozatal","sommás eljárás","teljes eljárás","huszonnégy óra","nyolc nap","tényállás tisztázott","ellenérdekű ügyfél","mérlegelést nem igényel","dáptv","hiánytalan kérelem","egyszerű megítélésű ügy","emberi közbeavatkozás nélkül","átfordulás teljes eljárássá"],"mv":"Az Ákr. három eljárásfajtát különböztet meg: az automatikus döntéshozatali, a sommás és a teljes eljárást. Automatikus döntéshozatalnak van helye, ha a Dáptv. szerinti feltételek fennállnak és nincs ellenérdekű ügyfél, vagy ha azt törvény/kormányrendelet megengedi, minden adat rendelkezésre áll, a döntés mérlegelést nem igényel és nincs ellenérdekű ügyfél; ekkor a szerv emberi közbeavatkozás nélkül hoz döntést (határidő 24 óra). Sommás eljárásnak van helye, ha a hiánytalanul előterjesztett kérelem és a hatóság rendelkezésére álló adatok alapján a tényállás tisztázott, és nincs ellenérdekű ügyfél (határidő 8 nap). Ha valamely feltétel hiányzik, a hatóság teljes eljárásra tér át; a sommás eljárás is teljes eljárássá fordul, ha az ügyfél új bizonyítékot terjeszt elő vagy bizonyítási indítványt tesz.","hv":"5.4.2 (5303-5413. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"15/11","pont":15,"q":"Ismertesse az általános és a speciális ügyintézési határidőre vonatkozó szabályokat!","ks":["ügyintézési határidő","automatikus döntéshozatal","huszonnégy óra","sommás eljárás nyolc nap","teljes eljárás hatvan nap","az eljárás megindulásának napja","hosszabb határidő csak törvény","soron kívül","belső határidő","felfüggesztés","szünetelés","ügyfél mulasztása","díj megfizetése","testületi szerv"],"mv":"Az ügyintézési határidő – ha törvény eltérően nem rendelkezik – az eljárás megindulásának napján kezdődik. Az általános ügyintézési határidő automatikus döntéshozatal esetén huszonnégy óra, sommás eljárásban nyolc nap, teljes eljárásban hatvan nap; ezek a döntés közlését is magukban foglalják. A teljes eljárásnál hosszabb határidőt csak törvény írhat elő, rövidebbet bármilyen jogszabály. Az ügyet soron kívül kell intézni például kiskorú érdekeinek veszélyeztetettsége, életveszély vagy súlyos kár, ideiglenes biztosítási intézkedés esetén. Az ügyintézési határidőbe nem számít be a felfüggesztés, szünetelés és az ügyfél mulasztásának vagy késedelmének időtartama. Belső határidőként az egyes eljárási cselekményeket azonnal, de legkésőbb nyolc napon belül kell teljesíteni. A határidő túllépése esetén a hatóság a díjnak megfelelő, ennek hiányában tízezer forint összeget fizet a kérelmezőnek.","hv":"5.4.4 (5472-5598. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"15/12","pont":15,"q":"Ismertesse az eljárási költség viselésének szabályait!","ks":["eljárási költség","költségviselés","akinél felmerült","jogellenes magatartás","egyetemleges felelősség","jogvitás eljárás","arányos viselés","megkereső hatóság","fordítási tolmácsolási költség","hatóság viseli","kérelem elutasítása","ellenérdekű ügyfél"],"mv":"Az eljárási költség mindaz a költség, ami az eljárás során felmerül. Az általános szabály szerint, ha törvény eltérően nem rendelkezik, az eljárás költségeit az viseli, akinél azok felmerültek; az eljárás résztvevője viseli a jogellenes magatartásával okozott költségeket; az olyan költséget, amelynek viselésére senki sem kötelezhető, az eljáró hatóság viseli. Több azonos érdekű ügyfél egyetemlegesen felelős. A jogvitás eljárásban a hatóság a kérelem elutasítása esetén a kérelmezőt, a helyt adó döntés esetén az ellenérdekű ügyfelet kötelezi; részben helyt adó döntésnél arányos viselésre kötelez. A megkeresett szerv költségét a megkereső hatóság téríti meg, a fordítási és tolmácsolási költséget bizonyos esetekben az eljáró hatóság viseli.","hv":"5.10 a) pont (8290-8333. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/1","pont":10,"q":"Mutassa be, miért speciális a többi jogterülethez képest a közigazgatási hatósági eljárás szabályozottsága!","ks":["közigazgatási hatósági eljárás","anyagi jog","eljárási jog","általános eljárási kódex","ákr","nincs általános anyagi kódex","szakigazgatási ágazat","ágazati törvény","általános szabályok","speciális szabályok","alaki jogi norma","kódex jelleg"],"mv":"A közigazgatási hatósági eljárás szabályozottsága azért speciális, mert a közigazgatási jogban – más jogterületekkel ellentétben – nincs általános anyagi jogi kódex (mint a Ptk. vagy a Btk.), hiszen a közigazgatás több száz szakigazgatási ágazatot ölel fel, amelyeket lehetetlen lenne egyetlen törvénykönyvbe foglalni; minden ágazatnak megvan a saját anyagi szabályrendszere (ágazati törvény). Ezzel szemben a közigazgatási jognak van egy általános alaki, eljárási kódexe, az Ákr., amely a közigazgatási hatósági eljárás általános szabályait határozza meg. Az ágazati jogszabályok az Ákr.-től eltérő, speciális szabályokat csak akkor állapíthatnak meg, ha azt az Ákr. kifejezetten megengedi.","hv":"5.1.1 (3384-3433. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/2","pont":10,"q":"Ismertesse a jogi normák szerkezeti elemeit!","ks":["jogi norma szerkezete","tényállás","hipotézis","feltétel","rendelkezés","diszpozíció","joghátrány","szankció","pozitív parancs","negatív parancs","kógens","diszpozitív","vagyoni szankció","személyi szankció","érvénytelenségi szankció"],"mv":"A jogi normák szerkezetükre nézve három elemből állnak: a tényállás (hipotézis), a rendelkezés (diszpozíció) és a joghátrány (szankció). A hipotézis (feltétel) egy tényállást jelöl, amely bekövetkezése esetén a jogalkotó magatartást ír elő vagy tilt meg. A diszpozíció (rendelkezés) tartalmazza azt a magatartást, amelyet a hipotézisben körülírt tényállás megvalósulása esetére ír elő; lehet pozitív parancs, negatív parancs vagy felhatalmazás. A parancsoló, tiltó rendelkezés kógens, a megengedő diszpozitív. A szankció (jogkövetkezmény) háromféle lehet: vagyoni, személyi és érvénytelenségi szankció.","hv":"1.1.3 (294-339. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/3","pont":10,"q":"Ismertesse a jogforrás fogalmát és fő típusait!","ks":["jogforrás","belső jogforrás","anyagi jogforrás","külső jogforrás","alaki jogforrás","jogalkotó szerv","megjelenési forma","hazai jog","nemzetközi jog","európai unió joga","döntési forma","jogalkotó hatáskör"],"mv":"A jogforrások egyrészt meghatározzák, hogy a jogi rendelkezések honnan erednek és mely szervek alkotják, másrészt hogy honnan ismerhetők meg. Megkülönböztetünk belső (anyagi) jogforrást, amely a normát létrehozó jogalkotó szervet jelenti (pl. Országgyűlés, Kormány, MNB elnöke), és külső (alaki) jogforrást, vagyis az alkotott norma megjelenési formáját (a tárgyiasult forma). A magyar jogrendszer három jogrend forrásaiból épül fel: a hazai (belső) jog, a nemzetközi jog és az Európai Unió jogrendje.","hv":"2. fejezet bevezetés (345-379. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/4","pont":10,"q":"Ismertesse a jogszabályi hierarchiát!","ks":["jogszabályi hierarchia","jogforrási hierarchia","alaptörvény","törvény","kormányrendelet","mnb elnökének rendelete","miniszteri rendelet","önálló szabályozó szerv rendelete","önkormányzati rendelet","alacsonyabb szintű nem lehet ellentétes","érvénytelenség","zárt rendszer"],"mv":"A jogforrási hierarchia szélesebb kategória, mint a jogszabályi hierarchia: az előbbi az állam összes jogforrásának viszonyát rendezi, az utóbbi csak a jogalkotó szervek által alkotott jogszabályok közötti viszonyt. A jogszabályi hierarchia lényege, hogy az alacsonyabb szinten álló jogszabály nem lehet ellentétes a magasabb szintűvel, különben érvénytelen. A magyar jogszabályok hierarchiája felülről lefelé: törvények; a Kormány rendelete és az MNB elnökének rendelete; a Kormány tagjainak (miniszterelnöki, miniszteri) rendelete; az önálló szabályozó szerv vezetőjének rendelete; a helyi önkormányzat rendelete. A jogforrások élén az Alaptörvény áll, amellyel egy jogszabály sem lehet ellentétes.","hv":"2.1 bevezetés (414-441. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/5","pont":10,"q":"Ismertesse az Országgyűlés törvényhozó hatáskörének fő jellegzetességeit! (Milyen tárgykörökben és milyen szótöbbséggel alkothat törvényt az Országgyűlés?) Hozzon fel példákat a lehetséges esetekre!","ks":["országgyűlés","univerzális törvényhozó hatáskör","törvény","fenntartott törvényhozási tárgykör","kizárólagos törvényhozási tárgykör","sarkalatos törvény","kétharmad","jelen lévő képviselők többsége","alapvető jogok","bűncselekmény meghatározása","sarkalatossági záradék"],"mv":"Az Országgyűlés univerzális törvényhozó hatáskörrel rendelkezik: törvénnyel bármilyen tárgykört, bármilyen tartalommal, részletességgel szabályozhat. Léteznek fenntartott (kifejezett) törvényhozási tárgykörök, ahol legalább a legmagasabb szinten törvényt kell alkotni (pl. alapvető jogok és kötelezettségek), de végrehajtási rendelet kiadható. A kizárólagos törvényhozási tárgykörökben mindent törvénnyel kell szabályozni, végrehajtási rendelet nélkül (pl. a bűncselekmények és büntetésük meghatározása). Az Országgyűlés főszabály szerint a jelen lévő képviselők többségének szavazatával alkot törvényt, az Alaptörvényben meghatározott tárgykörökben pedig a jelen lévő képviselők kétharmadának szavazatával: ezek a sarkalatos törvények, amelyeket sarkalatossági záradékban jelölnek meg.","hv":"2.1.3.1 (669-737. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/6","pont":10,"q":"Ismertesse a jogszabály érvényességének fogalmát és a jogszabály létrejöttéhez szükséges feltételeket!","ks":["érvényesség","jogi hatás kifejtésére alkalmas","eljárási szabályok betartása","jogszabályi hierarchia","arra jogosult szerv","kihirdetés","magyar közlöny","közjogi érvénytelenség","súlyos hibáktól mentes","négy feltétel együttes megvalósulása"],"mv":"A jogszabály érvényessége a jogszabály súlyos hibáktól mentes létezését, jogi hatás kifejtésére való alkalmasságát jelenti; az érvényességnek nincs mértéke, egy jogszabály vagy érvényes, vagy nem. A jogszabály érvényes létrejöttéhez négy feltétel együttes megvalósulása szükséges: 1) a vonatkozó eljárási szabályok betartása a jogalkotási eljárás során, 2) a jogszabályi hierarchiának való megfelelőség, 3) az arra jogosult személy vagy szerv általi megalkotás, 4) a megfelelő formában történő kihirdetés (a jogszabályokat – az önkormányzati rendelet kivételével – a Magyar Közlönyben). E kellékek hiánya a jogszabály közjogi érvénytelenségét eredményezi.","hv":"2.4.1 (1385-1473. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/7","pont":10,"q":"Ismertesse a jogszabályok hatályát (a hatály fogalma, fajtái)!","ks":["hatály","alkalmazhatóság","időbeli hatály","területi hatály","alanyi hatály","személyi hatály","szervi hatály","tárgyi hatály","vacatio legis","hatálybalépés","visszaható hatály tilalma","hatályon kívül helyezés"],"mv":"A jogszabály hatálya általában a jogszabály alkalmazhatóságát és alkalmazandóságát jelöli, vagyis azt, hogy adott időben, területen és személyekre nézve keletkezhetnek jogviszonyok. Fajtái: az időbeli hatály (a hatálybalépéstől a megszűnésig; az érvényessé válás és a hatálybalépés közötti idő a vacatio legis, érvényesül a visszaható hatály tilalma), a területi hatály (központi jogszabálynál Magyarország területe, önkormányzati rendeletnél a közigazgatási terület), az alanyi hatály (személyi hatály: mely természetes és jogi személyekre háríthat jogokat és kötelezettségeket; szervi hatály: mely szervek alkalmazzák), valamint a tárgyi hatály (milyen típusú ügyekben kell alkalmazni).","hv":"2.4.2 (1550-1735. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/8","pont":10,"q":"Ismertesse a jogszabályalkotás alapvető követelményeit az Alkotmánybíróság gyakorlata és a jogalkotási törvény alapján!","ks":["jogszabályalkotás követelményei","jogbiztonság","normavilágosság","alaptörvényi követelmények","jogrendszer egysége","nemzetközi és uniós jog","szakmai követelmények","felhatalmazás","salátatörvény","alkotmánybíróság gyakorlata","kiszámíthatóság","előreláthatóság","nem párhuzamos szabályozás"],"mv":"A Jat. szerint biztosítani kell, hogy a jogszabály megfeleljen az Alaptörvényből eredő tartalmi és formai követelményeknek, illeszkedjen a jogrendszer egységébe, megfeleljen a nemzetközi és uniós jogból eredő kötelezettségeknek, valamint a jogalkotás szakmai követelményeinek. A szabályozás nem lehet indokolatlanul párhuzamos vagy többszintű, és nem ismételhető meg magasabb szintű norma. Az Alkotmánybíróság gyakorlata szerint a legfontosabb követelmény a jogbiztonság elve, amely megköveteli, hogy a jogszabályok világosak, egyértelműek, kiszámíthatóak és előre láthatóak legyenek (normavilágosság követelménye). Az AB szerint a 'salátatörvények' gyakorlata alkotmányossági aggályokat vethet fel, ezért a jogszabályok szerkesztésének észszerűnek és áttekinthetőnek kell lennie.","hv":"2.4.3 (1738-1849. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/9","pont":10,"q":"Ismertesse a közjogi szervezetszabályozó eszközöket (jellemzői, fajtái, tárgyköre, kibocsátóik)!","ks":["közjogi szervezetszabályozó eszköz","normatív határozat","normatív utasítás","közzététel","nem mindenkire kötelező","meghatározott címzetti kör","saját szervezet és működés","országgyűlés","kormány","miniszterelnök","központi államigazgatási szerv vezetője","magyar közlöny","jogszabállyal nem lehet ellentétes"],"mv":"A közjogi szervezetszabályozó eszközök a jogszabályok mellett sajátos normák; a Jat. ezek körét két formára szűkítette: a normatív határozatra és a normatív utasításra. Jellemzőjük, hogy általánosan kötelező magatartási szabályt nem állapíthatnak meg, csak meghatározott címzetti körre (a kibocsátó saját, illetve vezetése, irányítása vagy felügyelete alá tartozó szerveire) nézve kötelezőek; nem 'kihirdetik', hanem 'közzéteszik' (főszabály szerint a Magyar Közlönyben). Egyetlen jogszabállyal sem lehetnek ellentétesek. Normatív határozatot adhat ki pl. az Országgyűlés, a Kormány, az Alkotmánybíróság, a Költségvetési Tanács, valamint az önkormányzat képviselő-testülete – tárgya a saját szervezet, működés, tevékenység, cselekvési program. Normatív utasítást adhat ki pl. a köztársasági elnök, a miniszterelnök, a központi államigazgatási szerv vezetője, az OBH elnöke, a legfőbb ügyész, az MNB elnöke.","hv":"2.1.6 (1142-1280. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/10","pont":10,"q":"Ismertesse a dereguláció fogalmát, fajtáit, valamint a Jat.-nak a deregulációval kapcsolatos rendelkezéseit!","ks":["dereguláció","túlszabályozottság","technikai dereguláció","tartalmi dereguláció","kiüresedett jogszabály","deregulációs célú jogszabály","elavult szükségtelenné vált","automatikus dereguláció","öntisztítás","jogbiztonság","felülvizsgálat","végrehajtottá válás"],"mv":"A dereguláció az a jogalkotói tevékenység, amelynek célja és eredménye a jogi túlszabályozottság mérséklése, mivel a túlszabályozottság a jog megismerhetőségének korlátozásával a jogbiztonság sérelmére vezet. Két fajtája van: a technikai dereguláció a normatív tartalom nélküli, kiüresedett jogszabályoktól tisztítja meg a jogrendszert (a normatartalom változása nélkül), a tartalmi dereguláció pedig szakmai vizsgálatot igényel annak eldöntéséhez, hogy egy szabályozásra nincs szükség. A Jat. szerint deregulációs célú jogszabály keretében kell hatályon kívül helyezni vagy módosítani az elavult, szükségtelenné vált, a jogrendszerbe nem illeszkedő, kiüresedett vagy indokolatlanul párhuzamos rendelkezéseket. A Jat. rögzíti az automatikus deregulációt is: a végrehajtottá vált módosító és hatályon kívül helyező rendelkezés a törvény erejénél fogva, külön aktus nélkül hatályát veszti.","hv":"3.3 (2507-2556. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/11","pont":10,"q":"Ismertesse, hogy mikor kell átmeneti rendelkezést alkotni, és mit lehet abban előírni!","ks":["átmeneti rendelkezés","szabályozási átmenet","új szabályozás","átmeneti időszak","eltérő szabályok alkalmazása","korábbi szabályozás","záró rendelkezések","konkrét teendők","joghatás","régi szabályozás alkalmazása"],"mv":"Átmeneti rendelkezéseket akkor kell alkotni, ha az új szabályozás szükségessé teszi, hogy egy átmeneti időszakban a jogszabály hatálya alá tartozó meghatározott esetekben a rendes rendelkezésektől eltérő szabályokat kelljen alkalmazni, továbbá ha a szabályozás bevezetéséhez szükséges konkrét teendőkről kell intézkedni. Az átmeneti rendelkezésben elő lehet írni, hogy az átmeneti időszakban a hatálybalépés előtt bekövetkezett jogi tények értékelésénél is az új szabályozást kell figyelembe venni; az adott jogszabály rendelkezéseit még nem kell alkalmazni; azokat meghatározott eltérésekkel kell alkalmazni; helyettük a korábbi szabályozást kell alkalmazni; vagy helyettük az átmeneti rendelkezésekben meghatározott szabályokat kell alkalmazni. Az átmeneti rendelkezések a záró rendelkezések közé tartoznak.","hv":"3.4.3 4.c) pont (3074-3090. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/12","pont":10,"q":"Határozza meg a sommás eljárás, az automatikus döntéshozatali eljárás, illetve a teljes eljárás összefüggéseit!","ks":["sommás eljárás","automatikus döntéshozatali eljárás","teljes eljárás","egyszerű megítélésű ügy","ellenérdekű ügyfél","tényállás tisztázott","feszes eljárási forma","mérlegelés nélkül","átfordulás","klasszikus eljárás","minden eljárás sommásként indul"],"mv":"A három eljárástípus szorosan összefügg. Főszabály szerint minden eljárás sommás eljárásként vagy automatikus döntéshozatali eljárásként indul; ezek az egyszerű megítélésű ügyekben alkalmazható feszes eljárási formák. Automatikus döntéshozatalnál minden adat rendelkezésre áll, a döntés mérlegelést nem igényel és nincs ellenérdekű ügyfél (emberi közbeavatkozás nélküli, 24 órás döntés). Sommás eljárásnál a hiánytalan kérelem alapján a tényállás tisztázott és nincs ellenérdekű ügyfél (8 nap). Ha valamely feltétel hiányzik, a hatóság a teljes eljárásra tér át, amely a klasszikus közigazgatási eljárási forma (60 nap), minden eljárási részcselekménnyel. A sommás eljárás teljes eljárássá fordul, ha az ügyfél új bizonyítékot vagy bizonyítási indítványt terjeszt elő; emellett a döntés közlését követő öt napon belül az ügyfél kérheti a teljes eljárásban való elbírálást.","hv":"5.4.2 (5351-5413. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/13","pont":10,"q":"Ismertesse a határidő számítására vonatkozó szabályokat!","ks":["határidő számítása","napokban megállapított határidő","nem számít bele a kezdőnap","hónapokban években megállapított","órákban megállapított","munkaszünet","következő munkanap","postára adás napja","igazolási kérelem","szubjektív határidő","objektív határidő","negyvenöt nap"],"mv":"A napokban megállapított határidőbe nem számít bele a határidő kezdetére okot adó cselekmény, a közlés, kézbesítés, hirdetmény közzétételének napja. A hónapokban vagy években megállapított határidő azon a napon jár le, amely számánál fogva megfelel a kezdőnapnak, ha hiányzik, a hónap utolsó napján. Az órákban megállapított határidő az okot adó cselekményt követő óra első percében kezdődik. Ha a határidő utolsó napja munkaszüneti nap, a határidő – az ügyintézési határidő kivételével – a következő munkanapon jár le. A postán küldött beadvány előterjesztési ideje a postára adás napja, és a határidőt kétség esetén megtartottnak kell tekinteni. Aki határidőt önhibáján kívül elmulasztott, igazolási kérelmet terjeszthet elő a tudomásszerzéstől (szubjektív határidő), de legfeljebb 45 napon belül (objektív határidő).","hv":"5.4.4 (5547-5598. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/14","pont":10,"q":"Mi az alakszerű döntés? Mutassa be az alakszerű döntés részeit és térjen ki az egyes részek kötelező elemeire is!","ks":["alakszerű döntés","azonosító rész","fejrész","rendelkező rész","indokolás","záró rész","hitelesítő rész","hatóság döntése","szakhatóság állásfoglalása","jogorvoslati tájékoztatás","eljárási költség","tényállás","bizonyítékok","jogszabályhelyek megjelölése"],"mv":"Az alakszerű döntés az a hatósági döntés, amely valamennyi kötelező tartalmi és formai elemet tartalmazza. Négy alapvető részből áll: az azonosító (fej)rész, a rendelkező rész, az indokolás és a záró (hitelesítő) rész. Az azonosító rész tartalmazza az eljáró hatóság, az ügyfelek és az ügy azonosításához szükséges adatokat (a zártan kezelt és védett adatok kivételével). A rendelkező rész tartalmazza a hatóság döntését, a szakhatóság állásfoglalását, a jogorvoslat igénybevételével kapcsolatos tájékoztatást és a felmerült eljárási költséget. Az indokolás tartalmazza a teljes eljárásra áttérés indokát, a megállapított tényállást, a bizonyítékokat, a szakhatósági állásfoglalás indokolását, a mérlegelés és a döntés indokait, valamint az azt megalapozó jogszabályhelyek megjelölését. A záró részben a döntést alá kell írni és rá kell vezetni a meghozatal dátumát.","hv":"5.5.1 (6457-6510. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/15","pont":10,"q":"Ismertesse az egyszerűsített döntés fogalmát, jellemzőit!","ks":["egyszerűsített döntés","kötelező elemek elhagyása","jogorvoslati tájékoztatás mellőzése","jogszabályhelyek megjelölése","kérelemnek teljes egészében helyt ad","nincs ellenérdekű ügyfél","egyezség jóváhagyása","önálló jogorvoslattal nem támadható végzés","indokolás"],"mv":"Egyszerűsített döntésről akkor beszélünk, ha az alakszerű döntés kötelező elemei közül egyesek elhagyhatók. Két csoportját különböztetjük meg. Az első esetben a jogorvoslatról való tájékoztatást mellőzni lehet, és az indokolásban csak az azt megalapozó jogszabályhelyek megjelölését kell feltüntetni: ha a hatóság a kérelemnek teljes egészében helyt ad, és nincs ellenérdekű ügyfél (vagy a döntés annak jogát nem érinti), illetve az egyezség jóváhagyásáról szóló döntésnél. A második esetben az önálló jogorvoslattal nem támadható végzésről hozható egyszerűsített döntés, amelynek indokolása csak az azt megalapozó jogszabályhelyek megjelölését tartalmazza.","hv":"5.5.1 (6508-6521. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/16","pont":10,"q":"Ismertesse a jogszerű hallgatásról tanultak arra vonatkozó szabályait, amikor a kérelmezett jog az ügyfelet a hallgatás eredményeként megilleti!","ks":["jogszerű hallgatás","kérelmezett jog megilleti","ügyintézési határidőn belül","mellőzi a határozathozatalt","automatikus döntéshozatal","sommás eljárás","teljes eljárás","nincs ellenérdekű ügyfél","megszerzett jog rávezetése","törvény vagy kormányrendelet"],"mv":"Jogszerű hallgatásról akkor beszélünk, ha az ügyfelet megilleti a kérelmezett jog gyakorlása, és a hatóság az ügyintézési határidőn belül mellőzi a határozathozatalt. Erre akkor kerülhet sor, ha automatikus döntéshozatali eljárásban intézhető ügyben törvény vagy kormányrendelet nem zárja ki; sommás eljárásban intézhető ügyben törvény vagy kormányrendelet így rendelkezik; teljes eljárásban törvény vagy kormányrendelet így rendelkezik és nincs ellenérdekű ügyfél. Ilyenkor a hatóság a megszerzett jogot rávezeti a kérelemre és annak az ügyfél birtokában lévő másolati példányára, vagy a hatóságnál lévő példányról másolatot ad ki.","hv":"5.5.1 (6531-6542. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/17","pont":10,"q":"Ismertesse, hogy mi az az eljárási cselekmény, amellyel elérhető, hogy a döntés joghatás kiváltására alkalmas legyen és annak tartalmát az érintettek megismerjék! Mutassa be, hogy ennek a jogintézménynek milyen módozatai vannak!","ks":["közlés","kézbesítés","joghatás kiváltása","döntés megismerése","érvényességi feltétel","elektronikus út","szóban","hirdetmény","kézbesítési ügygondnok","közhírré tétel","hatósági kézbesítő","kézbesítési meghatalmazott"],"mv":"A közlés az az eljárási cselekmény, amellyel a döntés joghatás kiváltására alkalmassá válik és tartalmát az érintettek megismerik; a közlés a hatósági döntés érvényességi feltétele. A határozatot a hatóság közli az ügyféllel, azzal, akire nézve rendelkezést tartalmaz, és az eljárt szakhatósággal; a végzést azzal, akire nézve rendelkezést tartalmaz, és akinek jogát vagy jogos érdekét érinti. A közlés módozatai: elektronikus úton; szóban; nem az Ákr.-ben meghatározott feltételeknek megfelelő módon; kézbesítés útján; hatósági kézbesítő általi kézbesítés útján; hirdetmény útján; kézbesítési ügygondnok igénybevételével; közhírré tétel útján. A közlés napja az írásbeli vagy szóbeli közlés napja, illetve a hirdetmény honlapon történő közzétételét követő tizenötödik nap.","hv":"5.5.4 (6638-6802. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/18","pont":10,"q":"Ismertesse a kézbesítési vélelemre és az annak megdöntésére irányadó szabályokat!","ks":["kézbesítési vélelem","nem kereste","ismeretlen","elköltözött","második megkísérlés napja","ötödik munkanap","átvétel megtagadása","megdönthető vélelem","kifogás","tizenöt nap","negyvenöt nap","nem volt szabályszerű","önhibán kívüli ok","igazolási kérelem"],"mv":"A kézbesítési vélelem szerint a nem elektronikusan közölt iratot a kézbesítés megkísérlésének napján kézbesítettnek kell tekinteni, ha a címzett az átvételt megtagadta. Ha a kézbesítés sikertelen volt, és az irat 'nem kereste' jelzéssel érkezett vissza, az iratot a kézbesítés második megkísérlésének napján; ha 'ismeretlen' vagy 'elköltözött' jelzéssel, a megkísérlés napját követő ötödik munkanapon kell kézbesítettnek tekinteni. A kézbesítési vélelem megdönthető: a címzett a tudomásszerzéstől számított tizenöt napon belül, de legkésőbb a közléstől számított negyvenöt napon belül kifogást terjeszthet elő. A hatóság akkor ad helyt, ha a kézbesítés nem volt szabályszerű, vagy az iratot más, önhibáján kívüli okból nem volt módja átvenni. A kifogást főszabály szerint csak természetes személy terjesztheti elő; helyt adás esetén az igazolási kérelem szabályait kell alkalmazni.","hv":"5.5.4 kézbesítési vélelem (6706-6742. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/19","pont":10,"q":"Mutassa be a hatósági nyilvántartásra vonatkozó szabályokat!","ks":["hatósági nyilvántartás","közhiteles hatósági nyilvántartás","jog keletkeztetése módosítása megszüntetése","közhitelű igazolás","vélelem","jóhiszeműség","bejegyzett adat fennáll","törölt adat nem áll fenn","határozatnak kell tekinteni","hivatalbóli bejegyzés","véglegessé válás"],"mv":"A hatóság a jogszabályban meghatározott adatokról hatósági nyilvántartást vezet, ha a bejegyzés, módosítás vagy törlés az ügyfél jogait és kötelezettségeit keletkezteti, módosítja vagy szünteti meg, vagy ha a nyilvántartás célja a benne foglalt adatok közhitelű igazolása (ez utóbbi a közhiteles hatósági nyilvántartás). A nyilvántartásba bejegyzést határozatnak kell tekinteni. A hatósági nyilvántartásba történő hivatalbóli, mérlegelés nélküli bejegyzésre a határozatra vonatkozó rendelkezéseket nem kell alkalmazni, és a döntés a bejegyzés napján véglegessé válik. A jogorvoslati határidő akkor kezdődik, amikor a bejegyzés tényét vagy a megtagadásról szóló határozatot az ügyféllel közölték. Közhitelesség esetén az ellenkező bizonyításáig vélelmezni kell a bejegyzett adat fennállását, a törölt adat fenn nem állását és a jóhiszeműen jogot szerző jóhiszeműségét.","hv":"5.6 c) pont (7048-7099. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/20","pont":10,"q":"Ismertesse a hatósági bizonyítvány és a hatósági igazolvány szabályait!","ks":["hatósági bizonyítvány","hatósági igazolvány","tény állapot adat igazolása","kérelemre induló","felhasználás célja","rendszeres igazolás","jogszabályban meghatározott esetben","visszavonás","kiadás megtagadása","határozatnak kell tekinteni","adat- és jogigazolási funkció"],"mv":"A hatósági bizonyítvány kiadása kérelemre induló eljárás, amelynek tárgya valamely tény, állapot vagy egyéb adat igazolása; tartalma kizárólag igazolás lehet, közvetlenül jogot vagy kötelezettséget nem teremt. Az ügyfélnek meg kell jelölnie a felhasználás célját. Ha a hatóság a bizonyítványt visszavonja, a határozatot meg kell küldeni annak a szervnek is, amelynek eljárásában az ügyfél azt felhasználta. Valótlan vagy a hatóság rendelkezésére nem álló adat esetén a hatóság a kiadást megtagadja. A hatósági igazolványt a hatóság jogszabályban meghatározott esetben és adattartalommal az ügyfél adatainak vagy jogainak rendszeres igazolására adja ki; abban különbözik a bizonyítványtól, hogy rendszeres adat- és jogigazolási funkciója van, és tartalmát jogszabály pontosan meghatározza (pl. személyazonosító igazolvány). Mindkettő határozatnak minősül.","hv":"5.6 a) és b) pont (6937-7046. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/21","pont":10,"q":"Mutassa be a hatósági ellenőrzésre vonatkozó Ákr. fejezet szabályozásának jellemzőit, kitérve a hatósági ellenőrzés, mint tevékenységfajta jellegzetességeire is!","ks":["hatósági ellenőrzés","nem hatósági ügy","önálló tevékenységfajta","jogszabályi rendelkezések betartása","végrehajtható döntés teljesítése","elkülönült cselekménysor","ákr szabályait alkalmazni kell","ellenőrzött ügyféli minősége","ellenőrzési kötelezettség","hivatalbóli eljárás szabályai"],"mv":"A hatósági ellenőrzés olyan sajátos, hatóság által hatósági jogkörben végzett tevékenység, amelyet az Ákr. önálló fejezetben szabályoz. A hatósági ellenőrzés nem minősül hatósági ügynek, azonban az Ákr. szabályait (a fejezetben foglalt eltérésekkel) alkalmazni kell rá; az ellenőrzés alá vont személyt ügyféli jogok illetik meg. A hatósági ellenőrzés önálló közigazgatási tevékenységfajta: elkülönült, részleges (nem teljes) hatósági cselekménysor, amelyet jogsértés megállapítása esetén egy másik (hatósági vagy más) eljárás követ, jogsértés hiányában pedig lezárul. A hatóságok egy részének ellenőrzési kötelezettsége van: ellenőrzi a jogszabályi rendelkezések betartását és a végrehajtható döntésben foglaltak teljesítését. A hatósági ellenőrzés hivatalból indul, és a hivatalbóli eljárás szabályai szerint folytatja le a hatóság.","hv":"5.7 (7102-7163. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/22","pont":10,"q":"Ismertesse a hatósági ellenőrzés lefolytatásának (megindításának és lezárásának) szabályait!","ks":["hatósági ellenőrzés megindítása","hatósági ellenőrzés lezárása","hivatalból indul","ügyfél kérheti","jogsértés tapasztalása","hatósági eljárás megindítása","más szerv eljárásának kezdeményezése","hatósági bizonyítvány","jogsértés nincs","nyolc napon belül","folyamatos ellenőrzési feladat"],"mv":"A hatósági ellenőrzés lefolytatásánál két szakaszt különböztetünk meg: a megindítást és a lezárást. A hatósági ellenőrzés hivatalból indul meg, és a hatóság a hivatalbóli eljárás szabályai szerint folytatja le; az ügyfél is kérheti, kivéve például, ha már folyamatban van ellenőrzés, ha a hatóság folyamatosan lát el ellenőrzést, vagy ha egy éven belül lefolytatott ellenőrzése jogsértést nem tárt fel. A lezárás attól függ, tapasztal-e a hatóság jogsértést: ha igen, megindítja a közigazgatási hatósági eljárást, vagy ha a jogsértés más szerv illetékességébe tartozik, annak eljárását kezdeményezi (a megindításról azonnal, de legkésőbb nyolc napon belül gondoskodik). Ha az ügyfél kérelmére lefolytatott ellenőrzés során nincs jogsértés, erről hatósági bizonyítványt állít ki; a hivatalból folytatott ellenőrzés eredményéről az ügyfél kérelmére állít ki bizonyítványt.","hv":"5.7 (7157-7219. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/23","pont":10,"q":"Mutassa be a hivatalból induló eljárásokra vonatkozó szabályozást!","ks":["hivatalbóli eljárás","ex officio","kérelemre induló szabályok eltérésekkel","első eljárási cselekmény napja","okot adó körülmény","bíróság kötelezte","felügyeleti szerv utasította","életveszély súlyos kár","jogszabály előírja","értesítés","ügy ura a hatóság"],"mv":"A hivatalbóli eljárásokban az Ákr.-nek a kérelemre indult eljárásokra vonatkozó rendelkezéseit a hivatalbóli eljárásokra vonatkozó fejezetben foglalt eltérésekkel kell alkalmazni. A hivatalbóli eljárás megindítása ex officio történik, ahhoz nem szükséges semmilyen kérelem vagy jognyilatkozat az ügyfél részéről. A hatóság az illetékességi területén hivatalból megindítja az eljárást, ha az eljárás megindítására okot adó körülmény jut a tudomására, erre bíróság kötelezte vagy felügyeleti szerve utasította, életveszéllyel vagy súlyos kárral fenyegető helyzetről szerez tudomást, vagy ezt egyébként jogszabály előírja. A hivatalbóli eljárás az első eljárási cselekmény elvégzésének napján kezdődik (szemben a kérelemre indulóval, ahol a kérelem megérkezése az időpont). Az eljárás megindításáról a hatóság értesíti az ismert ügyfelet.","hv":"5.8 (7249-7332. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/24","pont":10,"q":"Mutassa be a hivatalból induló eljárások kérelemre induló eljárásoktól eltérő szabályait!","ks":["hivatalbóli eljárás eltérő szabályai","nincs szünetelés","nincs érdemi döntés együttes kérelemre","nincs eljárás megszüntetés költségelőlegezés","csak felfüggesztés ideje nem számít","ügyintézési határidő kétszerese","jogsértés tényének megállapítása","első eljárási cselekmény napja","adatszolgáltatási kötelezettség"],"mv":"A hivatalbóli eljárások a kérelemre induló eljárások szabályaihoz képest eltérő szabályokat tartalmaznak: a hivatalbóli eljárásokban szünetelésnek nincs helye; a hatóság felfüggesztés esetén sem dönt érdemben az ügyfelek együttes kérelmére; nincs helye az eljárás megszüntetésének, ha az ügyfél a költségelőlegezési kötelezettségének nem tesz eleget; az ügyintézési határidőbe csak a felfüggesztés időtartama nem számít be. Ha a hatóság az ügyintézési határidő kétszeresét túllépi, a jogsértés tényének megállapításán és a jogszerű állapot helyreállítására kötelezésen túl egyéb jogkövetkezményt nem alkalmazhat, és ugyanazzal az ügyféllel szemben azonos alapon nem indítható új eljárás. A hivatalbóli eljárás az első eljárási cselekmény napján kezdődik, és az ügyfél a hatóság felhívására köteles adatot szolgáltatni.","hv":"5.8 (7273-7353. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/25","pont":10,"q":"Mutassa be a hivatalból induló eljárások esetén az értesítés szabályait!","ks":["hivatalbóli eljárás értesítés","ismert ügyfél értesítése","értesítés mellőzhető","nyolc napon belül dönt","honvédelmi nemzetbiztonsági közbiztonsági ok","eljárás sikerét meghiúsítaná","ügy tárgya és száma","ügyintézési határidő","ügyintéző neve","ügyféli jogok tájékoztatás"],"mv":"A hivatalbóli eljárás megindításáról a hatóság értesíti az ismert ügyfelet. Az értesítés csak kivételes esetben mellőzhető: ha az eljárás megindítása után a hatóság nyolc napon belül dönt vagy megszünteti az eljárást; ha azt honvédelmi, nemzetbiztonsági vagy közbiztonsági okból törvény kizárja; vagy ha az az eljárás sikerét meghiúsítaná. Az értesítés tartalmazza az ügy tárgyát és számát, az eljárás megindításának napját és az ügyintézési határidőt, az abba nem számító időtartamokat, az ügyintéző nevét és hivatali elérhetőségét, valamint az ügyféli jogokra és kötelezettségekre vonatkozó tájékoztatást.","hv":"5.8 értesítés (7311-7332. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/26","pont":10,"q":"Mutassa be a biztosítási intézkedések szabályait!","ks":["biztosítási intézkedés","ideiglenes biztosítási intézkedés","kötelezettség teljesítésének biztosítása","pénzkövetelés biztosítása","zár alá vétel","lefoglalás","öt napon belül","három napon belül","véglegessé válással hatályát veszti","végrehajtást foganatosító szerv","visszavonás"],"mv":"A biztosítási intézkedések rendeltetése bizonyos kötelezettségek teljesítésének biztosítása. A biztosítási intézkedés lehet a döntés megszületése előtti ideiglenes jellegű, illetve a döntést követő biztosítási intézkedés. Ideiglenes biztosítási intézkedésre akkor kerül sor, ha megalapozottan feltételezhető, hogy az érdemi döntésben elrendelhető kötelezettség teljesítése elmaradásának veszélye áll fenn; a hatóság ezt három napon belül megteszi, és az az eljárást befejező döntés véglegessé válásával hatályát veszti. A döntés meghozatalát követően akkor kerül rá sor, ha az eljárás tárgyát képező kötelezettség teljesítése veszélyben van, ekkor a hatóság az okot adó körülmény felmerülésétől számított öt napon belül pénzkövetelés biztosítását rendeli el, a dolgot zár alá veszi vagy lefoglalja. Az intézkedést a végrehajtást foganatosító szerv hajtja végre, és vissza kell vonni, ha az ok megszűnt vagy az összeget letétbe helyezték.","hv":"5.8 b) pont (7392-7419. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/27","pont":10,"q":"Mutassa be a zár alá vétel szabályait!","ks":["zár alá vétel","lefoglalás","dolog birtokának elvonása","tényállás másként nem tisztázható","dolog átadása","rendőrség közreműködése","eljárási bírság","szemle szabályai","vht","megszüntetés","dolog kiadása","értékesítés"],"mv":"Zár alá vételre akkor kerülhet sor, ha a tényállás másként nem tisztázható, vagy a tisztázás jelentős késedelemmel járna, vagy a zár alá vétel mellőzése a tényállás tisztázását veszélyeztetné; ekkor a hatóság jogosult a dolog birtokának a birtokos rendelkezése alóli elvonására. A birtokost fel kell szólítani a dolog átadására; nem kötelezhető átadásra, aki a tanúvallomást megtagadhatja vagy védett adat tekintetében nem kapott felmentést. Ha nem adja át, a hatóság a rendőrség közreműködésével foganatosítja és eljárási bírsággal sújtja a birtokost. A foganatosításra a szemle szabályai irányadók, a részletszabályokat a Vht. határozza meg. A zár alá vételt és lefoglalást a hatóság megszünteti, ha az ok megszűnt, az eljárást megszüntette, vagy az ügy érdemében döntött. A már nem szükséges dolgot ki kell adni, ha természetben már nem adható ki, az ellenértéket kell megtéríteni.","hv":"5.8 c) pont (7421-7480. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/28","pont":10,"q":"Mutassa be az Ákr. jogorvoslati rendszerét, kitérve az alkotmányos szabályozási kérdésekre is!","ks":["jogorvoslati rendszer","alaptörvény xxviii. cikk","jogorvoslathoz való jog","kérelemre induló jogorvoslat","hivatalból induló jogorvoslat","közigazgatási per","fellebbezés","felügyeleti eljárás","saját hatáskörű módosítás visszavonás","ügyészi felhívás","önálló jogorvoslat","végzés elleni jogorvoslat"],"mv":"A jogorvoslat alkotmányos alapját az Alaptörvény XXVIII. cikk (7) bekezdése adja, amely szerint mindenkinek joga van jogorvoslattal élni az olyan bírósági, hatósági és más közigazgatási döntés ellen, amely a jogát vagy jogos érdekét sérti. A hatóság határozata ellen önálló jogorvoslatnak van helye, végzése ellen csak akkor, ha azt törvény kifejezetten megengedi. A jogorvoslati eljárás kérelemre vagy hivatalból indulhat. Kérelemre induló jogorvoslatok: a közigazgatási per és a fellebbezési eljárás. Hivatalból induló jogorvoslatok: a döntés saját hatáskörben történő módosítása vagy visszavonása, a felügyeleti eljárás, valamint az ügyészi felhívás és fellépés nyomán indított eljárás. Az Ákr. – a közigazgatási bírósági rendszer átalakítása miatt – főszabállyá teszi a bírósághoz való közvetlen fordulást, és csak kivételesen engedi meg a fellebbezést.","hv":"5.9 bevezetés (7496-7571. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/29","pont":10,"q":"Csoportosítsa az Ákr.-ben nevesített jogorvoslatokat és mutassa be, mi a legfontosabb változás az Ákr-ben a Ket.-hez képest a jogorvoslati formák szabályozását tekintve (elegendő, ha három ilyen tényezőt kiemel)!","ks":["jogorvoslatok csoportosítása","ket-hez képest változás","közigazgatási per fő jogorvoslat","fellebbezés kivételes","újrafelvételi eljárás megszüntetése","alkotmánybírósági határozat alapján folytatott eljárás","bírósághoz fordulás","anyagi jogerő","kérelemre és hivatalból induló"],"mv":"Az Ákr. jogorvoslatait kétfelé csoportosíthatjuk: kérelemre induló (közigazgatási per, fellebbezés) és hivatalból induló (saját hatáskörű döntésmódosítás/visszavonás, felügyeleti eljárás, ügyészi felhívás/fellépés). A Ket.-hez képest három legfontosabb változás: 1) az Ákr. a közigazgatási pert (bírósághoz fordulást) teszi a fő jogorvoslati formává, és a fellebbezést csak kivételesen engedi meg (a Ket.-ben a fellebbezés volt a legáltalánosabb forma); 2) megszünteti az újrafelvételi eljárást, mert a gyakorlatban nem alkalmazták; 3) megszünteti az Alkotmánybíróság határozata alapján folytatott eljárást, mert az okafogyottá vált. A változások az anyagi jogerő mielőbbi beálltát szolgálják.","hv":"5.9 és 5.9.1 (7555-7583. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/30","pont":10,"q":"Ismertesse milyen döntéseket hozhat a perben a közigazgatási bíróság!","ks":["közigazgatási bíróság döntései","kereset elutasítása","megváltoztatás","megsemmisítés","hatályon kívül helyezés","új eljárásra kötelezés","marasztalás","jogsértés tényének megállapítása","ítélet","végzés","kp","részítélet"],"mv":"A bíróság a per érdemében ítélettel, minden más kérdésben végzéssel dönt. A keresetet elutasítja, ha a kereset alaptalan, ha a felperes jogának vagy jogos érdekének közvetlen sérelme nem állapítható meg, vagy ha olyan eljárási szabályszegés történt, amelynek az ügy érdemi elbírálására lényeges kihatása nem volt. Ha a bíróság a jogsértést megállapítja, a közigazgatási cselekményt megváltoztatja, megsemmisíti vagy hatályon kívül helyezi (illetve az általános hatályú rendelkezés alkalmazását kizárja), szükség esetén a közigazgatási szervet új eljárásra kötelezi, vagy marasztalja; e jogkövetkezmények együttesen is alkalmazhatók. Megváltoztatásra akkor van mód, ha az ügy természete megengedi, a tényállás tisztázott és a jogvita véglegesen eldönthető. Ha megváltoztatás, megsemmisítés vagy marasztalás nem lehetséges, a bíróság a jogsértés tényét állapítja meg.","hv":"5.9.1 a) közigazgatási per (7882-7959. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/31","pont":10,"q":"Soroljon fel tíz olyan végzést, amely ellen önálló jogorvoslatnak van helye!","ks":["önálló jogorvoslattal támadható végzés","biztosítási intézkedés","ügyféli jogállás","jogutódlás","kérelmet visszautasító","eljárást megszüntető","felfüggesztés szünetelés","eljárási bírság","igazolási kérelmet elutasító","zár alá vétel lefoglalás","iratbetekintés","költségmentesség elutasító","végrehajtást elrendelő"],"mv":"Önálló jogorvoslatnak van helye a következő végzések ellen: a biztosítási intézkedésről és az ideiglenes biztosítási intézkedésről szóló; az ügyféli jogállásról vagy jogutódlásról rendelkező; a kérelmet visszautasító; az eljárást megszüntető; az eljárás felfüggesztése vagy szünetelése tárgyában hozott; az eljárási bírságot kiszabó; a fellebbezési határidő elmulasztása miatt benyújtott igazolási kérelmet elutasító; a zár alá vételt vagy lefoglalást elrendelő (és ezek megszüntetése iránti kérelmet elutasító); az iratbetekintési jog gyakorlására irányuló kérelmet elutasító; az iratbetekintési jog korlátozására irányuló kérelem tárgyában hozott; az eljárási költséggel és a költségmentesség iránti kérelmet elutasító (illetve módosító, visszavonó); valamint a végrehajtást elrendelő végzés ellen.","hv":"5.9 (7521-7536. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/32","pont":10,"q":"Ismertesse a semmisség fogalmát és a semmisségi okokat!","ks":["semmisség","súlyos hiba","nem reparálható","semmisségi okok","hatáskör hiánya","szakhatóság mellőzése","testületi szerv nem volt határozatképes","bűncselekmény befolyásolta","közigazgatási bíróság határozatával ellentétes","további ügyfél bevonása","törvény semmisségi oknak minősíti"],"mv":"A semmisség azt jelenti, hogy a döntés olyan súlyos hibában szenved, amelyet nem lehet reparálni, így a döntést meg kell semmisíteni, olyan helyzetet teremtve, mintha meg sem született volna. A döntést meg kell semmisíteni (vissza kell vonni), ha: az ügy nem tartozik az eljáró hatóság hatáskörébe (az ideiglenes intézkedést kivéve); azt a szakhatóság kötelező megkeresése nélkül vagy állásfoglalásának figyelmen kívül hagyásával hozták; a testületi szerv nem volt jogszabályszerűen megalakítva, nem volt határozatképes vagy nem volt meg a szükséges szavazati arány; tartalmát bűncselekmény befolyásolta (jogerős határozat alapján); az ügyészség feltételes ügyészi felfüggesztést alkalmazott; tartalma a közigazgatási bíróság határozatával ellentétes; további ügyfél bevonásának lett volna helye; vagy valamely súlyos eljárási jogszabálysértést törvény semmisségi oknak minősít. Semmisségi ok esetén sem semmisíthető meg a döntés, ha jóhiszeműen szerzett jogot sértene és három év eltelt, vagy ha öt év eltelt.","hv":"5.9.2 semmisség (8221-8252. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/33","pont":10,"q":"Ismertesse az eljárási költség előlegezésének szabályait!","ks":["eljárási költség előlegezése","kérelmező ügyfél előlegezi","egyetemleges felelősség","bizonyítást indítványozó fél","rendőrség igénybevétele","hivatalból indult eljárás hatóság előlegezi","költség felmerülésekor","letétbe helyezés","díj tartalmazza"],"mv":"Az eljárási költség előlegezésének általános szabályai szerint kérelemre indult eljárásban az eljárási költséget – ha ágazati jogszabály másként nem rendelkezik – a kérelmező ügyfél előlegezi (több azonos érdekű ügyfél egyetemlegesen felelős, de nem kötelezhető olyan költség előlegezésére, amelyet a díj tartalmaz). A bizonyítási eljárással járó költségeket a bizonyítást indítványozó fél előlegezi; a rendőrség igénybevételével kapcsolatos költséget az igénybevételt kérő hatóság. A hivatalból indult vagy folytatott eljárásban az eljárási költséget – egyes kivételekkel (ügyfél megjelenése, képviselet, nem hatóság által viselendő fordítási, levelezési költség) – a hatóság előlegezi. Az előlegezésről a hatóság a költségek felmerülésekor dönt, jelentősebb összeg esetén elrendelheti a szükséges összeg előzetes letétbe helyezését.","hv":"5.10 b) pont (8335-8351. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/34","pont":10,"q":"Mutassa be a költségmentesség szabályait!","ks":["költségmentesség","természetes személy ügyfél","kereseti jövedelmi vagyoni viszonyok","jogok érvényesítésének megkönnyítése","fontos ok","teljes vagy részleges mentesség","előlegezés és viselés alóli mentesség","kérelem előterjesztésétől","végrehajtási eljárásra is kiterjed","ágazati ügyfajta"],"mv":"Ágazati törvény, kormányrendelet vagy önkormányzati rendelet meghatározhat olyan ügyfajtát, amelyben az ügyfelet eleve költségmentesség illeti meg. Emellett a hatóság annak a természetes személy ügyfélnek engedélyezhet költségmentességet, aki kereseti, jövedelmi és vagyoni viszonyai miatt az eljárási költséget vagy egy részét nem képes viselni, jogai érvényesítésének megkönnyítésére, vagy törvényben meghatározott más fontos okból. A költségmentesség az eljárási költség előlegezése és viselése alóli teljes vagy részleges mentességet jelent. A költségmentesség a kérelem előterjesztésétől az eljárás egész tartamára és a végrehajtási eljárásra is kiterjed. A költségmentességet engedélyező, módosító vagy visszavonó végzést a hatóság közli az eljárásban részt vevő, illeték- vagy díjfizetési kötelezettség alá eső hatóságokkal is.","hv":"5.10 d) pont (8363-8391. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/35","pont":10,"q":"Határozza meg a végrehajtás előfeltételeit!","ks":["végrehajtás előfeltételei","végleges döntés","kötelezettséget megállapító döntés","önkéntes teljesítés elmaradása","generálklauzula","végrehajtási jog elévülése","három év","hat év","elévülés nyugvása","elévülés megszakadása","véglegesség"],"mv":"A végrehajtásnak két fő előfeltétele van. Először szükséges egy végleges, kötelezettséget megállapító döntés, amelynek a kötelezett nem tesz eleget; az Ákr. generálklauzulát határoz meg: a végrehajtás feltétele, hogy az ügyfél a hatóság végleges döntésének nem tesz eleget (az önkéntes teljesítés elmaradása). A döntés akkor végleges, ha közigazgatáson belüli fellebbezéssel már nem támadható, a véglegesség a közléssel áll be. Másodszor a végrehajtási jog elévülése még nem következett be: a végrehajtási jog a teljesítési határidő utolsó napjától számított három év elteltével évül el (ágazati jogszabály rövidebbet is megállapíthat), de hat év elteltével a határozat nem hajtható végre. Az elévülés nyugszik a felfüggesztés, fizetési kedvezmény és folyamatos végrehajtás időtartama alatt, és bármely végrehajtási cselekmény megszakítja.","hv":"5.11 a) és b) pont (8465-8566. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/36","pont":10,"q":"Mutassa be a Vht. és az Ákr. egymáshoz való viszonyát!","ks":["vht","ákr viszonya","bírósági végrehajtásról szóló törvény","eltérésekkel kell alkalmazni","vht-t kell alkalmazni","állami adóhatóság","avt","fogalmi megfeleltetés","bíróság helyett elrendelő hatóság","adós helyett kötelezett","ingó és ingatlan árverés","végrehajtási kifogás"],"mv":"A végrehajtási eljárás során nem kizárólag az Ákr., hanem a bírósági végrehajtásról szóló 1994. évi LIII. törvény (Vht.) bizonyos szabályai is alkalmazandók. Az Ákr. rendelkezéseit a végrehajtási eljárásban a fejezetében foglalt eltérésekkel kell alkalmazni, az Ákr. eltérő rendelkezése hiányában pedig a Vht.-t. A Vht. fogalmait megfelelően kell érteni: ahol a Vht. bíróságot említ, azon a végrehajtást elrendelő hatóságot, ahol végrehajtót, azon a végrehajtást foganatosító szervet, ahol adóst, azon a kötelezettet kell érteni. A költségek előlegezésére, viselésére és az eljárási bírságra az Ákr. szabályait kell alkalmazni. A Vht. szerint a bírósági végrehajtás szabályai irányadók a közigazgatási végrehajtás során foganatosított ingó- és ingatlan-végrehajtásra is; ha a végrehajtást az állami adóhatóság foganatosítja, az Avt. szabályait kell alkalmazni.","hv":"5.11 (8394-8459. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"10/37","pont":10,"q":"Mutassa be a végrehajtás folyamatát az Ákr. alapján!","ks":["végrehajtás folyamata","végrehajtás elrendelése","végrehajtás foganatosítása","döntést hozó hatóság","öt napon belül","állami adóhatóság","avt","önálló bírósági végrehajtó","pénzkövetelés végrehajtása","ingóvégrehajtás","ingatlan-végrehajtás","letiltás","munkabér"],"mv":"A végrehajtás folyamatát két alszakaszra osztjuk: a végrehajtás elrendelésére és a foganatosítására. A végrehajtást – ha ágazati jogszabály másként nem rendelkezik – a döntést hozó hatóság, másodfokú döntés esetén az elsőfokú hatóság rendeli el, hivatalból vagy a jogosult kérelmére, a végrehajthatóságtól vagy a kérelem beérkezésétől számított öt napon belül, és közli a végrehajtást foganatosító szervvel. A foganatosítást – ha törvény másként nem rendelkezik – az állami adóhatóság végzi (ekkor az Avt. szabályai irányadók); a foganatosító szerv önálló bírósági végrehajtóval is szerződhet, de végzést csak az elrendelő hatóság hozhat. A Vht. szerint a végrehajtás módozatai: pénzkövetelés végrehajtása (elsősorban munkabérből letiltással, illetve pénzforgalmi számláról), ingóvégrehajtás (foglalási jegyzőkönyvbe összeírás), ingatlan-végrehajtás, különleges végrehajtási eljárások és külföldi határozat végrehajtása.","hv":"5.11 (8568-8704. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/1","pont":5,"q":"Határozza meg a jogszabály fogalmát!","ks":["jogszabály","általánosan kötelező magatartási szabály","jogalkotó hatáskörrel rendelkező szerv","jövőre nézve","absztrakt","társadalmi viszonyok","hivatalos lapban kihirdetett","alaptörvény","mindenkire kötelező","nem csak címzetti kör"],"mv":"A jogszabály olyan általánosan kötelező magatartási szabály, amelyet a jogalkotó hatáskörrel rendelkező szervek kifejezetten azzal a céllal alkotnak, hogy a jövőre nézve, absztrakt módon szabályozzák a társadalmi viszonyokat. A jogszabályokat az különbözteti meg a közjogi szervezetszabályozó eszközöktől, hogy formálisan is mindenkire kötelezőek, nem csupán egy meghatározott címzetti körre nézve. Az Alaptörvény szerint általánosan kötelező magatartási szabályt az Alaptörvény és az Alaptörvényben megjelölt, jogalkotó hatáskörrel rendelkező szerv által megalkotott, a hivatalos lapban kihirdetett jogszabály állapíthat meg.","hv":"2.1.3 (619-631. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/2","pont":5,"q":"Sorolja fel az Alaptörvény szerint a különleges jogrend típusait, és írja mindegyik mellé, hogy annak során melyik szerv és milyen jogi normát alkothat!","ks":["különleges jogrend","hadiállapot","szükségállapot","veszélyhelyzet","kormány rendelete","rendkívüli intézkedés","törvény erejével bíró rendelet","törvények alkalmazásának felfüggesztése","rendeleti kormányzás","rendkívüli jogforrás"],"mv":"Az Alaptörvény a különleges jogrend három típusát különbözteti meg: hadiállapot, szükségállapot és veszélyhelyzet. Mindhárom típushoz a Kormány rendeletalkotási jogköre kapcsolódik: a Kormány különleges jogrendben rendeletet alkothat, amellyel sarkalatos törvényben meghatározott rendkívüli intézkedéseket hozhat, egyes törvények alkalmazását felfüggesztheti, és a törvényi rendelkezésektől eltérhet. Hadiállapotban és szükségállapotban az Országgyűlés külön felhatalmazása nélkül, veszélyhelyzetben az Országgyűlés (kétharmados, határozott időre megadott) felhatalmazásával teheti ezt. Ezek a 'törvény erejével bíró' rendeletek (rendkívüli jogforrások), amelyek a törvénnyel egy szinten állnak a jogszabályi hierarchiában, és a rendeleti kormányzást teszik lehetővé.","hv":"2.1.3.2 (757-822. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/3","pont":5,"q":"Sorolja fel, hogy mely szervek alkothatnak rendeletet békeidőben!","ks":["rendeletalkotás békeidőben","kormány","magyar nemzeti bank elnöke","miniszterelnök","miniszter","kormány tagja","önálló szabályozó szerv vezetője","helyi önkormányzat","képviselő-testület"],"mv":"Békeidőben rendeletet alkothat: a Kormány, a Magyar Nemzeti Bank elnöke, a Kormány tagjai (a miniszterelnök és a miniszterek), az önálló szabályozó szerv vezetője (pl. NMHH, MEKH, SZTFH, Országos Atomenergia Hivatal), valamint a helyi önkormányzat (képviselő-testülete, illetve közgyűlése). A jogszabályi hierarchiában felülről lefelé: kormányrendelet és MNB elnökének rendelete, miniszterelnöki és miniszteri rendelet, önálló szabályozó szerv vezetőjének rendelete, önkormányzati rendelet.","hv":"2.1 bevezetés és 2.1.3.3 (435-441., 825-876. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/4","pont":5,"q":"Hasonlítsa össze a társadalmi egyeztetés két formáját!","ks":["társadalmi egyeztetés","általános egyeztetés","közvetlen egyeztetés","honlapon megadott elérhetőség","véleményezés","bárki véleményt nyilváníthat","stratégiai partnerségi megállapodás","bevont szervezetek","jogszabálytervezet és indokolás","visszaigazolás"],"mv":"A társadalmi egyeztetésnek két formája van: az általános egyeztetés és a közvetlen egyeztetés. Az általános egyeztetés a honlapon megadott elérhetőségen (elektronikus levélcímen) keresztül biztosított véleményezés: bárki véleményt nyilváníthat a közzétett tervezetről, koncepcióról, a beérkezésről visszaigazolást kell küldeni. A miniszter mérlegeli a véleményeket és tipizált összefoglalót készít, de egyedi válaszadási kötelezettség nem terheli. A közvetlen egyeztetés a jogszabály előkészítéséért felelős miniszter által bevont személyek, intézmények és szervezetek (pl. civil szervezetek, érdekképviseletek) közvetlen véleményezése; ennek keretében a miniszter stratégiai partnerségi megállapodásokat alakít ki. Társadalmi egyeztetésre kell bocsátani a törvény, a kormányrendelet és a miniszteri rendelet tervezetét és indokolását.","hv":"3.1.1 (1999-2021. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/5","pont":5,"q":"Mi az alapelv? Sorolja fel, hogy milyen funkciói vannak az alapelveknek a hatósági eljárásjogban!","ks":["alapelv","iránymutató eszme","jogterület egészét áthatja","jogalkalmazói funkció","értelmező funkció","jogalkotói funkció","hézagpótló funkció","magatartási szabályok","joghézag kitöltése"],"mv":"Az alapelvek az egyes jogágak iránymutató eszméi, amelyek olyan szabályokat fogalmaznak meg, amelyek áthatják az adott jogterület egészét és meghatározzák a jogviszony elemeinek kölcsönhatását; a közigazgatási hatósági eljárás alapelvei elsősorban a hatóság és az ügyfél (részben az egyéb résztvevők) számára fogalmaznak meg követendő szabályokat. Az alapelvek funkciói: a jogalkalmazói (értelmező) funkció, amely segíti a jogalkalmazókat bizonyos kérdések azonos módon történő értelmezésében; a jogalkotói funkció, amely keretek között tartja a jogalkotót és megismerteti céljait; valamint a hézagpótló funkció, amely akkor segíti a jogalkalmazókat, ha az adott egyedi ügyre nincs konkrét norma, vagyis a joghézagot tölti ki.","hv":"5.2.2 (3742-3763. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/6","pont":5,"q":"Ismertesse az Ákr. alapelveinek funkcióit!","ks":["alapelvek funkciói","jogalkalmazói funkció","értelmező funkció","jogalkotói funkció","hézagpótló funkció","azonos értelmezés","jogalkotó célja","joghézag","iránymutatás"],"mv":"Az Ákr. alapelveinek funkciói három csoportba sorolhatók: a jogalkalmazói (más néven értelmező), a jogalkotói és a hézagpótló funkció. A jogalkalmazói (értelmező) funkció azt jelenti, hogy az alapelvek segítséget nyújtanak valamennyi jogalkalmazó számára bizonyos kérdések azonos módon történő értelmezéséhez. A jogalkotói funkció egyfelől azt szolgálja, hogy a későbbi eljárási rendelkezések elfogadása során a jogalkotó bizonyos általános keretek között maradjon, másfelől hogy a jogalkalmazók megismerjék a jogalkotó célját. A hézagpótló funkció azt a célt szolgálja, hogy az alapelvek akkor is segítsék a jogalkalmazók munkáját, ha az adott egyedi ügyre nincs konkrét jogi norma, vagyis a joghézagot töltik ki.","hv":"5.2.2 (3750-3763. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/7","pont":5,"q":"Sorolja fel az Ákr. által nevesített alapelv csoportokat!","ks":["alapelvcsoportok","jogszerűség elve","hivatalbóliság elve","hatékonyság elve","ügyfélre vonatkozó alapelvek","jóhiszeműség elve","bizalmi elv","ex officio","tisztességes eljárás"],"mv":"Az Ákr. alapelvi rendszere ún. alapelvcsoportokat nevesít, amelyeken belül néhol további alapelveket, irányadó szabályokat fogalmaz meg. Az Ákr. által nevesített alapelvcsoportok az alábbiak: a jogszerűség elve; a hivatalbóliság elve; a hatékonyság elve; az ügyfélre vonatkozó alapelvek; valamint a jóhiszeműség elve és a bizalmi elv. Ezek az Alaptörvény XXIV. és XXVIII. cikkével összhangban a tisztességes hatósági eljárás követelményeit konkretizálják a közigazgatási tevékenységre.","hv":"5.2.2 (3820-3830. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/8","pont":5,"q":"Ismertesse a hivatalbóliság elve kapcsán az Ákr.-ben nevesített szabályokat!","ks":["hivatalbóliság","ex officio","ügy ura a hatóság","hivatalból eljárást indíthat","kérelemre indult eljárást folytathatja","hivatalból állapítja meg a tényállást","bizonyítás módja és terjedelme","szabad mérlegelés","saját és felügyelt hatóság döntésének felülvizsgálata","nincs kötve bizonyítási indítványhoz"],"mv":"A hivatalbóliság (ex officio) elve szerint az ügy ura a hatóság. Ez közelebbről azt jelenti, hogy a hatóság: a kizárólag kérelemre indítható eljárások kivételével hivatalból eljárást indíthat; a kérelemre indult eljárást jogszabályban meghatározott feltételek fennállása esetén folytathatja; hivatalból állapítja meg a tényállást, határozza meg a bizonyítás módját és terjedelmét (szabadon választja meg, hogy egy tényt milyen bizonyítási eszközzel bizonyít, és a bizonyítékokat szabad meggyőződése alapján értékeli, az ügyfél indítványaihoz nincs kötve); valamint a törvény keretei között felülvizsgálhatja a saját és a felügyelete alá tartozó hatóság döntését és eljárását (kijavítás, kiegészítés, döntésmódosítás/visszavonás saját hatáskörben, felügyeleti eljárás).","hv":"5.2.2 2. pont (3988-4015. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/9","pont":5,"q":"Ismertesse az ügyfélre vonatkozó alapelvek Ákr.-beli rendszerét!","ks":["ügyfélre vonatkozó alapelvek","nyilatkozattételi jog","észrevétel","jogok és kötelezettségek megismerése","ügyféli jogok előmozdítása","kitanítási kötelezettség","eljárás egyéb résztvevője","tájékoztatás"],"mv":"Az ügyfélre vonatkozó alapelvek csoportjában – a címmel ellentétben – nemcsak az ügyfélre, hanem az eljárás egyéb résztvevőjére nézve is találhatunk alapelveket. Az Ákr. kimondja, hogy az ügyfél az eljárás során bármikor nyilatkozatot, észrevételt tehet (a nyilatkozattételi jogosultság az eljárás minden szakaszában érvényesül). Emellett a hatóság biztosítja az ügyfél, továbbá a tanú, a hatósági tanú, a szakértő, a tolmács, a szemletárgy birtokosa és az ügyfél képviselője (vagyis az eljárás egyéb résztvevője) számára, hogy jogaikat és kötelezettségeiket megismerhessék, és előmozdítja az ügyféli jogok gyakorlását. Másként szólva a hatóságot kitanítási kötelezettség terheli.","hv":"5.2.2 4. pont (4051-4068. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/10","pont":5,"q":"Mutassa be a hatáskör és az illetékesség fogalmát, egymáshoz való viszonyát az Ákr. alapján!","ks":["hatáskör","illetékesség","egymásra épülő rendező elvek","milyen típusú és szintű szerv","azonos hatáskörű hatóságok közül melyik","illetékességi okok","jogszabály állapítja meg","ingatlan fekvése","tevékenység helye","hivatalból vizsgálja"],"mv":"A hatáskör és az illetékesség egymásra épülő rendező elvek a hatósági eljárásjogban, amelyek alapján behatárolható az az egy hatóság, amely az adott egyedi ügyben eljárhat. A hatáskör arra ad választ, hogy valamely ügycsoportban milyen típusú és milyen szintű közigazgatási szerv jár el, vagyis megállapítható, hogy milyen szerv jogosult és köteles eljárni; a hatáskört mindig jogszabály (jellemzően ágazati jogszabály) állapítja meg. Az illetékesség azt mutatja meg, hogy az azonos hatáskörű hatóságok közül melyik jár el; ennek megállapítását illetékességi okok segítik (általános ok pl. az ügy tárgyát képező ingatlan fekvése, a tevékenység helye, a jogellenes magatartás elkövetésének helye). A hatóság a hatáskörét és illetékességét az eljárás minden szakaszában hivatalból vizsgálja.","hv":"5.3.1.1 (4359-4426. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/11","pont":5,"q":"Határozza meg a hatásköri és illetékességi vitára vonatkozó eljárásrendet az Ákr. alapján!","ks":["hatásköri vita","illetékességi vita","pozitív összeütközés","negatív összeütközés","megelőzés","egyeztetés","három napon belül","legközelebbi közös felügyeleti szerv","fővárosi és vármegyei kormányhivatal","közigazgatási bíróság"],"mv":"Hatásköri, illetékességi vita akkor fordul elő, ha ugyanabban az ügyben több hatóság állapította meg hatáskörét és illetékességét (pozitív összeütközés), több hatóság állapította meg azok hiányát (negatív összeütközés), vagy több illetékes hatóság előtt indult eljárás, és a megelőzés alapján nem dönthető el (megelőzés: az jár el, amelynél előbb indult az eljárás). Az összeütközés esetén az érintett hatóságok kötelesek azonnal, de legfeljebb három napon belül megkísérelni a vita eldöntését; az egyeztetést az kezdeményezi, amelyiknél később indult az eljárás vagy később állapította meg a hiányt. Ha az egyeztetés nem vezet eredményre, az eljáró hatóságot illetékességi összeütközés esetén a legközelebbi közös felügyeleti szerv (ennek hiányában a vita eldöntését kérő hatóság szerinti fővárosi és vármegyei kormányhivatal), hatásköri összeütközés esetén a közigazgatási bíróság jelöli ki.","hv":"5.3.1.2 (4482-4503. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/12","pont":5,"q":"Ismertesse az ügyintézővel szembeni abszolút kizáró okokat!","ks":["abszolút kizárási ok","mérlegelés nélküli","ügyintéző kizárása","jogát jogos érdekét közvetlenül érinti","támogató","másodfokú elintézés","aki első fokon részt vett","tárgyilagos elfogulatlan ügyintézés","relatív kizárási ok"],"mv":"A kizárás garantálja a tárgyilagos és elfogulatlan ügyintézést. A kizárási okok két csoportja az abszolút (mérlegelés nélküli) és a relatív kizárási okok; abszolút ok fennállása esetén ki kell, relatív ok alkalmával ki lehet zárni az érintettet. Az ügyintézővel szembeni abszolút kizárási okok: az ügy elintézéséből kizárt az a személy, akinek jogát vagy jogos érdekét az ügy közvetlenül érinti, továbbá az eljárás egyéb résztvevője a támogató; valamint az ügy másodfokú elintézéséből kizárt az, aki az ügy elintézésében első fokon részt vett.","hv":"5.3.2 b) pont (4541-4554. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/13","pont":5,"q":"Ismertesse az ügyfél nyilatkozatára vonatkozó szabályokat!","ks":["ügyfél nyilatkozata","bizonyíték","nyilatkozattételre felhívás","alanyi jog","hiányzó bizonyíték pótlása","eljárási bírság","valótlan állítás vagy elhallgatás","adatszolgáltatási kötelezettség","tájékoztatási kötelezettség","figyelmeztetés"],"mv":"Az ügyfél nyilatkozata a közigazgatási hatósági eljárásban igen fontos bizonyíték, mivel az ügyfél ismeri leginkább a saját ügyét; ha a tényállás tisztázása szükségessé teszi, a hatóság az ügyfelet nyilatkozattételre hívhatja fel. A nyilatkozattétel az ügyfélnek a törvényben biztosított alanyi joga. Ez a bizonyíték azért is kiemelt jellegű, mert ha jogszabály nem zárja ki, az ügyfél a nyilatkozatával pótolhatja a hiányzó bizonyítékot, ha annak beszerzése nem lehetséges. Ha az ügyfél vagy képviselője az ügy szempontjából jelentős adatot valótlanul állít vagy elhallgat, illetve adatszolgáltatási kötelezettségét nem teljesíti, eljárási bírsággal sújtható; a hatóság tájékoztatási kötelezettsége körében figyelmezteti az ügyfelet jogaira, kötelességeire és a valótlan bizonyíték szolgáltatásának jogkövetkezményeire.","hv":"5.4.6.2 a) pont (5827-5842. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/14","pont":5,"q":"Ismertesse, hogy mi a közokirat és mit jelent az ahhoz kapcsolódó teljes bizonyító erő!","ks":["közokirat","teljes bizonyító erő","bíróság közjegyző hatóság közigazgatási szerv","ügykörén belül","valódinak kell tekinteni","intézkedés megtétele","tanúsított adatok valósága","ellenbizonyítás","papíralapú vagy elektronikus","másolat azonos bizonyító ereje"],"mv":"A közokirat olyan papíralapú vagy elektronikus okirat, amelyet bíróság, közjegyző vagy más hatóság, illetve közigazgatási szerv ügykörén belül, a jogszabályi rendelkezéseknek megfelelő módon állított ki. A közokirat legfontosabb sajátossága a teljes bizonyító erő: azt az ellenkező bizonyításáig valódinak kell tekinteni, és teljes bizonyító erővel bizonyítja, hogy a kiállító a benne foglalt intézkedést megtette vagy a határozatot a benne foglalt tartalommal meghozta, továbbá bizonyítja a tanúsított adatok és tények valóságát, vagy a benne foglalt nyilatkozat megtételét, annak idejét és módját. A közokirattal szemben is van helye ellenbizonyításnak, kivéve, ha azt törvény kizárja vagy korlátozza; az eredetivel azonos bizonyító ereje van a közokiratról jogosult által készített másolatnak.","hv":"5.4.6.2 b) pont (5859-5892. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/15","pont":5,"q":"Ismertesse az iratbetekintés szabályait a hatósági eljárásban!","ks":["iratbetekintés","ügyfél bármely szakaszban","tanú a vallomását tartalmazó iratba","szemletárgy birtokosa","harmadik személy","másolat kivonat","iratbetekintés korlátozása","döntés tervezete","védett adat","személyes adat","kérelem"],"mv":"Az iratbetekintési jog szabályai: az ügyfél az eljárás bármely szakaszában és annak befejezése után is betekinthet az eljárás során keletkezett iratba; a tanú kizárólag a vallomását tartalmazó iratba, a szemletárgy birtokosa a szemléről készített iratba; az eljárásban részt nem vevő harmadik személy akkor tekinthet be személyes vagy védett adatot tartalmazó iratba, ha igazolja, hogy az adat megismerése jogának érvényesítéséhez szükséges. Az iratbetekintés során az arra jogosult másolatot, kivonatot készíthet. Nem lehet betekinteni a döntés tervezetébe, valamint az olyan iratba, amelyből következtetés vonható le védett vagy személyes adatra. Az iratbetekintés biztosítása érdekében kérelmet kell előterjeszteni, amelyet a hatóság biztosít vagy végzésben elutasít.","hv":"5.4.6.2 b) pont iratbetekintés (5957-6018. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/16","pont":5,"q":"Ismertesse, hogy milyen fajtái vannak a szemlének a hatósági eljárásban!","ks":["szemle","bizonyítási módszer","szemletárgy","ingó ingatlan megtekintése","személy megtekintése","megfigyelés","szemretvételezés","saját észlelés","szemletárgy birtokosa","rendőrség közreműködése","ügyész értesítése"],"mv":"A szemle nem bizonyítási eszköz, hanem a bizonyítási eljárás egyik módja, amelynek során a hatóság valamilyen tárgyi bizonyítékot, a vizsgált tényeket, körülményeket megszemlélés (saját észlelés) útján szemrevételezi. Az Ákr. a szemle különböző fajtáit különbözteti meg: a hatóság szemlét rendelhet el, ha a tényállás tisztázásához ingó vagy ingatlan (együtt: szemletárgy) megtekintése, személy megtekintése vagy megfigyelése szükséges. A szemletárgy birtokosát és a szemlével meghatározott személyt – ha az a szemle eredményességét nem veszélyezteti – előzetesen értesíteni kell. Azonnali eljárási cselekmény, illetve életveszéllyel vagy súlyos kárral fenyegető helyzet esetén a hatóság a rendőrség közreműködését kérheti, és a helyiség felnyitásával is megtarthatja a szemlét, ekkor az ügyészt előzetesen értesíteni kell.","hv":"5.4.6.2 d) pont (6153-6196. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/17","pont":5,"q":"Ismertesse a tolmácsra vonatkozó szabályokat hatósági eljárásban!","ks":["tolmács","nyelvi szakértő","speciális szakértő","idegen nyelv","ügyintéző nem beszéli","eljáró hatóság el nem járó tagja","szakértőre vonatkozó szabályok","jelnyelvi tolmács","hallássérült siketvak","hivatalos nyelv magyar"],"mv":"A tolmács speciális szakértőnek, mégpedig nyelvi szakértőnek tekintendő, akit a hatóság akkor von be az eljárásba, ha az ügyfél vagy az eljárás egyéb résztvevője által használt idegen nyelvet az ügyintéző nem beszéli. Tolmács lehet az ügyben eljáró hatóság el nem járó tagja, valamint – ha az a tényállás tisztázáshoz elengedhetetlen – az ellenőrzés helyszínén tartózkodó, idegen nyelvet beszélő személy is, ha megfelelő színvonalon érti és beszéli az adott nyelvet. A tolmácsra a szakértőre vonatkozó szabályokat kell megfelelően alkalmazni. (A közigazgatási hatósági eljárás hivatalos nyelve a magyar; hallássérült vagy siketvak ügyfél esetén kérésre jelnyelvi tolmács közreműködésével kell meghallgatni.)","hv":"5.4.6.2 e) pont (6221-6227. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/18","pont":5,"q":"Mutassa be a hatósági szerződés megkötésének feltételeit!","ks":["hatósági szerződés","közigazgatási szerződés","ágazati jogszabály lehetővé teszi vagy előírja","közérdek és ügyfél szempontjából előnyös","határozathozatal helyett","írásban","ptk","szerződés tartalma","szerződő felek","szerződésszegés jogkövetkezményei","alávetés"],"mv":"A hatósági szerződés a döntések egy speciális fajtája, amely a közigazgatási szerződések csoportjába tartozik (egyik szerződő fél mindig a hatóság). Megkötésére csak akkor kerülhet sor, ha á
