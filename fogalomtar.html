gazati jogszabály lehetővé teszi vagy előírja, hogy a hatóság a hatáskörébe tartozó ügynek a közérdek és az ügyfél szempontjából is előnyös rendezése érdekében határozathozatal helyett az ügyféllel írásban hatósági szerződést kössön. Az Ákr.-ben nem szabályozott kérdésekben az azt szabályozó jogszabályt, ennek hiányában a Ptk. szabályait kell alkalmazni. A szerződésnek tartalmaznia kell a szerződő feleket, a szerződés tárgyát, a vállalt kötelezettségeket és jogokat, a szakhatósági kikötéseket, a szerződésszegés jogkövetkezményeit, a vitarendezés módját és a jogszabályban előírt kikötéseket; ha az ügyfél olyan kötelezettséget vállal, amelyre egyébként nem lenne kötelezhető, alá kell vetnie magát a szerződésszegés jogkövetkezményének.","hv":"5.5.6 (6823-6876. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/19","pont":5,"q":"Ismertesse a közhiteles hatósági nyilvántartással összefüggő vélelem szabályait!","ks":["közhiteles hatósági nyilvántartás","közhitelesség","vélelem","ellenkező bizonyításáig","jóhiszeműség vélelme","bejegyzett adat fennáll","törölt adat nem áll fenn","adatokban bízva szerez jogot","bizalmi elv"],"mv":"A közhiteles hatósági nyilvántartással összefüggő vélelem szabálya szerint, ha törvény eltérően nem rendelkezik, a hatósági nyilvántartás közhitelessége alapján az ellenkező bizonyításáig vélelmezni kell: annak jóhiszeműségét, aki a hatósági nyilvántartásban szereplő adatokban bízva szerez jogot; a hatósági nyilvántartásba bejegyzett adatról azt, hogy az fennáll; a hatósági nyilvántartásból törölt adatról pedig azt, hogy az nem áll fenn. Ez a bizalmi elv egyik megnyilvánulása: az ügyfél, bízva a nyilvántartásban foglaltakban, biztonsággal szerezhet jogot.","hv":"5.6 c) pont (7057-7064. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/20","pont":5,"q":"Ismertesse a hatósági ellenőrzés lezárásának szabályait!","ks":["hatósági ellenőrzés lezárása","jogsértés tapasztalása","közigazgatási hatósági eljárás megindítása","más szerv eljárásának kezdeményezése","jogsértés nincs","hatósági bizonyítvány","kérelemre lefolytatott ellenőrzés","nyolc napon belül","hivatalból folytatott ellenőrzés"],"mv":"A hatósági ellenőrzés lezárása attól függ, hogy a hatóság tapasztal-e jogsértést. Ha a hatóság a hatósági ellenőrzés során jogsértést tapasztal, megindítja a közigazgatási hatósági eljárást, vagy ha a feltárt jogsértés miatt az eljárás más szerv illetékességébe tartozik, annak eljárását kezdeményezi; a megindításról azonnal, de legkésőbb nyolc napon belül gondoskodik. Ha a hatóság az ügyfél kérelmére lefolytatott ellenőrzés során jogsértést nem tapasztal, ennek tényéről hatósági bizonyítványt állít ki. A hivatalból folytatott hatósági ellenőrzés eredményéről a hatóság az ügyfél kérelmére állít ki hatósági bizonyítványt.","hv":"5.7 (7175-7219. sor)"},{"mod":"II. modul","modName":"II. modul – Jogalkotási és jogalkalmazási ismeretek","file":"kerdessor_II_modul_2026.html","qid":"5/21","pont":5,"q":"Mutassa be az ügyfél adatszolgálati kötelezettségére vonatkozó szabályokat!","ks":["adatszolgáltatási kötelezettség","hivatalbóli eljárás","hatóság felhívására","érdemi döntéshez szükséges adatok","szankcionálható","jogkövetkezmény","adatszolgáltatás megtagadása","tanúvallomás megtagadhatná","kizárási okok"],"mv":"Az ügyfél adatszolgáltatási kötelezettségét az Ákr. a hivatalbóli hatósági eljárások körében szabályozza: a hivatalbóli eljárásban az ügyfél a hatóság erre irányuló felhívására köteles közölni az érdemi döntéshez szükséges adatokat. Ha az ügyfél ennek a kötelezettségének nem tesz eleget, szankcionálható, mert ágazati törvény vagy kormányrendelet jogkövetkezményeket állapíthat meg az adatszolgáltatási kötelezettség elmulasztása vagy valótlan adatok közlése esetére. Az ügyfél jogszerűen csak akkor tagadhatja meg az adatszolgáltatást, ha a tanúvallomást is ozottságát vizsgálja. Tagja a Költségvetési Tanács elnöke (akit a köztársasági elnök nevez ki hat évre), a Magyar Nemzeti Bank elnöke és az Állami Számvevőszék elnöke; tagjai függetlenek egymástól. Feladatai közé tartozik, hogy véleményt nyilvánít a költségvetési törvény tervezetéről, dönt az Alaptörvényben előírt előzetes hozzájárulásról, és félévente véleményt ad a végrehajtásról és az államadósságról. A költségvetés elfogadásához a Tanács előzetes hozzájárulása szükséges, és kétszer foglal állást a tervezetről: a benyújtáskor és a zárószavazás előtt. A Tanácsnak vétójoga van: egyet nem értése esetén a Kormány a tervezetet ismételten köteles megtárgyalni.","hv":"2.4 fejezet (1292-1341. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"15/2","pont":15,"q":"Mutassa be a nemzeti vagyon rendeltetését és a nemzeti vagyon körébe tartozó vagyonelemeket, továbbá – azok jellemzőinek bemutatásával – ismertesse a nemzeti vagyon kategóriáit!","ks":["nemzeti vagyon","állam és helyi önkormányzatok tulajdona","közérdek szolgálata","közös szükségletek kielégítése","természeti erőforrások","jövő nemzedékek","forgalomképtelen","kizárólagos tulajdon","nemzetgazdasági szempontból kiemelt jelentőségű vagyon","korlátozottan forgalomképes","forgalomképes","koncesszió","elidegeníthető"],"mv":"A nemzeti vagyon az állam és a helyi önkormányzatok tulajdona; kezelésének és védelmének célja a közérdek szolgálata, a közös szükségletek kielégítése, a természeti erőforrások megóvása és a jövő nemzedékek szükségleteinek figyelembevétele. Vagyonelemei a tulajdonban álló dolgok, pénzügyi eszközök, társasági részesedések és vagyoni értékű jogok. A nemzeti vagyon három kategóriába sorolható: a forgalomképtelen vagyon (a kizárólagos tulajdonban álló vagyon és a nemzetgazdasági szempontból kiemelt jelentőségű vagyon) nem idegeníthető el. A korlátozottan forgalomképes vagyon csak törvényben vagy önkormányzati rendeletben kasz","költségvetési évet megelőző év","költségvetési év","költségvetési évet követő év","fejezetet irányító szerv","államháztartásért felelős miniszter","zárszámadás","állami számvevőszék"],"mv":"A költségvetési ciklus négy fázisra tagolódik. A döntés-előkészítő szakasz a költségvetési évet megelőző évben zajlik: az államháztartásért felelős miniszter ütemterve alapján a fejezetet irányító szervek elkészítik tervüket, és összeáll a törvényjavaslat, amelyet a Kormány a Költségvetési Tanácsnak és az ÁSZ-nek átad, majd benyújt az Országgyűlésnek. A döntési szakasz szintén a megelőző évben zajlik: az Országgyűlés megtárgyalja és megalkotja a költségvetésről szóló törvényt. A döntésvégrehajtási szakasz időtartama egybeesik a költségvetési évvel, a végrehajtásért a Kormány felel. A döntésvégrehajtás ellenőrzésének szakasza a költségvetési évet követő évre esik: a Kormány zárszámadást készít, amelyet az ÁSZ ellenőriz, majd az Országgyűlés törvényt alkot róla.","hv":"3.1.2 fejezet (1951-2032. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"10/3","pont":10,"q":"Határozza meg a fizetési mérleg nemzetgazdasági jelentőségét, részeit és egyenleg pozícióit (hiány, többlet) jelentőségét, finanszírozását!","ks":["fizetési mérleg","külgazdasági egyensúly","nemzetgazdaság külfölddel lebonyolított pénzügyi műveletei","folyó fizetési mérleg","tőke- és pénzügyi mérleg","jegybanki tartalék","hiány","többlet","adósságot generáló tételek","működőtőke","hitelfelvétel","állampapírok","eladósodás","nyitott gazdaság"],"mv":"A külgazdasági egyensúly pénzügyi helyzetét a fizetési mérleg mutatja, amely a nemzetgazdaság külfölddel lebonyolított pénzügyi műveleteinek mérlegszerű kimutatása; nyitott gazdaságban különösen nagy a jelentősége. A fizetési mérleg a folyó fizetési mérlegből és a tőke- és pénzügyi mérlegből áll, harmadik részeként a jegybanki tartalék egyenlegező tételként szerepel. A folyó fizetési mérleg hiánya azt jelenti, hogy több pénz áramlik ki, mint amennyi beérkezik; ezt a hiányt a tőke- és pénzügyi mérleg tételei finanszírozzák. Az adósságot nem generáló tételek (pl. közvetlen tőkebefektetések) levonása után megmaradó finanszírozási igényt adósságot generáló tételekkel, azaz külföldi hitelfelvétellel és állampapírok külföldi értékesítésével fedezik, ami az ország eladósodását növeli.","hv":"1.3.1.3 fejezet (488-544. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"10/4","pont":10,"q":"Határozza meg a jövedelemcentralizáció és az újraelosztás tartalmát, jelentőségét!","ks":["jövedelemcentralizáció","újraelosztás","redisztribúció","jövedelemtulajdonosoktól elvont jövedelmek","adók és járulékok","közhatalmi bevételek","közfeladatok finanszírozása","gdp százalékában","állami feladatellátás forrásai","közfeladatok köre","költségvetés hiánya"],"mv":"A jövedelemcentralizáció az állam által a jövedelemtulajdonosoktól (lakosság, vállalkozások) elvont jövedelmek összértéke, amelyet az állam közhatalma birtokában adók, járulékok és más közhatalmi bevételek formájában von el; nem piaci szempontú, és a közfeladatok ellátását szolgálja. Az összehasonlíthatóság miatt a GDP százalékában fejezik ki. A befolyt, centralizált jövedelmek az állami feladatellátás finanszírozásának forrásai; ezek elköltését nevezzük a jövedelmek újraelosztásának (redisztribúció). A közfeladatok finanszírozási igénye általában meghaladja a bevételeket, ezért az állam rendszerint többet oszt újra, mint amennyit centralizál, ami megnöveli a költségvetés hiányát.","hv":"1.3.2.1 fejezet (549-568. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"10/5","pont":10,"q":"Csoportosítsa a közhatalmi bevételeket! Röviden utaljon a tartalmukra és írjon mindegyikre példát!","ks":["közhatalmi bevételek","adójellegű bevételek","díjjellegű bevételek","szankciójellegű bevételek","közteherviselés","közvetlen ellenszolgáltatás nélküli","áfa szja társasági adó","illeték igazgatási szolgáltatási díj","bírság","fiskális pénzforrás","ellenszolgáltatás","jogellenes magatartás"],"mv":"A közhatalmi bevételek az államháztartás meghatározó bevételei (az összes bevétel kb. 90%-a), amelyeket az állam közhatalmát gyakorolva, fizetési kötelezettség előírásával szed be; alkotmányos alapjuk a közteherviselés elve. Három alcsoportjuk van. Az adójellegű bevételek tisztán fiskális pénzforrások, ellenükben nincs közvetlen ellenszolgáltatás (például általános forgalmi adó, személyi jövedelemadó, társasági adó, vagyonszerzési illeték). A díjjellegű bevételek esetén a fizető közvetlen ellenszolgáltatásban részesül (például eljárási illetékek, igazgatási szolgáltatási díjak, intézményi térítési díjak). A szankciójellegű bevételek a jogellenes magatartással összefüggő pénzbeli joghátrányok, a bírságok (például szabálysértési bírság, környezetvédelmi bírság).","hv":"2.3.1.1 fejezet (957-1099. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"10/6","pont":10,"q":"Mutassa be a nemzeti vagyon rendeltetését, sorolja fel a nemzeti vagyongazdálkodás feladatait!","ks":["nemzeti vagyon rendeltetése","közfeladat ellátásának biztosítása","felelős rendeltetésszerű gazdálkodás","vagyongazdálkodás feladata","teherbíró képességhez igazodó","átlátható tervszerű hatékony költségtakarékos","érték megőrzése","állag védelme","értéknövelő használat gyarapítás","elidegenítés","kivezetésre szánt állami vagyon"],"mv":"A nemzeti vagyon alapvető rendeltetése a közfeladat ellátásának biztosítása, és a nemzeti vagyonnal felelős módon, rendeltetésszerűen kell gazdálkodni. A nemzeti vagyongazdálkodás feladata a nemzeti vagyon rendeltetésének megfelelő, az állam és önkormányzat mindenkori teherbíró képességéhez igazodó, elsődlegesen a közfeladatok ellátásához és a társadalmi szükségletek kielégítéséhez szükséges, egységes elveken alapuló, átlátható, tervszerű, hatékony és költségtakarékos működtetése. További feladat a vagyon értékének megőrzése, állagának védelme, értéknövelő használata, hasznosítása, gyarapítása, a feleslegessé váló vagyontárgyak elidegenítése, valamint a kivezetésre szánt állami vagyon költségtakarékos, gyors és hatékony elidegenítése.","hv":"2.5.4 fejezet (1702-1726. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"10/7","pont":10,"q":"Mutassa be, hogy melyek a központi költségvetés főbb kiadásai!","ks":["központi költségvetés kiadásai","költségvetési szervek kiadásai","közhatalmi közigazgatási kiadások","közszolgáltatási kiadások","beruházások","támogatások","transzferek","adósságszolgálat","európai uniós társfinanszírozás","tartalékok","fejezeti kezelésű előirányzatok","tb-alapok"],"mv":"A központi költségvetésben kiadást a központi költségvetési szervek feladatainak ellátására, nemzetközi és uniós kötelezettségek teljesítésére, más alrendszer, valamint államháztartáson kívüli személyek részére lehet előirányozni. A kiadások fő kategóriái: a költségvetési szervek kiadásai (ezen belül közhatalmi/közigazgatási és közszolgáltatási kiadások), a beruházások kiadásai, az államháztartáson kívülre irányuló támogatások (például lakás- és családtámogatások), a transzferek (más alrendszer, így az önkormányzatok támogatása), az adósságszolgálat, az egyéb kiadások, az európai uniós társfinanszírozás és hozzájárulás, valamint a tartalékok. A legnagyobb tételt a költségvetési szervek közhatalmi és közszolgáltatási kiadásai jelentik.","hv":"3.1.1.2 fejezet (1896-1925. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"10/8","pont":10,"q":"Mutassa be a központi költségvetési tartalékokat!","ks":["központi költségvetési tartalékok","rendkívüli kormányzati intézkedésekre szolgáló tartalék","céltartalék","év közben meghozott kormányzati döntések","elmaradó bevételek pótlása","40%-os mértékig","első félévben","országgyűlés jóváhagyása","évközi kormányzati intézkedés fedezete","további tartalék"],"mv":"A központi költségvetésről szóló törvényben tartalékot kell képezni. A rendkívüli kormányzati intézkedésekre szolgáló tartalék az év közben meghozott kormányzati döntésekből következő feladatok finanszírozására és az elháríthatatlan ok miatt elmaradó bevételek pótlására szolgál; terhére az első félévben legfeljebb 40%-os mértékig vállalható kötelezettség, ennél nagyobbhoz az Országgyűlés jóváhagyása kell. A céltartalék olyan kiadási előirányzat, amely évközi kormányzati intézkedés fedezetéül szolgál, célját és rendeltetését meghatározták, de fejezet, cím, alcím szerinti megoszlása a törvény elfogadásakor még nem ismert. A költségvetési törvény ezeken túl további tartalékot is meghatározhat, célja és felhasználási feltételei megjelölésével.","hv":"3.1.1.3 fejezet (1927-1941. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"10/9","pont":10,"q":"Mutassa be a stabilitási törvénynek az önkormányzati adósságot keletkeztető ügylet engedélyezésére vonatkozó szabályait!","ks":["stabilitási törvény","önkormányzati adósságot keletkeztető ügylet","kormány előzetes hozzájárulása","adatszolgáltatás","kérelem","kezesség és garancia","helyi iparűzési adó","vagyoni típusú adó","kommunális adó","hozzájárulás nélküli ügyletek","uniós támogatás előfinanszírozás","likvid hitel"],"mv":"Az önkormányzati alrendszer eladósodásának kontrolljaként az Alaptörvény és a stabilitási törvény előírta, hogy az önkormányzatok adósságot keletkeztető ügyletet – meghatározott kivételekkel – csak a Kormány előzetes hozzájárulásával köthetnek. Az önkormányzatoknak minden év elején adatszolgáltatást kell teljesíteniük a tervezett ügyletekről, az év során pedig kérelmet kell benyújtaniuk. A települési önkormányzat csak akkor köthet ilyen ügyletet, ha helyi iparűzési adót vagy egy vagyoni típusú adót, illetve a magánszemélyek kommunális adóját bevezette. Egyes ügyletek hozzájárulás nélkül is létrejöhetnek, például az uniós támogatások előfinanszírozására szolgáló hitelek, illetve az éven belüli működési célú (likvid) hitelek.","hv":"2.4 és 4.1 fejezet (1285-1291, 2275-2306. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"10/10","pont":10,"q":"Határozza meg a vállalkozási tevékenység fogalmát és ismertesse, hogy milyen szabályok szerint végezhet vállalkozási tevékenységet a költségvetési szerv!","ks":["vállalkozási tevékenység","rendszeres haszonszerzés céljából","nyereségérdekelt","államháztartáson kívüli forrásból","nem kötelezően végzett","termelő szolgáltató értékesítő tevékenység","nem veszélyeztetheti az alaptevékenységet","felső határa","közvetlen és közvetett kiadás","amortizáció","maradvány nem lehet negatív","társasági adó","elkülönített tervezés és elszámolás"],"mv":"A vállalkozási tevékenység rendszeres haszonszerzés céljából (nyereségérdekelt módon), államháztartáson kívüli forrásból, nem kötelezően végzett termelő, szolgáltató, értékesítő tevékenység, amelyet a költségvetési szerv az alaptevékenysége mellett végezhet. A jogszabály korlátai: végzése nem veszélyeztetheti az alaptevékenység ellátását; felső határát a kiadási előirányzatok arányában meg kell határozni; bevételének fedeznie kell az összes közvetlen és a hozzárendelhető közvetett kiadást, valamint az amortizációt; a vállalkozási tevékenységek összesített maradványa nem lehet negatív, és a nyereség egy részét – a társasági adó mértékének megfelelően – be kell fizetni a központi költségvetésbe. Az alap- és vállalkozási tevékenység bevételeit és kiadásait elkülönítetten kell megtervezni és elszámolni.","hv":"5.4.1 fejezet (2760-2784. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államházta óság","önkormányzati tulajdon","tulajdonost megillető jogok","meghatározza költségvetését","önállóan gazdálkodik","vállalkozási tevékenység","helyi adók fajtája és mértéke","köztulajdon","törvény keretei között"],"mv":"Az Alaptörvény 32. cikke szerint a helyi önkormányzat a helyi közügyek intézése körében – a gazdálkodási önállóságához kapcsolódóan, a törvény keretei között – az alábbi jogokat gyakorolja: gyakorolja az önkormányzati tulajdon tekintetében a tulajdonost megillető jogokat; meghatározza költségvetését, és annak alapján önállóan gazdálkodik; az e célra felhasználható vagyonával és bevételeivel a kötelező feladatai ellátásának veszélyeztetése nélkül vállalkozási tevékenységet folytathat; és dönt a helyi adók fajtájáról és mértékéről. Az Alaptörvény 32. cikk (6) bekezdése szerint a helyi önkormányzatok tulajdona köztulajdon, amely feladataik ellátását szolgálja.","hv":"4.1 fejezet (2209-2218. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/5","pont":5,"q":"Határozza meg a gazdasági növekedés fogalmát, mutatóját, illetve a mutató elmozdulásának államháztartásra gyakorolt hatását!","ks":["gazdasági növekedés","gazdaság hosszú távú fejlődése","újratermelés bővülése","mennyiségi kategória","gdp","gnp","mutató","éves gdp változása","változatlan áron","elosztható jövedelem nagysága","államháztartásra gyakorolt hatás"],"mv":"A gazdasági növekedésen általában a gazdaság hosszú távú fejlődését, illetve az újratermelés bővülésének mértékét értjük; szigorúan véve mennyiségi kategória, szemben a minőségi fejlődéssel. Mérésére leggyakrabban a GDP (esetleg a GNP) mutatóját alkalmazzák. Az államháztartás szempontjából az a legfontosabb, hogy az éves GDP az előző évhez képest milyen irányban mozdult el, mennyivel nőtt vagy csökkent: első körben ettől függ az elosztható jövedelem nagysága, másodsorban az alkalmazott adórendszertől. A növekedés szemléltetésére az éves növekedés olyan idősorát használják, amelyben a GDP-t változatlan áron viszonyítják az előző évhez.","hv":"1.3.1.1 fejezet (441-454. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/6","pont":5,"q":"Határozza meg és értelmezze az államháztartási hiány fogalmát és a deficitfinanszírozás módját!","ks":["államháztartási hiány","deficit","elvont és újraelosztott jövedelem közötti különbség","gdp százalékában","maastrichti kritérium 3% alatt","deficitfinanszírozás","lakosság nettó megtakarítása","külföldi erőforrások bevonása","hitelfelvétel","állampapírok kibocsátása","túlzotthiány-eljárás"],"mv":"Az államháztartási hiány az elvont (centralizált) és az újraelosztott jövedelem közötti különbség; szokás a GDP százalékában megadni, és a maastrichti kritériumok szerint hosszabb távon 3% alatt kell tartani. Önmagában a hiány nem negatív jelenség, finanszírozása többnyire nem okoz gondot, ha a lakosság nettó megtakarítása fedezi a hiányt. A deficitfinanszírozás más szereplőktől való hitelfelvétellel, illetve állami kötvények (állampapírok) kibocsátásával történik. Ha azonban a hiány nagyobb a lakosság nettó megtakarításainál, csak külföldi erőforrások bevonásával fedezhető, ami elszívja a vállalkozások elől a forrásokat. A megengedett küszöbérték túllépése esetén uniós szinten túlzotthiány-eljárás indulhat.","hv":"1.3.2.2 fejezet (570-598. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/7","pont":5,"q":"Definiálja a felhasználási kötöttség alapelvét!","ks":["felhasználási kötöttség elve","előre meghatározott célhoz kötöttség","számadási kötelezettség","uniós források adományok segélyek","elkülönített elszámolás","kizárólag meghatározott célra","céljelleggel juttatott összegek","rendeltetésszerű felhasználás","adók módjára behajtható","államháztartásból finanszírozott vagy támogatott"],"mv":"A felhasználási kötöttség elve az államháztartási rendszerből származó egyes támogatások előre meghatározott célhoz való kötöttségét és a felhasználással kapcsolatos számadási kötelezettséget foglalja magában. Két vonatkozása van: egyfelől az uniós források, adományok, segélyek elkülönített elszámolás mellett és kizárólag a meghatározott célra használhatók fel. Másfelől az államháztartásból finanszírozott vagy támogatott természetes és jogi személyeknek számadási kötelezettségük van a céljelleggel juttatott összegek rendeltetésszerű felhasználásáról. A nem rendeltetésszerűen használt összegek adók módjára behajthatók.","hv":"2.2.2 fejezet (895-903. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/8","pont":5,"q":"Fejtse ki, hogy mit jelent a közbeszerzési kötelezettség elve!","ks":["közbeszerzési kötelezettség elve","államháztartás alrendszereihez tartozó minden szervezet","beszerzési értékhatár","árubeszerzés","építési-beruházás","szolgáltatás-megrendelés","közbeszerzés alkalmazása","kiadási előirányzatok felhasználása","értékhatár költségvetési törvény","eljárás közbeszerzési törvény"],"mv":"A közbeszerzési kötelezettség elve szerint az államháztartás alrendszereihez tartozó minden szervezet köteles – bizonyos beszerzési értékhatárokat meghaladóan – az árubeszerzési, építési-beruházási, illetve szolgáltatás-megrendelési célra előirányzott kifizetéseket, az e körbe tartozó kiadási előirányzatok felhasználását közbeszerzés alkalmazásához kötni. Az értékhatárokat évente a központi költségvetési törvény, a közbeszerzési eljárás menetét pedig a közbeszerzési törvény határozza meg.","hv":"2.2.2 fejezet (904-909. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/9","pont":5,"q":"Határozza meg a forgalomképtelen nemzeti vagyon definícióját!","ks":["forgalomképtelen nemzeti vagyon","nem idegeníthető el","nem terhelhető meg","biztosítékul nem adható","osztott tulajdon nem létesíthető","kizárólagos tulajdonban álló vagyon","nemzetgazdasági szempontból kiemelt jelentőségű vagyon","koncesszió útján hasznosítható","törvényben meghatározott kivétel"],"mv":"A forgalomképtelen nemzeti vagyonba tartozó vagyonelemek – a nemzeti vagyonról szóló törvényben meghatározott kivételekkel – nem idegeníthetők el, a törvényben felsorolt jogok (pl. vagyonkezelői jog, használati jog) kivételével nem terhelhetők meg, biztosítékul nem adhatók, és azon osztott tulajdon nem létesíthető. A törvény a forgalomképtelen nemzeti vagyon körébe sorolja a kizárólagos tulajdonban álló vagyont és a nemzetgazdasági szempontból kiemelt jelentőségű vagyont. A kizárólagos állami és önkormányzati tulajdon a legszigorúbban védett kör, amely főszabályként kizárólag koncesszió útján hasznosítható; a kiemelt jelentőségű vagyon szabályozása kevésbé szigorú, vagyonkezelés, bérlet, haszonbérlet keretében hasznosítható.","hv":"2.5.1 fejezet (1377-1395. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/10","pont":5,"q":"Sorolja fel a helyi önkormányzat saját bevételeinek körét!","ks":["helyi önkormányzat saját bevételei","helyi adók","települési adó","saját tevékenységből és vállalkozásból származó bevétel","vagyonhasznosítás","nyereség osztalék kamat bérleti díj","átvett pénzeszközök","illeték bírság díj","egyéb sajátos bevételek","intézményi bevétel"],"mv":"Az önkormányzati törvény szerint a helyi önkormányzat saját bevételei: a helyi adók (saját bevételnek minősül a települési adóból befolyt bevétel is); a saját tevékenységből, vállalkozásból és az önkormányzati vagyon hasznosításából származó bevétel, nyereség, osztalék, kamat és bérleti díj; az átvett pénzeszközök; a törvény alapján a helyi önkormányzatot megillető illeték, bírság, díj; valamint a helyi önkormányzat és intézményei egyéb sajátos bevételei. A települési önkormányzatok saját bevételeinek meghatározó része a helyi adó.","hv":"4.2.1.1 fejezet (2341-2350. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/11","pont":5,"q":"Ismertesse az önkormányzatok vállalkozási szabadságára és annak korlátaira vonatkozó rendelkezéseket!","ks":["önkormányzat vállalkozási szabadsága","nem korlátlan","helyi közösségi érdekekkel összhangban","kötelező feladatai ellátásának veszélyeztetése nélkül","felelőssége nem haladja meg vagyoni hozzájárulását","vagyonrész elvesztése","csőd esetén nem felel többi vagyonával","garanciális szabály","önként vállalt feladat"],"mv":"Az önkormányzatok részt vehetnek vállalkozásokban, főleg azért, hogy a vállalkozás hasznából teremtsék elő a feladataik ellátásához szükséges forrásokat, e célra felhasználható vagyonukkal és bevételeikkel, a kötelező feladataik ellátásának veszélyeztetése nélkül. A helyi önkormányzat vállalkozási szabadsága azonban nem korlátlan: a vállalkozási tevékenység csak a helyi közösségi érdekekkel összhangban lehetséges. Garanciális szabály, hogy a helyi önkormányzat csak olyan vállalkozásban vehet részt, amelyben felelőssége nem haladja meg vagyoni hozzájárulásának mértékét. Ez azt jelenti, hogy a vállalkozás csődje esetén csak a befektetett vagyonrészét veszítheti el, de nem felel a többi vagyonával.","hv":"4.1 fejezet (2320-2329. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/12","pont":5,"q":"Ismertesse a teljesítésigazolás lényegét a kötelezettségvállalás folyamatában!","ks":["teljesítésigazolás","szakmai teljesítés igazolása","kötelezettségvállalás folyamata","teljesítés megtörténte","termék beszerzése szolgáltatás igénybevétele","kiadások jogosságának ellenőrzése","teljesítés tényére utalás","igazolás dátuma","teljesítésigazolót a kötelezettségvállaló jelöli ki","érvényesítést megelőzi"],"mv":"A teljesítésigazolás a gazdálkodás vertikális folyamatának része, amely a kötelezettségvállalás és a pénzügyi ellenjegyzés után, az érvényesítés előtt következik. A teljesítés megtörténtét (a termék beszerzését, a szolgáltatás igénybevételét) követően annak teljesítését szakmailag igazolni kell. A szakmai teljesítésigazoló személyét a kötelezettségvállaló jelöli ki írásban, de a teljesítés igazolását maga is elvégezheti. A teljesítés igazolása során az okmányok alapján ellenőrizni kell a kiadások teljesítésének jogosságát; az igazolás tartalmazza a teljesítés tényére történő utalást és az igazolás dátumát. A teljesítésigazolót a kötelezettségvállalás teljesítésének igazolásából polgári jogi és büntetőjogi felelősség terheli.","hv":"5.4.3 fejezet (2913-2917. sor)"},{"mod":"III. modul","modName":"III. modul – Általános államháztartási ismeretek","file":"kerdessor_III_modul_2026.html","qid":"5/13","pont":5,"q":"Ismertesse a költségvetési szervek nyilvántartásával kapcsolatos rendelkezéseket!","ks":["költségvetési szervek nyilvántartása","törzskönyvi nyilvántartás","magyar államkincstár vezeti","bejegyzéssel jön létre","törléssel szűnik meg","közhiteles","jóhiszeműség vélelme","nyilvános adatok","bárki megtekintheti","elektronikus úton hozzáférhető","irányító szerv intézkedik"],"mv":"A költségvetési szerv a Magyar Államkincstár által vezetett törzskönyvi nyilvántartásba történő bejegyzéssel jön létre, és a nyilvántartásból való törléssel, a törlés napjával szűnik meg. A törzskönyvi nyilvántartás közhiteles, ami azt jelenti, hogy az ellenkező bizonyításáig vélelmezni kell a jóhiszeműségét annak, aki a nyilvántartásban szereplő adatokban bízva szerez jogot, és a bejegyzett adatról vélelmezni kell, hogy az fennáll. A nyilvántartás fennálló és törölt adatai, valamint az alapító okirat nyilvánosak, azokat bárki megtekintheti, feljegyzést készíthet, és az adatok elektronikus úton is hozzáférhetők. A bejegyzés ügyében az irányító szerv köteles intézkedni a jogszabályban meghatározott határidőn belül.","hv":"5.2.1 fejezet (26 Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/3","pont":15,"q":"Mutassa be röviden az autokratikus, a laissez faire és a demokratikus vezetési stílusokat! Ismertesse, hogy a fenti vezetési stílusok milyen közigazgatási szituációkban lehetnek sikeresek!","ks":["autokratikus","laissez faire","demokratikus","lewin","egyedül dönt","gyors döntés","tenni hagyni","önállóság","kollektíva","bevonja","fegyveres testület","rendkívüli","vezetési stílus","szituáció"],"mv":"Lewin három vezetési stílust különböztetett meg. Az autokratikus vezető szinte mindenben egyedül dönt, kategorikus utasításokat ad, ellenőriz; előnye a gyors, határozott döntés, sikeres lehet rendkívüli körülmények között vagy fegyveres testületeknél. A laissez-faire (tenni hagyni) vezetés a beosztottak önállóságára épít, kreativitást enged; jól strukturált szervezetben, képzett és elkötelezett állomány esetén hosszú távon is sikeres. A demokratikus stílusnál a vezető a kollektívára épít, a döntésekbe bevonja a munkatársakat, kikéri véleményüket; a beosztottak jobban azonosulnak a célokkal. Egyik stílus sem mindig a legjobb – a szituációhoz kell igazítani.","hv":"3.6 fejezet (1278-1341. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/4","pont":15,"q":"Határozza meg a vezetési stílus fogalmát és ismertesse a döntésközpontú vezetési stílusokat Lewin vagy Likert modellje alapján!","ks":["vezetési stílus","döntésközpontú","személyiségközpontú","lewin","likert","keménykezű parancsoló","jóakaratú parancsoló","konzultatív","részvételi csoport","beleszólás","beosztott"],"mv":"A vezetési stílus annak a módja, ahogy a vezető beosztottjai irányítását végzi, különös tekintettel a problémamegoldásra, a döntéshozatalra és a feladatkiadásra. A döntésközpontú stílusok aszerint térnek el, hogy a vezető mekkora beleszólást enged a munkatársaknak. Likert négy csoportba sorolta ezeket: keménykezű parancsoló (fenyegetés, büntetés, központosított döntés), jóakaratú parancsoló (némi bizalom, jutalmazás, szoros ellenőrzés), konzultatív (bízik a beosztottakban, felhasználja ötleteiket) és részvételi csoport (teljes bizalom, a beosztottak bevonása a célkitűzésbe). Lewin modellje az autokratikus, demokratikus és laissez-faire stílusokat különbözteti meg.","hv":"3.6 fejezet (1262-1374. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/5","pont":15,"q":"Ismertesse a személyiségközpontú vezetési stílusokat és mutasson példát a vezetési stílusok szituációnak megfelelő megválasztására!","ks":["személyiségközpontú","feladatcentrikus","beosztottcentrikus","michigeni","ohiói","kezdeményezés-strukturálás","odafigyelés","hersey","blanchard","helyzetfüggő","érettség","diktáló","eladó","résztvevő","delegáló"],"mv":"A személyiségközpontú stílusokat aszerint tipizálják, hogy a vezető a feladatra vagy a beosztottakkal való kapcsolatra figyel. A Michigeni Egyetem modellje feladatcentrikus (teljesítmény, szoros felügyelet) és beosztottcentrikus (összetartó csoport, elégedettség) magatartást különböztet meg. Az Ohiói modell a kezdeményezés-strukturálás és az odafigyelés dimenzióit használja. Hersey és Blanchard helyzetfüggő modellje a beosztott érettsége (képes/hajlandó) szerint négy stílust ajánl: diktáló (telling), eladó (selling), résztvevő (participating) és delegáló (delegating). A vezetőnek a beosztott érettségi szintjéhez kell igazítania a stílusát (kontingencialista logika).","hv":"3.6 fejezet (1376-1443. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/6","pont":15,"q":"Mutassa be a vezetés, mint döntés perspektíváját! Ennek során térjen ki a döntések típusaira és a delegálás témakörére is!","ks":["döntés","alternatívák közötti választás","egyszemélyi","testületi","csoportos döntés","optimális","kielégítő","delegálás","hatáskör","tehermentesítés","motivációs eszköz","nem delegálható"],"mv":"A vezetői feladatok központi eleme a döntés, amely az alternatívák közötti választást jelenti. Megkülönböztetünk egyszemélyi (a vezető egyénileg hozza) és testületi/csoportos döntéseket; az utóbbi megalapozottabb, ha kreativitás vagy sokféle tudás kell, de hosszabb ideig tart. Az elméletben fontos az optimális és a kielégítő döntés megkülönböztetése. A delegálás feladatok és a hozzájuk tartozó hatáskörök (legfontosabb a döntés) átadása alkalmassá tett munkatársnak; a dolgozónak motivációs eszköz, a vezetőnek tehermentesítés. Nem delegálható a túl kockázatos/bizalmas feladat, a beosztott szakértelmét meghaladó feladat, valamint a beosztottak ellenőrzése és fegyelmezése.","hv":"3.7 fejezet (1447-1506. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/7","pont":15,"q":"Egy tetszőleges választott közigazgatási vezetői munkakör esetében jellemezze a munkakör tartalmát a Jegyzetben kifejtett négy vezetési funkció mentén! Mutassa be, hogy az egyes vezetési funkciókon belül az adott vezetőnek milyen konkrét feladatai vannak! Külön térjen ki arra (és indokolja meg), hogy megítélése szerint melyek a legfajsúlyosabb vezetési funkciók és konkrét vezetői feladatok az adott munkakörben!","ks":["vezetési funkció","célkitűzés és tervezés","szervezés","személyes vezetés","ellenőrzés","fayol","munkakör","motiválás","kommunikálás","koordináció","feladat"],"mv":"A jegyzet Fayol nyomán négy vezetési funkciót tárgyal. A célkitűzés és tervezés keretében a vezető kidolgozza és lebontja a szervezet céljait, elkészíti és összehangolja a terveket (stratégiai, taktikai, operatív). A szervezés felsorakoztatja a személyi és tárgyi erőforrásokat (szervezet-, folyamat- és munkaszervezés). A személyes vezetés részterületei a motiválás, a kommunikálás (különböző stílusú irányítás) és a csoportok létrehozása, vezetése. Az ellenőrzés a működés megfelelőségét vizsgálja, a vezetési ciklus befejező lépése. Egy konkrét munkakörnél be kell mutatni az egyes funkciókhoz tartozó feladatokat, és indokolni, melyek a legfajsúlyosabbak.","hv":"3.8 fejezet (1509-1686. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/8","pont":15,"q":"Mutassa be a vezetési funkciók közül az ellenőrzési tevékenységet, külön kitérve az ellenőrzés lehetséges tárgyára és az ellenőrzési típusokra!","ks":["ellenőrzés","kontroll","ouchi","bürokratikus kontroll","piaci kontroll","klán kontroll","működés szabályszerűsége","teljesítmény","magatartás","előzetes","menet közbeni","utólagos","rendszeres","eseti"],"mv":"Az ellenőrzés (kontroll) az a vezetési funkció, amely a szervezeti működés megfelelőségét vizsgálja. Ouchi taxonómiája szerint az ellenőrzés tárgya lehet maga a működés szabályszerűsége (bürokratikus kontroll), az elért teljesítmény (piaci kontroll) és a szervezeti tagok magatartása (klán kontroll). A közigazgatásban sokáig a bürokratikus kontroll volt jellemző. Az ellenőrzés típusai időbeliség szerint: előzetes (pl. alkalmasság vizsgálata), menet közbeni (operatív beavatkozás) és utólagos (lezárt folyamatokra). Gyakoriság szerint rendszeres (pl. beszámolók) és eseti (pl. egy aggályos jelenség kivizsgálása). Az ellenőrzés magában foglalja az értékelést és a következtetések levonását is.","hv":"3.8.4 fejezet (1612-1686. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/9","pont":15,"q":"Ismertesse a vezetés, mint koordináció perspektíváját! Nevezze meg és jellemezze a koordinációs eszközöket!","ks":["koordináció","koordinációs eszköz","technokratikus","strukturális","személyorientált","szmsz","szabályzat","értekezlet","bizottság","törzskar","szervezeti kultúra","khandwalla","összehangolás"],"mv":"A koordináció a szervezeti tagok és egységek munkájának összehangolása, az egyik legfontosabb vezetői feladat. Khandwalla nyomán három koordinációs eszközcsoportot különböztetünk meg. A technokratikus eszközök formalizált, dokumentumokban rögzített előírások: alapító okirat, SZMSZ, szakmai szabályzatok, stratégiák, költségvetések, írásos utasítások. A strukturális eszközök a szervezeti struktúra koordinációs hiányosságait pótolják: törzskari egységek, termék- és folyamatfelelősök, értekezletek, bizottságok, projektek, teammunka. A személyorientált eszközök a vezető személyéhez kötődő „puha” eszközök: szervezeti kultúra fejlesztése, személyes ráhangolás, konfliktusfeloldás, identitáserősítés.","hv":"3.9 fejezet (1689-1763. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/10","pont":15,"q":"Mutassa be az e-közigazgatási szolgáltatások szintjeit és két hazai e-közigazgatási szolgáltatást soroljon be a modell segítségével!","ks":["e-közigazgatás","öt szint","információ","interakció","kétirányú interakció","tranzakció","targetizáció","e-kormányzat","ügyfélkapu","elektronikus ügyintézés","szolgáltatási szint"],"mv":"Az e-közigazgatási szolgáltatásoknak öt szintjét különböztetjük meg. Az első az információnyújtás (egyirányú tájékoztatás), a második az egyirányú interakció (űrlapok letöltése), a harmadik a kétirányú interakció (űrlapok elektronikus kitöltése, beküldése), a negyedik a tranzakció (a teljes ügymenet elektronikus, beleértve a döntést és kézbesítést). 2007-től bevezették az ötödik szintet, a targetizációt, amely automatizált ügyfélkényelmi szolgáltatásokat jelent (pl. az okmányok lejáratáról küldött automatikus értesítés). Hazai példa az ügyfélkapus szolgáltatás, az időpontfoglalás az okmányirodákba, illetve az okmányok lejáratáról küldött automatikus értesítés (targetizáció).","hv":"6.2 fejezet (2928-3022. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/11","pont":15,"q":"Határozza meg a projekt fogalmát, szakaszait és a projektciklus egyes lépéseit! Röviden ismertesse, hogy a projektciklus egyes szakaszaiban milyen fontos tevékenységeket kell elvégezni!","ks":["projekt","projektciklus","létrehozás","megvalósítás","lezárás","projektháromszög","helyzetelemzés","meghatározás","kidolgozás","előzetes értékelés","monitoring","utólagos értékelés","erőforrás"],"mv":"A projekt egyedi környezetben megtervezett és végrehajtott lépéssorozat, amely konkrét célokat meghatározott idő alatt, meghatározott erőforrásokkal kíván elérni. A projekt három szakaszra (projektháromszög) bontható: létrehozás (tervezés és programozás), megvalósítás (végrehajtás és monitoring) és lezárás (utólagos értékelés, tapasztalatok leszűrése). A létrehozás további lépésekre bomlik (projektciklus): a projekt meghatározása (helyzetelemzés, problémák feltárása), kidolgozása/tervezése, előzetes értékelése (megvalósíthatóság, fenntarthatóság) és a tárgyalások, döntések. A megvalósításnál rendszeres ellenőrzéssel követik az ütemtervet, a lezáráskor elkészül a végső beszámoló és az értékelés.","hv":"6.3 fejezet (3025-3198. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/12","pont":15,"q":"Határozza meg a szervezeti változás fogalmát! Mutassa be, hogy a szervezet tagjai hogyan fogadhatják a változásokat és röviden jellemezze a változtatás fogadtatásának eseteit, különös tekintettel a közigazgatásra!","ks":["szervezeti változás","változásvezetés","első fokú","másodfokú","kifagyasztás","átalakítás","visszafagyasztás","ellenállás","erőtérelemzés","hajtóerő","fékezőerő","tehetetlenség","létszámleépítés"],"mv":"Szervezeti változás az, amikor a szervezet egy vagy több alapvető jellemzője (stratégia, technológia, struktúra) jelentősen megváltozik; a változásvezetés ezek tudatos, célok felé irányítása. Megkülönböztetünk első fokú (rendszeren belül megoldható, pl. vezető nyugdíjazása) és másodfokú (átszervezés, összevonás) változást. Lewin szerint a megvalósítás három lépésben zajlik: felengedés (kifagyasztás), mozgatás (átalakítás), megszilárdítás (visszafagyasztás). A támogatottság erőtérelemzéssel mérhető (hajtó- és fékezőerők). A közigazgatásban a változással szembeni ellenállás (egyéni és szervezeti szintű) erős: bizonytalanság, az ismeretlentől való félelem, a status quo védelme, a hatalom féltése – ezért a közigazgatás a stabilitás fellegvára.","hv":"5.2 fejezet (2588-2692. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/13","pont":15,"q":"Mutassa be a munkanap fényképezés menetét!","ks":["munkanap-fényképezés","munkaidőalap","munkafelvételi lap","önfényképezés","tevékenység","időtartam","előkészítő szakasz","adatfelvétel","feldolgozás","értékelés","tevékenységjegyzék","kódszám","munkamegosztás"],"mv":"A munkanap-fényképezés a hasznos munkaidőalapot vizsgáló résztechnika: megállapítja, hogy a dolgozók a munkaidejüket hogyan használják ki és osztják meg a tevékenységek között. A megfigyelés tárgya a végzett munka és az egyes munkaelemek időtartama; a dolgozó a tevékenységeit a munkafelvételi lapra jegyzi. Végezheti maga a dolgozó (önfényképezés) vagy más személy. Az előkészítő szakaszban sokszorosítják a felvételi lapokat és elkészítik a tevékenységjegyzéket (kódszámok); az adatfelvételi szakaszban a dolgozók rögzítik tevékenységeiket és idejüket (kb. 2 hetes időszak); a feldolgozás-értékelés szakaszában kódolják és összesítik az adatokat. Az eredmény felhasználható a munkamegosztás aránytalanságainak kiküszöbölésére, a munkateher arányosítására.","hv":"7.1.3 D) (3924-4013. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/14","pont":15,"q":"Válaszolja meg röviden a csoportokkal kapcsolatos alábbi kérdéseket: Melyek a csoportok jellemzői? Közigazgatási környezetben milyen feladatok elvégzésére hozna létre problémamegoldó ideiglenes munkacsoportot (team-et)? Hogyan állítaná össze a munkacsoportot? Milyen csoportszerepek megléte vezethet eredményes működéshez? Milyen technikákat alkalmazna a csoportmunka kreatív részeinek megtámogatására?","ks":["csoport","közös cél","norma","team","problémamegoldó","csoportszerep","belbin","vegyes csoport","apolló","brainstorming","kreatív","összeállítás","csoportjellemző"],"mv":"A csoport két vagy több személyből álló egység, amely közös célok, érdekek, normarendszer és szabályok alapján működik; Lewin szerint lényege a tagok kölcsönhatása, egymástól való függése. Közigazgatási környezetben problémamegoldó ideiglenes munkacsoportot (team) pl. egy új eljárásrend kidolgozására, egy probléma elemzésére hoznék létre. Belbin kutatásai szerint az eltérő karakterű, vegyes csoportok teljesítenek jól (nem a csupa intelligens tagból álló Apolló-csoport). Az eredményes csoportban megtalálhatók a kulcs-csoportszerepek: vállalatépítő, elnök, serkentő, ötletgyártó, forrásfeltáró, helyzetértékelő, csapatjátékos, megvalósító. A kreatív részek támogatására csoportos alkotótechnikákat (brainstorming, 635, nominál csoport) alkalmaznék.","hv":"7.2.1 fejezet (4089-4225. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/15","pont":15,"q":"Ismertesse a brain storming módszerét és menetét, valamint a módszer alkalmazásának előnyeit és hátrányait!","ks":["brainstorming","ötletroham","moderátor","nem értékelünk","minél több ötlet","asszociáció","8-10 fő","30-40 perc","kötetlen","előny","hátrány","hangadó"],"mv":"A brainstorming (ötletroham) csoportos kreatív eljárás: egy előre kidolgozott problémával kapcsolatban a résztvevők szabadon mondanak ötleteket. Célja minél több ötlet összegyűjtése (kb. 10% hasznosítható). Alapszabály: minden ötletet rögzítünk, de egyiket sem értékeljük vagy bíráljuk; minél fantasztikusabb az ötlet, annál jobb; az ötleteket kombinálni, továbbfejleszteni kell (asszociáció). Az ötletelő csoport 8-10 fő, a moderátor ismerteti a célt és a szabályokat, az ötletgyűjtés 30-40 perc. Előnye a nagyszámú javaslat rövid idő alatt, a fantázia szabad csapongása. Hátránya, hogy alá-fölérendeltségi viszonyban a vélemények kifejtése akadályozott, a hangadók eltéríthetik a csoportot, az ötletelés iránya elterelődhet.","hv":"7.2.3 fejezet (4256-4338. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/16","pont":15,"q":"Mutassa be a csoportos szellemi alkotótechnikák közül a nominál csoportok módszer lényegét, továbbá ismertesse a módszer alkalmazásának előnyeit és hátrányait!","ks":["nominál csoport","ncm","írásban","szótlanul","egymást követő sorrendben","tilos az értékelés","szavazás","rangsorolás","súlyszám","strukturált ötletjegyzék","előny","hátrány"],"mv":"A nominál csoportok módszere (NCM) ötvözi a szellemi alkotótechnikák előnyeit. A résztvevők megkapják írásban a kérdést, majd szótlanul, elmélyedve kidolgozzák saját elképzeléseiket. Ezután egymást követő sorrendben szóban előadják javaslataikat (itt tilos az értékelés, kritizálás, akárcsak a brainstormingnál), a javaslatokat falitáblára jegyzik. Az ötletek feljegyzése után következik a megbeszélés (kérdések, magyarázatok), végül a szavazás: a résztvevők szavazókártyákkal rangsorolják, súlyszámmal látják el a fontosnak tartott megoldásokat. Így strukturált ötletjegyzék jön létre. Előnye, hogy mindenki aktív, kifejtheti véleményét; hátránya, hogy kevés javaslat is születhet, csak egy fordulóban lehet továbbfejleszteni, és nem ösztönöz kellően a kreativitásra.","hv":"7.2.7 fejezet (4490-4546. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/17","pont":15,"q":"Mutassa be a közigazgatási létszámgazdálkodás és kiválasztás főbb eszközeit, jellemezve a jogintézmények meghatározó összefüggéseit!","ks":["létszámgazdálkodás","kiválasztás","álláshely","kötött létszámgazdálkodás","toborzás","pályáztatás","személyügyi központ","kompetenciafelmérés","kinevezés","kit","munkaerő-szükséglet","kataszter"],"mv":"A közigazgatási létszámgazdálkodás és kiválasztás eszközei összefüggő rendszert alkotnak. A munkaerő-szükségletet a szerv belső átcsoportosítással, kirendeléssel, áthelyezéssel vagy új kinevezéssel biztosítja. A Kit. bevezette a kötött, álláshelyalapú központi létszámgazdálkodást: az álláshely a humánerőforrás feladatközpontú elosztásának eszköze. A kiválasztás eszközei a toborzás (toborzási adatbázis), a pályáztatás (meghívásos vagy pályázati eljárás) és a kompetenciafelmérés. A pályázati eljárást a munkáltató megkeresésére a személyügyi központ is lefolytathatja, amely előszűrést végez, kompetenciafelmérést tart és ajánlati listát állít össze. E jogintézmények célja, hogy a megfelelő ember a megfelelő álláshelyre kerüljön.","hv":"8.3.3 fejezet (5755-6151. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/18","pont":15,"q":"Az emberierőforrás-áramlás négy alapmodelljét ismerik, illetve alkalmazzák szerte a világon. Mutassa be részletesen ezt a négy modellt!","ks":["emberierőforrás-áramlás","négy alapmodell","élethosszig tartó","fel vagy ki","be vagy ki","vegyes","szenioritás","piramis","rugalmas","wilsoni-weberi","klasszikus bürokratikus"],"mv":"Az emberierőforrás-áramlásnak négy alapmodellje van. Az „élethosszig tartó” alkalmazás a wilsoni-weberi klasszikus bürokratikus megoldás igényeit elégíti ki: a felvétel a hierarchia alsó szintjén, az előrejutás a szenioritás alapján szinte automatikus, a foglalkoztatás nyugdíjig biztosított. A „fel vagy ki” modell a piramisszerűen szűkülő szervezeteké (tanácsadó cégek, egyetemek): aki nem tud előrelépni, távozik. A „be vagy ki” (rugalmas) modellnél a felvétel a hierarchia bármely szintjén történhet, a teljesítmény dönt; gyakran változó környezetben, fizikai munkaköröknél jellemző. A „vegyes” modell a legnépszerűbb: a szervezet a saját igényei szerint kombinálja az előző modelleket.","hv":"8.3.3 fejezet (5620-5671. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"15/19","pont":15,"q":"Ismertesse, hogy a közszolgálati életpálya-menedzsmentnek milyen eszközei vannak a munkaerőhiány, illetve a munkaerőtöbblet kezelésére!","ks":["életpálya-menedzsment","munkaerőhiány","munkaerőtöbblet","új felvétel","átképzés","túlóra","létszámstop","létszámleépítés","tartalékállomány","outplacement","távmunka","részmunkaidő"],"mv":"A közszolgálati életpálya-menedzsment eltérő eszközöket kínál a munkaerőhiány és a munkaerőtöbblet kezelésére. Munkaerőhiány esetén: új felvétel, korábbi dolgozók visszahívása, átképzés, munkaerő-kölcsönzés, kiszervezés, a nyugdíjkorhatár kitolása, a termelékenység/teljesítmény növelése (technológiafejlesztés, munkakör-gazdagítás, teljesítménymenedzsment), valamint rész- és osztott munkaidő, távmunka, rugalmas munkaidő bevezetése. Munkaerőtöbblet esetén: az új felvételek befagyasztása, létszámstop, létszámleépítés, elbocsátás (kíméletessé téve az outplacement-tel, azaz elhelyezkedést segítő tanácsadással), előnyugdíj, munkaidő-csökkentés, valamint a közszolgálaton belül a tartalékállomány intézménye (más területre átirányítás).","hv":"8.3.3 fejezet (5556-5618. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/1","pont":10,"q":"Mutassa be a változás szereplőit és jellemezze azokat röviden!","ks":["változás szereplői","conner","védnök","szponzor","ügynök","operatív vezető","célpont","szószóló","hatalom","legitimálás","kivitelezés"],"mv":"Daryl Conner szerint a változtatásnak négy tipikus szereplője van. A védnökök (szponzorok) azok, akiknek hatalmuk van a változtatás legitimálására, jóváhagyására, szankcionálására; ők döntenek és biztosítják a feltételeket. Az ügynökök (operatív vezetők) a gyakorlati kivitelezésért felelősek, sikerük problémaelemző, tervező és megvalósító képességükön múlik. A célpont azok az emberek/csoportok, akiknek meg kell változniuk, akiket képezni és bevonni kell. A szószóló olyan személy, aki változást szeretne, de nincs hozzá hatalma, ezért védnök támogatását kell megszereznie. Egy személy egyszerre több szerepet is betölthet.","hv":"5.2.1 fejezet (2605-2633. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/2","pont":10,"q":"Ismertesse az ügymenetvizsgálat menetét!","ks":["ügymenetvizsgálat","folyamat","előkészítő szakasz","rekonstruálás","folyamatábra","grafikus","érdemi","ügyviteli","értékelés","kritikai elemzés","ügymenetmodell","front office","back office"],"mv":"Az ügymenetvizsgálat az igazgatásszervezés elterjedt elemzési és tervezési módszere; arra koncentrál, hogy kik, milyen sorrendben és milyen szabályozás alapján végzik az ügyintézés elemeit. Az előkészítő szakaszban kiválasztják a munkafolyamatot és a jellemző ügyeket. Ezután az iratanyag és az ügyintézők kikérdezése alapján rekonstruálják a folyamatot, és elkészítik a grafikus folyamatábrát (megkülönböztetve az érdemi és az ügyviteli elemeket). Az értékelés szakaszában a szakértők bevonásával elvégzik az ügymenet kritikai elemzését, összehasonlítják a jogszabályi előírásokkal, majd kialakítják az optimális ügymenetmodellt. Az eredmény segít a front office és back office szétválasztásában, az ügyintézés ésszerűsítésében.","hv":"6.2 A) fejezet (2876-2926. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/3","pont":10,"q":"Sorolja fel az e-szolgáltatások öt szintjét és jellemezze azokat röviden!","ks":["e-szolgáltatás","öt szint","információ","egyirányú interakció","kétirányú interakció","tranzakció","targetizáció","letöltés","űrlap","elektronikus ügyintézés","automatizált"],"mv":"A közigazgatási e-szolgáltatások öt szintje: 1. Információ – egyirányú tájékoztatás, az ügyfél információkat kap (pl. honlapon). 2. Egyirányú interakció – űrlapok, nyomtatványok letöltése. 3. Kétirányú interakció – az űrlapok elektronikus kitöltése és beküldése, regisztráció. 4. Tranzakció – a teljes ügymenet elektronikusan zajlik, beleértve a döntést és a kézbesítést. 5. Targetizáció (2007-től) – automatizált ügyfélkényelmi szolgáltatások, amikor a szolgáltató proaktívan, automatikusan értesíti az ügyfelet (pl. okmányok lejáratáról).","hv":"6.2 B) fejezet (2991-3022. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/4","pont":10,"q":"Mutassa be az elektronikus közigazgatás előnyeit és hátrányait!","ks":["elektronikus közigazgatás","előny","hátrány","működési költség","gyorsabb","non-stop","7/24","átláthatóbb","személyes kapcsolat elvész","információ nehéz","költségmegtakarítás","önkiszolgálás"],"mv":"Az elektronikus közigazgatás előnyei: csökkenti a működési költségeket, hatékonyabb munkavégzést tesz lehetővé, költségmegtakarítást jelent mindkét fél részéről, kényelmesen és gyorsabban igénybe vehető, non-stop (7/24) rendelkezésre állást biztosít, megteremti az önkiszolgálás lehetőségét, javítja a kommunikációt a távoli közösségekkel, csökkenti a bonyolultságot és átláthatóbbá teszi a kormányzati munkát. Hátrányai: elvész a személyes kapcsolat az ügyfél és az ügyintéző között (amit egyesek fontosnak tartanak), valamint az információkat néha nehéz megtalálni, ezért fontos a portálok jó, áttekinthető felépítése.","hv":"6.2 B) fejezet (2958-2990. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/5","pont":10,"q":"Határozza meg röviden az e-kormányzat fogalmát, főbb összetevőit és nevezze meg legalább három előnyét, valamint egy lehetséges hátrányát!","ks":["e-kormányzat","e-government","információtechnológia","szervezeti változás","közszolgáltatás","back office","front office","infokommunikáció","modernizáció","előny","hátrány"],"mv":"Az Európai Unió definíciója szerint az e-kormányzat (e-government) az információtechnológia, a szervezeti változások és az új képességek kombinációjának felhasználása a közigazgatásban, a közszolgáltatások színvonalának javítása és a demokratikus folyamatok megerősítése céljából. Három tevékenység gyűjtőköre: infokommunikációs eszközök alkalmazása, a munkafolyamatok és működési egységek átszervezése, valamint a köztisztviselők és az ügyfelek képzése. Két fő összetevője a belső működés megújítása (back office, szolgáltatói oldal) és a lakosság/üzleti szektor kommunikációja az intézményekkel (front office, ügyfél-oldal). Előnye pl. a költségcsökkentés, gyorsaság, non-stop elérhetőség; lehetséges hátránya a személyes kapcsolat elvesztése.","hv":"6.2 B) fejezet (2939-2957. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/6","pont":10,"q":"Ismertesse, hogy mire ad választ a SWOT analízis és milyen esetekben alkalmazhatjuk sikerrel!","ks":["swot","helyzetelemzés","erősségek","gyengeségek","lehetőségek","veszélyek","strengths","weaknesses","opportunities","threats","belső","külső","stratégiaalkotás","súlyozás"],"mv":"A SWOT-analízis a helyzetelemzés legközismertebb technikája, amely a stratégiaalkotás megalapozásához, egy szervezet, eljárás vagy projekt elemzéséhez használatos. Négy mezőt tölt ki: erősségek (strengths) és gyengeségek (weaknesses) mint befolyásolható belső tényezők, valamint lehetőségek (opportunities) és veszélyek (threats) mint nem befolyásolható külső körülmények. Megmutatja, hogyan vélekednek az érdekeltek az értékelt területről, és kiinduló alapot ad a fejlesztések irányának meghatározásához. A résztvevők kitöltése után súlyozással kiválasztják a legfontosabb tényezőket, majd feltárják a mezők közötti kapcsolatokat. Sikerrel alkalmazható, ha elegendő idő áll rendelkezésre; más módszerekkel kombinálva igazán hasznos.","hv":"7.1.1 fejezet (3657-3723. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/7","pont":10,"q":"Mutassa be és jellemezze az interjúkészítés szakaszait az előkészítéstől az összefoglaló készítéséig!","ks":["interjú","előkészítés","bevezető beszélgetés","problémák tisztázása","nyílt interjú","rejtett interjú","strukturált","csoportos","egyéni","összefoglaló","rögzítés","kérdező személyisége"],"mv":"Az interjú időigényes, de hasznos adatgyűjtési módszer, amelyben beszélgetés során szerzünk ismereteket. Az előkészítő szakaszban eldöntjük, kik rendelkeznek információval, tisztázzuk az időpontot, helyszínt, vázlatot készítünk, és kiválasztjuk az interjú fajtáját. Az interjú menete: rövid bevezető beszélgetés, majd a problémák tisztázása; ragaszkodni kell a témához, kritika nélkül fogadni a válaszokat. Időnként és a végén összefoglaljuk a hallottakat. Az interjú formái: nyílt és rejtett; strukturált, strukturálatlan és részben strukturált; csoportos és egyéni. Az elhangzottakat rögzíteni kell (vázlatos jegyzetelés). Optimális időtartama kb. 1 óra; végül a beszámoló elkészítése, majd az értelmezés és értékelés következik. Sikere a kérdező személyiségétől is függ.","hv":"7.1.3 A) fejezet (3781-3839. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/8","pont":10,"q":"Ismertesse a csoport fogalmát és a csoportfejlődés lépeseit!","ks":["csoport","tuckman","csoportfejlődés","alakulás","viharzás","normázás","működés","mi érzés","konfliktus","csoportszerep","norma","csapatmunka"],"mv":"A csoport két vagy több személyből álló, közös célok, érdekek, norma- és szabályrendszer alapján működő egység. Tuckman modellje szerint a csoportok négy fejlődési szakaszon mennek keresztül. Az alakulás szakaszát a bizonytalanság jellemzi, a tagok még nem ismerik egymást; a végére kialakul a „mi” érzés. A viharzás szakaszra a konfliktusok, a szerepekért való versengés jellemző; kiválasztódik a formális és informális vezető. A normázás szakaszában szorosabbá válnak a kapcsolatok, kialakul a közös normarendszer. A működés szakaszában mindenki a feladatra koncentrál, megvalósul az igazi csapatmunka. A csoport feladata végeztével felbomlik.","hv":"7.2.1 fejezet (4089-4175. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/9","pont":10,"q":"Ismertesse a csoport méretére vonatkozó megfontolásokat és a jellemző csoportszerepeket!","ks":["csoport mérete","diád","triád","kiscsoport","nagycsoport","20 fő","belbin","csoportszerep","vállalatépítő","elnök","ötletgyártó","megvalósító","apolló"],"mv":"A csoport mérete meghatározza, hogyan dolgoznak a tagok, milyen gyakran kerülnek konfliktusba, és mennyire hatékonyak. Megkülönböztetünk kétfős (diád), háromfős (triád) csoportokat, 5-7 fős kiscsoportokat és nagycsoportokat; a 20 fő feletti nagycsoport már nehezen koordinálható. Belbin kutatásai szerint az eltérő karakterű, vegyes csoportok teljesítenek jól, nem a csupa kiváló képességűből álló Apolló-csoport (Apolló-szindróma). Belbin szerint minden sikeres csapatban felbukkannak bizonyos csoportszerepek: vállalatépítő, elnök, serkentő, ötletgyártó, forrásfeltáró, helyzetértékelő, csapatjátékos és megvalósító.","hv":"7.2.1 fejezet (4177-4213. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"10/10","pont":10,"q":"Határozza meg, hogy mely tényezők érvényre ],"mv":"A stratégiai tervezés valamely szervezet mivoltát, működését és célját formáló fundamentális döntések és akciók előállítására irányuló, céltudatos erőfeszítés; nem a végeredményre, hanem a célhoz vezető út lépéseire, az előkészítésre, ellenőrzésre és korrekcióra helyezi a hangsúlyt. A stratégiai terv az alapállapot és a célállapot közötti utat írja le; megkülönböztetünk evolutív (bázisalapú, kockázatkerülő) és jövőkép-vezérelt stratégiát. A stratégiai terv fontosabb elemei: a szervezet küldetésének (misszió) átfogó megfogalmazása, a célok (a szervezet egészére vonatkozó célrendszer), a jövőkép, valamint a külső befolyásoló tényezők listája és a célokhoz rendelt akciók, tervszámok.","hv":"6.1 fejezet (2777-2842. sor)"},{"mod":"IV. modul","modName":"IV. modul – Közigazgatás-szervezési és vezetési ismeretek","file":"kerdessor_IV_modul_2026.html","qid":"5/5","pont":5,"q":"A teljesítménymenedzsment konzisztens folyamatszabályozását milyen elemek rendszerbe építésével és alkalmazásával lehet elérni? Sorolja fel ezeket az elemeket!","ks":["teljesítménymenedzsment","folyamatszabályozás","tervezés","teljesítményelvárások","támogatás biztosítása","mérés","értékelés","visszajelzés","elismerés","rendszer fejlesztése"],"mv":"A teljesítménymenedzsment konzisztens folyamatszabályozása a következő elemek rendszerbe építésével és alkalmazásával érhető el: a teljesítmény és a teljesítménymenedzsment megtervezése (mit, miért, hogyan); a szervezeti, szervezeti egység- és egyéni teljesítményelvárások, célok fentről lefelé irányuló, összehangolt meghatározása; az elvárt teljesítményhez szükséges támogatás biztosítása, a teljesítmény folyamatos „edzése”, nyomon követése (fejlesztési tervek, coaching, monitoring); a teljesítmény mérése, értékelése és visszajelzése, az elvártnál magasabb teljesítmény elismerése, jutalmazása, az alacsonyabb szankcionálása; valamint a teljesítménymenedzsment-rendszer működésének értékelése és fejlesztése.","hv":"8.3.4 fejezet (7157-7172. sor)"},{"mod" idő egészére jár, beleértve a munkavégzés alóli mentesítés idejét is.","hv":"8.3.3 fejezet (6868-6890. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/1","pont":15,"q":"Mutassa be a Lisszaboni Szerződés elfogadásának okait és az általa hozott változásokat!","ks":["lisszaboni szerződés","alkotmányos szerződés","alkotmányszerződés bukása","reflexiós időszak","angela merkel","hárompilléres struktúra megszüntetése","jogi személyiség","eumsz","eusz","kettős többség","rendes jogalkotási eljárás","európai tanács állandó elnöke","külügyi és biztonságpolitikai főképviselő","kilépési eljárás"],"mv":"A Lisszaboni Szerződést azért fogadták el, mert az alkotmányszerződést Franciaország és Hollandia népszavazáson elutasította, megismétlése politikai lehetetlenség volt, így a 2007-es német elnökség (Angela Merkel) javaslatára átdolgozták: kiirtották a föderációra utaló szimbólumokat és elnevezéseket, de megtartották az intézményi újításokat. A szerződés 2009. december 1-jén lépett hatályba, felszámolta a hárompilléres struktúrát és jogi személyiséggel ruházta fel az Európai Uniót. Megmaradt a minősített többségi döntések kiterjesztése, 2014-től bevezették a kettős többség módszerét, a korábbi együttdöntési eljárás rendes jogalkotási eljárássá vált, az Európai Parlament teljes körű társjogalkotó lett. Az Európai Tanács állandó elnököt kapott, létrejött a külügyi és biztonságpolitikai főképviselő tisztsége, és a szerződésbe bekerült a tagállami kilépés szabályozása is.","hv":"1.7 (1058-1206. sor); 2.1 (1598-1614. sor); 1.8 (1207-1264. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/2","pont":15,"q":"Mutassa be az uniós jog elsődleges forrásait, ismertesse jellemzőit!","ks":["elsődleges jogforrás","eusz","eumsz","alapító szerződések","módosító szerződések","jegyzőkönyvek","csatlakozási szerződések","alapjogi charta","általános jogelvek","keretszerződés","ratifikáció","kormányközi konferencia","költségvetési szerződések"],"mv":"Az uniós jog elsődleges forrásainak központi elemei az Európai Unióról szóló szerződés (EUSZ) és az Európai Unió működéséről szóló szerződés (EUMSZ), amelyek a Lisszaboni Szerződés módosításai révén alkotják mai rendszerüket. Az elsődleges jogba tartoznak az alapító és módosító szerződések (Párizsi, Római, Egyesülési, Egységes Európai Okmány, Maastrichti, Amszterdami, Nizzai, Lisszaboni), továbbá a szerződésekhez csatolt jegyzőkönyvek, a költségvetési szerződések, a csatlakozási szerződések, az Alapjogi Charta és az általános jogelvek. A szerződések ratifikálásuk után minden tagállamra kötelezőek, módosításukra kormányközi konferencia keretében kerül sor. A szerződések keretszerződés jellegűek: nem pontos intézkedéseket, hanem célokat és feladatokat fogalmaznak meg, melyek megvalósítását az uniós intézmények jogalkotására bízzák.","hv":"2.1.1 (1617-1786. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/3","pont":15,"q":"Ismertesse az uniós alapjogvédelem indokoltságát, az alapjogvédelmi rendszer kialakulását és elemeit!","ks":["alapjogvédelem","általános jogelvek","bíróság jogfejlesztő gyakorlata","közös alkotmányos hagyományok","ejee","alapjogi charta","alapjogi ügynökség","eusz 6. cikk","eusz 7. cikk","diszkrimináció tilalma","egységes európai okmány preambuluma","jogállamisági keret"],"mv":"Az alapjogvédelem kezdetben nem volt prioritás, mert a közösségek szűk funkcionális együttműködést jelentettek, és a tagállamok az Európa Tanács keretében már részt vettek párhuzamos emberi jogi rendszerben. Az 1960-as évek végére azonban a közösségi jog elsőbbsége és közvetlen hatálya miatt felmerült a kérdés, hogyan érvényesülhet a közösségi jog, ha alapjogvédelmi szintje alacsonyabb a tagállaminál. Erre a Bíróság reagált, és jogfejlesztő gyakorlatával kimondta, hogy az alapjogok a közösségi jog általános jogelveinek részét képezik, melyek tartalmát a tagállamok közös alkotmányos hagyományaiból és az Emberi Jogok Európai Egyezményéből (EJEE) vezeti le. Az alapjogvédelem elemei: a Bíróság esetjoga, az EUSZ 6. cikke, az Alapjogi Charta (jogilag kötelező erővel), az EJEE-hez való csatlakozás célja, az Alapjogi Ügynökség, valamint az EUSZ 7. cikk szerinti eljárás és a jogállamiság megerősítésére irányuló keret.","hv":"3.3.1 (2469-2599. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/4","pont":15,"q":"Ismertesse az Európai Unió intézményeit és azok funkcióit! Mutassa be, hogy az egyes uniós intézmények inkább a kormányközi együttműködés, vagy a szupranacionális működés jegyeit viselik-e magukon!","ks":["európai tanács","tanács","európai bizottság","európai parlament","eu bírósága","ekb","számvevőszék","kormányköziség","szupranacionalizmus","biztosok függetlensége","társjogalkotó","szerződések őre","integráció motorja","minisztertanács"],"mv":"Az EU intézményei egyszerre viselik a kormányközi és a szupranacionális működés jegyeit. Az Európai Tanács (állam- és kormányfők, politikai irányítás) és a Tanács (miniszteri szintű képviselők, fő jogalkotó) inkább a kormányközi együttműködést jeleníti meg, mert a tagállami érdekeket juttatja érvényre. Ezzel szemben szupranacionális jellegű az Európai Bizottság (az unió érdekeinek képviselője, a Szerződések őre, javaslattevő, a biztosok függetlenek), a közvetlenül választott Európai Parlament (társjogalkotó, demokratikus legitimáció), az Európai Unió Bírósága (az uniós jog egységes alkalmazása és értelmezése), valamint az Európai Számvevőszék és az Európai Központi Bank. A Bizottság az integráció motorja, a Parlament hatásköre folyamatosan bővült, a Bíróság jogfejlesztő tevékenysége pedig az integráció előmozdításának egyik legfőbb eszköze volt.","hv":"4.1.1 (2769-2899. sor); 4.1.2 (2902-3449. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/5","pont":15,"q":"Ismertesse az uniós jogalkotás folyamatát, valamint az uniós intézmények és szervek, illetve a tagállami parlamentek szerepét a jogalkotási eljárásokban!","ks":["rendes jogalkotási eljárás","különleges jogalkotási eljárás","bizottság javaslata","társjogalkotó","három olvasat","egyeztetőbizottság","egyetértési eljárás","konzultációs eljárás","nemzeti parlamentek","szubszidiaritás-vizsgálat","sárga lapos eljárás","indokolt vélemény","jogalkotói háromszög"],"mv":"Az uniós jogalkotás a jogalkotói háromszög (Bizottság, Tanács, Európai Parlament) részvételével zajlik. A Bizottság a javaslattevő, a Tanács és a Parlament a társjogalkotók. A rendes jogalkotási eljárás a Bizottság javaslatával indul, három olvasatból áll, és ha a Tanács és a Parlament a második olvasatban sem jut megállapodásra, egyeztetőbizottságot hívnak össze; a harmadik olvasatban elfogadott szöveg alapján születik meg a jogi aktus. A különleges jogalkotási eljárásban a Tanács vagy a Parlament önállóan alkot jogszabályt a másik intézmény közreműködésével: egyetértési (vétójog) vagy konzultációs (nem kötelező vélemény) eljárás keretében. A Lisszaboni Szerződés rögzítette a nemzeti parlamentek előzetes véleményezési jogát: a jogalkotási aktus tervezetét megküldik nekik, és nyolc héten belül indokolt véleményt fogalmazhatnak meg a szubszidiaritás elvének sérelméről (sárga lapos eljárás).","hv":"4.2.3 (3751-3855. sor); 4.2.1 (3642-3670. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/6","pont":15,"q":"Ismertesse a többéves pénzügyi keret fogalmát, jelentőségét és gyakorlati megvalósulását!","ks":["többéves pénzügyi keret","tpk","hosszú távú költségvetés","felső határ","kötelezettségvállalási előirányzat","kifizetési előirányzat","fejezetek","hét év","parlament egyetértése","tanács egyhangúlag","nextgenerationeu","tervezési eszköz","2021-2027"],"mv":"A többéves pénzügyi keret (TPK) az EU hosszú távú költségvetése, amely az EUMSZ szerint legalább öt, a gyakorlatban hét évre szól, és 1988 óta része az unió működésének. Éves szinten felső határt szab a kiadásokra, és kiadási kategóriánként (fejezetenként) határozza meg a kötelezettségvállalási és kifizetési előirányzatok éves felső határát, így biztosítja a kiadások tervezhetőségét és kiszámíthatóságát. A TPK más, mint az éves költségvetés: tervezési eszköz, amely egyúttal politikai prioritásokat is rögzít. A TPK-ról az Európai Parlament egyetértését követően a Tanács egyhangúlag dönt, és az éves költségvetéseknek a TPK keretébe kell illeszkedniük. A jelenlegi, 2021-2027-es keret a Covid-19 utáni helyreállítás motorja, és a NextGenerationEU eszközzel együtt rekord forrásból gazdálkodik.","hv":"5.3.1 (4203-4321. sor); 4.2.3 (3822-3835. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/7","pont":15,"q":"Ismertesse a hatáskör-átruházás elvét és az uniós hatáskörök rendszerét!","ks":["hatáskör-átruházás elve","kizárólagos hatáskör","megosztott hatáskör","támogató hatáskör","összehangoló hatáskör","kiegészítő hatáskör","vámunió","monetáris politika","közös kereskedelempolitika","előfoglalás","beleértett hatáskör","szubszidiaritás","arányosság","általános uniós hatáskör"],"mv":"Az EU nem általános hatáskörű szervezet: csak a tagállamok által a Szerződésekben ráruházott hatáskörök határain belül járhat el, minden át nem ruházott hatáskör a tagállamoknál marad – ez a hatáskör-átruházás elve. A kizárólagos hatáskörbe tartozik a vámunió, a belső piac versenyszabályai, az euró-tagállamok monetáris politikája, a tengeri biológiai erőforrások megőrzése és a közös kereskedelempolitika; ezeket az EUMSZ kimerítően felsorolja. A megosztott hatáskörben (pl. belső piac, mezőgazdaság, környezetvédelem, fogyasztóvédelem, energia) a tagállamok csak annyiban járhatnak el, amennyiben az unió nem gyakorolta hatáskörét (előfoglalás elve). A támogató, összehangoló vagy kiegészítő hatáskörben (pl. egészségügy, ipar, kultúra, oktatás, polgári védelem) az unió nem vonhatja el a tagállami hatáskört, és nem harmonizálhat. A hatáskörök gyakorlására a szubszidiaritás és az arányosság elve irányadó.","hv":"6.1 (4859-4981. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/8","pont":15,"q":"Mutassa be az EU regionális politikáinak rendszerét!","ks":["regionális politika","kohéziós politika","erfa","kohéziós alap","esza","konvergenciaelmélet","nuts-rendszer","konvergenciarégió","75 százalék gdp","partnerség elve","delors-i. csomag","strukturális alapok","nettó haszonélvező","szolidaritás"],"mv":"Az EU regionális (kohéziós) politikája az elmaradottabb régiók felzárkóztatását, a gazdasági, társadalmi és területi különbségek csökkentését célozza, alapját a konvergenciaelméletek adják. A politika a hetvenes években született az Európai Regionális Fejlesztési Alap (ERFA, 1974/1975) létrehozásával, majd a mediterrán bővítés és a Delors-I. csomag révén erősödött; ekkor jött létre a NUTS-rendszer és a partnerség alapelve. A kohéziós alapokból azok a konvergenciarégiók részesülhetnek, amelyek a GDP-átlag 75%-a alatt teljesítenek. A Maastrichti Szerződéssel létrejött a Kohéziós Alap (környezetvédelmi és közlekedési infrastruktúrára), 2007 óta az ERFA, az ESZA és a Kohéziós Alap működik. A regionális politika a mezőgazdaság után a legnagyobb újraelosztó politika, amely a nettó befizetők és nettó haszonélvezők (köztük Magyarország) érdekét egyaránt szolgálja.","hv":"6.2.11 (6429-6603. sor); 1.4 (667-690. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/9","pont":15,"q":"Ismertesse az EU közös kül- és biztonságpolitikáját!","ks":["kkbp","közös kül- és biztonságpolitika","kormányköziség","egyhangúság","jogalkotási aktus kizárt","külügyi és biztonságpolitikai főképviselő","kettős kalap","európai külügyi szolgálat","eksz","általános iránymutatás","tanácsi határozat","kbvp","soft power","egy hangon"],"mv":"A közös kül- és biztonságpolitika (KKBP) a hetvenes évek Európai Politikai Együttműködéséből (EPC) fejlődött ki, és a Maastrichti Szerződéssel intézményesült, de mindvégig a kormányköziség maradt meghatározó. A KKBP külön szabályok és eljárások hatálya alá tartozik: az Európai Tanács és a Tanács egyhangúlag határozza meg, jogalkotási aktusok elfogadása kizárt; legfőbb eszközei az Európai Tanács általános iránymutatásai és a Tanács határozatai. A cél, hogy az EU egyetlen hangon megszólaló, egységes politikai szereplővé váljon, megvédve értékeit, megszilárdítva a demokráciát és a jogállamiságot. A Lisszaboni Szerződés legnagyobb újítása a kettős kalapos külügyi és biztonságpolitikai főképviselő (egyben a Bizottság alelnöke és a Külügyek Tanácsa elnöke) és az Európai Külügyi Szolgálat (EKSZ) létrehozása volt. A KKBP szerves részét képezi a közös biztonság- és védelempolitika (KBVP).","hv":"6.3.3 (7174-7383. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"15/10","pont":15,"q":"Mutassa be az uniós és a magyar közigazgatás kapcsolatát!","ks":["közvetett végrehajtás","közvetlen végrehajtás","együttes igazgatás","európai közigazgatási térség","ekt","szervezetalakítási szabadság","független szabályozó hatóság","sigma-program","megfelelő ügyintézéshez való jog","hatékony jogvédelem elve","decentralizált ügynökségek","helyi önkormányzatok európai chartája","alapjogi charta 41. cikk"],"mv":"Az uniós normák végrehajtása hagyományosan a tagállami közigazgatási szervek feladata volt (közvetett végrehajtás), mivel uniós szintű végrehajtó szervek hiányoztak. Az utóbbi évtizedekben azonban erősödik a közvetlen végrehajtás (uniós ügynökségek számának növekedése), és Jacques Ziller nyomán az együttes igazgatás vált meghatározóvá, ahol az uniós és tagállami igazgatás együttműködve hajtja végre az uniós jogot. A keretet az Európai Közigazgatási Térség (EKT) adja. Máig fennáll a tagállami szervezetalakítási szabadság, de egyes területeken (pl. médiafelügyelet, hírközlés, energia) az unió független szabályozó hatóságok létét követeli meg. A követelmények forrásai túlmutatnak a szigorú uniós jogon: az Európa Tanács, az OECD SIGMA-programja, az EJEE, a Helyi Önkormányzatok Európai Chartája, valamint a hatékony jogvédelem elve és az Alapjogi Charta 41. cikke szerinti megfelelő ügyintézéshez való jog.","hv":"7.3 (7940-8104. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/1","pont":10,"q":"Mutassa be az „üres székek politikáját” és az azt lezáró luxemburgi kompromisszumot!","ks":["üres székek politikája","luxemburgi kompromisszum","de gaulle","minősített többségi döntés","hallstein","1965","1966","tanács ülései","vétójog","alapvető nemzeti érdek","kormányköziség","francia miniszterek távolmaradása"],"mv":"Az üres székek politikája az 1960-as évek legsúlyosabb intézményi válsága volt, amely a minősített többségi döntések körének kiterjesztése körül bontakozott ki. De Gaulle francia elnök számára elfogadhatatlan volt, hogy a többi öt tagállam minősített többséggel olyan döntést kényszerítsen Franciaországra, amely az érdekeivel ellentétes. 1965 nyarán arra utasította minisztereit, hogy maradjanak távol a Tanács üléseitől; a mintegy hét hónapig tartó időszak az üres székek időszakaként vált híressé. A válságot 1966 elején a luxemburgi kompromisszum zárta le, amelyben a tagállamok megegyeztek, hogy többségi döntéshozatal esetén, ha egy tagállam alapvető nemzeti érdekének sérelmét véli, élhet a vétó jogával. Ezzel a korm
