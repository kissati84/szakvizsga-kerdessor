ányköziség maradt előtérben.","hv":"1.3 (579-595. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/2","pont":10,"q":"Mutassa be, hogy mi a kormányköziség és a szupranacionalizmus!","ks":["kormányköziség","szupranacionalizmus","nemzetek feletti","szuverenitás megőrzése","egyhangúság","ratifikáció","kötelező döntések","független intézmények","pénzügyi autonómia","uniós jogrend","biztosok függetlensége","kétféle döntéshozatali módszer"],"mv":"Egy nemzetközi együttműködésben alapvetően kétféle döntéshozatali módszert lehet megkülönböztetni: a kormányközit és a szupranacionálist (nemzetek felettit). A kormányközi együttműködésben a tagállamok teljes mértékben megőrzik szuverenitásukat, a döntéseket utólag ratifikálhatják vagy kimaradhatnak, a döntéshozatal egyhangú szavazással történik, és nem hoznak létre önálló közösségi jogrendet. A szupranacionális együttműködés a szuverenitás egy részének feladását feltételezi: a szervezet kötelező erejű döntéseket hoz, legalább részben a tagállamoktól független, vissza nem hívható intézményekkel működik, közvetlenül kötelező jogszabályokat alkothat, döntéseinek bíróság útján is érvényt szerez, pénzügyi autonómiával rendelkezik, és új jogrendet alakít ki. Az EU sajátos entitás, mert mindkét jegyet magán viseli: kormányközi jegy az alapító szerződések egyhangú elfogadása és ratifikálása, szupranacionális jegy az uniós jogrend, a Bíróság működése és a biztosok függetlensége.","hv":"1.1 (224-273. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/3","pont":10,"q":"Mutassa be a Római Szerződések aláírásának okait és eredményeit!","ks":["római szerződések","egk","euratom","1957","hatok","spaak-jelentés","vámunió","közös agrárpolitika","közös piac","négy szabadság","monnet","eszak","atomenergia-közösség","keretszerződés"],"mv":"A Római Szerződések aláírásának oka az ESZAK (Montánunió) sikere utáni együttműködés-bővítés igénye volt; a folyamat élére Paul-Henri Spaak állt, és az 1956-os Spaak-jelentés szinte pontosan előrevetítette a szerződések tartalmát. Két új közösség létrehozására tett javaslatot: egy atomenergia-közösségre és egy olyan gazdasági közösségre, amelynek keretében megvalósítható a vámunió és a közös agrárpolitika. Az Európai Atomenergia-közösséget (EURATOM) és az Európai Gazdasági Közösséget (EGK) alapító szerződéseket 1957. március 25-én írta alá a hat alapító ország (NSZK, Franciaország, Olaszország, Belgium, Hollandia, Luxemburg). Az EGK fő célja a közös piac, a négy szabadság megteremtése volt; a szerződés keretszerződés jellegű, és önálló intézményi struktúrát hozott létre (Bizottság, Közgyűlés, Tanács, Bíróság).","hv":"1.2 (485-543. sor); 6.2.1 (4990-4995. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/4","pont":10,"q":"Mutassa be a belső piac megvalósításáról szóló Fehér Könyvet és az Egységes Európai Okmányt!","ks":["fehér könyv","belső piac megvalósítása","egységes európai okmány","delors","fizikai akadályok","technikai akadályok","pénzügyi akadályok","1992","minősített többségi szavazás","egységes piac","schengen","kölcsönös elismerés","1986","elsőfokú bíróság"],"mv":"Jacques Delors 1984-től nagyszabású reformokba kezdett, amelynek jogi eleme az 1986-ban elfogadott (1987-től hatályos) Egységes Európai Okmány volt – ez harminc év után először frissítette az együttműködés jogi kereteit. Célja az egységes piac program végrehajtásának elősegítése, ennek érdekében az egyhangúság helyett minősített többségi szavazást írt elő (kivéve az érzékeny területeket), kodifikálta az Európai Tanácsot, bővítette a Parlament hatáskörét (hozzájárulási és együttműködési eljárás), létrehozta az Elsőfokú Bíróságot, és határidőt szabott az egységes piacra (1992. december 31.). A program intézkedés-csomagját a Bizottság a Fehér könyv a belső piac megvalósításáról című dokumentumban foglalta össze, amely három akadálykategóriát állított fel preferencia-sorrend nélkül: fizikai (határellenőrzések megszüntetése), technikai (közös szabványok, kölcsönös elismerés, közbeszerzés) és pénzügyi (adózás) akadályok.","hv":"1.5 (744-839. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/5","pont":10,"q":"Mutassa be az EU aktuális válságterületeit!","ks":["válságterületek","brexit","migrációs válság","euróválság","covid-19","orosz-ukrán háború","energiaválság","ttip","vámvita","trump","migrációs paktum","szankciók","repowereu","demokratikus deficit"],"mv":"Az EU aktuális válságterületei a 2008-as globális pénzügyi és gazdasági válsággal kezdődtek, amely az eurózóna válságát is kiváltotta és nyilvánvalóvá tette a GMU féloldalas, diszfunkcionális rendszerét (különösen a görög adósságválság). Külső környezetében új kihívások jelentkeztek: nyugaton az USA-val a TTIP leállítása és a Trump-féle vámviták, keleten az orosz agresszió Ukrajna ellen (Krím annektálása 2014, invázió 2022), valamint az ehhez kapcsolódó szankciók és energiaválság (RePowerEU). Délen a közel-keleti konfliktusok és a 2015 óta felerősödött migrációs válság, amely a dublini rendszer reformját és az új migrációs paktumot eredményezte. A Brexit, az Egyesült Királyság 2020. január 31-i kilépése példa nélküli volt, a Covid-19 járvány pedig a NextGenerationEU helyreállítási tervet hívta életre. A válságok átpolitizálták az integrációt, és kiélezték a több Európa kontra túl sok Európa vitát.","hv":"1.8 (1207-1576. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/6","pont":10,"q":"Ismertesse az uniós jog másodlagos forrásainak rendszerét!","ks":["másodlagos jogforrás","rendelet","irányelv","határozat","ajánlás","vélemény","eumsz 288. cikk","kötelező jogi aktus","soft law","felhatalmazáson alapuló jogi aktus","végrehajtási aktus","jogalkotási aktus","jogi aktusok hierarchiája","közvetlen alkalmazandóság"],"mv":"A másodlagos jogforrások az uniós intézmények jogalkotó tevékenysége során született jogi eszközök, amelyek a szerződésekben lefektetett célok megvalósulását segítik. Az EUMSZ 288. cikke szerint a kötelező jogi aktusok a rendelet, az irányelv és a határozat, a nem kötelező aktusok az ajánlás és a vélemény. A rendelet általános hatályú, teljes egészében kötelező és közvetlenül alkalmazandó, a jogegységesítés eszköze. Az irányelv az elérendő célokat illetően kötelezi a tagállamokat, de a forma és eszköz megválasztását rájuk hagyja, nemzeti jogalkotással kell átültetni. A határozat azokra kötelező, akiket címzettként megjelöl. Az ajánlás és a vélemény soft law eszközök, de a nemzeti bíróságoknak figyelembe kell venniük őket. A Lisszaboni Szerződés hierarchiát állapított meg, és megkülönböztet jogalkotási és nem jogalkotási aktusokat (felhatalmazáson alapuló és végrehajtási aktus).","hv":"2.1.2 (1797-1885. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/7","pont":10,"q":"Ismertesse az uniós jog és a tagállami belső jogrendszerek viszonyát!","ks":["uniós jog elsőbbsége","costa v. enel","simmenthal","közvetlen hatály","van gend en loos","közvetlen alkalmazhatóság","vertikális hatály","horizontális hatály","előfoglalás","17. számú nyilatkozat","tagállami belső jog","feltétel nélküli rendelkezés"],"mv":"Az uniós jog elsőbbségének elvét a szerződések nem rögzítették, azt az Európai Unió Bírósága dolgozta ki (Costa v. ENEL, majd a Simmenthal II.-ügy). Az elsőbbség azt jelenti, hogy az uniós jog és a tagállami jogszabály összeütközése esetén az uniós jogot kell alkalmazni, mégpedig a korábbi és a későbbi nemzeti jogszabállyal szemben is; a Lisszaboni Szerződés 17. számú nyilatkozata egyértelműsítette fennmaradását. Ehhez kapcsolódik az előfoglalás (pre-emption) elve, amely szerint az unió teljesen lefedi az adott szabályozási területet. A közvetlen hatály (Van Gend en Loos-ügy) azt jelenti, hogy természetes és jogi személyek a nemzeti bíróság előtt hivatkozhatnak az uniós jogra; feltétele, hogy a rendelkezés egyértelmű, pontos és feltétel nélküli legyen. A közvetlen hatály lehet vertikális (tagállammal szemben) és horizontális (magánfelek között); az irányelveknek csak vertikális közvetlen hatályuk lehet.","hv":"2.2.2 (1941-2006. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/8","pont":10,"q":"Mutassa be az uniós jog és a nemzetközi jog viszonyát!","ks":["uniós jog és nemzetközi jog","szupranacionális jog","costa v. enel","saját jogrendszer","magán- és jogi személyek jogalanyisága","nemzetközi szokásjog","nemzetközi szerződések elsőbbsége","másodlagos jogforrások","sólyom-ügy","uniós jogalanyiság","nemzetközi jog az uniós jog része"],"mv":"Az uniós jogrend olyan új, sajátos, a hagyományos nemzetközi jogtól elkülönült, nemzetek feletti (szupranacionális) jogrendszer, amelyet a Bíróság az 1964-es Costa v. ENEL-ügyben mondott ki: az EGK-szerződés saját jogrendszert hozott létre, amely a tagállamok jogrendjébe illeszkedik. Az uniós jog eredetileg államok közötti szerződésekből született, de eltér a nemzetközi jogtól: míg a nemzetközi jog jogalanyai az államok, az uniós jog a tagállamokra, valamint magán- és jogi személyekre is vonatkozik. Forrásai között a szerződések mellett döntő szereppel bírnak az uniós intézmények másodlagos jogforrásai. Az uniós jogot a nemzetközi jog releváns szabályaira tekintettel kell értelmezni (Sólyom-ügy), a nemzetközi jog az uniós jogrend része és kötelező az intézményekre; az unióra kötelező nemzetközi szerződéseknek elsőbbségük van a másodlagos uniós aktusokkal szemben, és a nemzetközi szokásjog is köti az uniót.","hv":"2.2.1 (1909-1938. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/9","pont":10,"q":"Ismertesse az EU demokratikus működésének alapelveit!","ks":["demokratikus működés","demokratikus deficit","demokratikus egyenlőség","képviseleti demokrácia","részvételi demokrácia","polgári kezdeményezés","európai parlament","európai politikai pártok","nemzeti parlamentek","civil párbeszéd","csúcsjelölti rendszer","nyilvános döntéshozatal","eusz 10. cikk"],"mv":"Az EU demokratikus legitimációja a Maastrichti Szerződés óta vita tárgya az állítólagos demokratikus deficit miatt. A Lisszaboni Szerződés erre külön cím kialakításával reagált, amely három alapelvet fogalmaz meg, kiegészítve a nemzeti parlamentek hozzájárulásával. A demokratikus egyenlőség a polgárok közötti egyenlőség elve. A képviseleti demokrácia elve szerint az uniós polgárok közvetlen képviselete az Európai Parlamentben valósul meg, az európai politikai pártok hozzájárulnak az európai politikai tudatosság kialakításához, és a képviselet érvényesül az Európai Tanácsban és a Tanácsban is. A részvételi demokrácia legfontosabb újítása az európai polgári kezdeményezés, valamint az érdekképviseleti szervezetekkel és a civil társadalommal folytatott nyílt párbeszéd. Az EUSZ a nyilvános és a polgárokhoz lehető legközelebbi szinten történő döntéshozatal elvét is deklarálja.","hv":"3.2 (2276-2464. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/10","pont":10,"q":"Ismertesse az EU Alapjogi Chartájának jogi természetét, struktúráját és alkalmazási körét!","ks":["alapjogi charta","jogi kötőerő","lisszaboni szerződés","preambulum és hét cím","méltóság","szabadságok","egyenlőség","szolidaritás","uniós polgárság jogai","igazságszolgáltatás","alkalmazási kör","tagállamok uniós jog végrehajtása","53. cikk","nem hoz létre új hatáskört"],"mv":"Az Európai Unió Alapjogi Chartáját 2000-ben hirdették ki, jogi helyzete a Lisszaboni Szerződésig vitatott volt; a Lisszaboni Szerződés a Szerződésekkel azonos jogi kötőerővel ruházta fel, bár szövegét nem emelte be a szerződésekbe. A Charta Preambulumból és hét címből áll: Méltóság, Szabadságok, Egyenlőség, Szolidaritás, az uniós polgárságból fakadó jogok, az igazságszolgáltatáshoz kapcsolódó alapvető jogok, valamint az általános és záró rendelkezések. Rendelkezéseinek természete eltérő: egyes elemek valódi jogok, mások inkább politikai célkitűzések. Alkalmazási köre: a Charta nem terjeszti ki az uniós jog alkalmazási körét, nem hoz létre új hatásköröket; rendelkezéseire csak az uniós intézmények vagy a tagállamok aktusainak megítélésekor lehet hivatkozni. Címzettjei az unió szervei és a tagállamok, ha az unió jogát hajtják végre; az 53. cikk célja az alapjogvédelmi szint csökkenésének megakadályozása.","hv":"3.3.2 (2602-2717. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/11","pont":10,"q":"Ismertesse az EU és az Emberi Jogok Európai Egyezménye kapcsolatrendszerét!","ks":["ejee","emberi jogok európai egyezménye","ejeb","eu csatlakozása","nem szerződő fél","uniós jog autonómiája","bíróság 2014-es véleménye","általános jogelvek","charta és egyezmény megfelelése","lisszaboni szerződés","európa tanács","jogi akadályok"],"mv":"Az Európai Unió az Emberi Jogok Európai Egyezménye (EJEE) szempontjából nem szerződő fél, így aktusai az Emberi Jogok Európai Bírósága (EJEB) előtt közvetlenül nem támadhatók; az EJEE nem tételes uniós jog, hanem mint annak általános elvei vált az uniós jog részévé. Ahhoz, hogy az EJEB megítélhesse az uniós intézmények tevékenységét, az EU-nak csatlakoznia kellene az Egyezményhez. A politikai szándék már az 1990-es évek elején kialakult, de jogi akadályok miatt csak a Lisszaboni Szerződés után indultak tárgyalások az Európa Tanáccsal; a csatlakozási megállapodás szövege elkészült, de az EU Bírósága 2014 decemberében elfogadott véleményében arra hivatkozva utasította el, hogy a csatlakozás sértené az uniós jog autonómiáját. A csatlakozás elvileg lehetséges, de megoldásai nem körvonalazódnak. Ennek ellenére az EJEE és az EJEB joggyakorlata meghatározó: ha a Charta az Egyezménynek megfelelő jogokat tartalmaz, azok tartalmát azonosnak kell tekinteni.","hv":"3.3.3 (2720-2749. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/12","pont":10,"q":"Hasonlítsa össze az Európai Tanács és a Tanács szervezeti felépítését és funkcióit!","ks":["európai tanács","tanács","minisztertanács","állam- és kormányfők","állandó elnök","politikai csúcsszerv","miniszteri szintű képviselők","soros elnökség","elnökségi trió","coreper","tanácsi formációk","általános ügyek tanácsa","külügyek tanácsa","minősített többség"],"mv":"Az Európai Tanács a tagállamok állam- és kormányfőit tömöríti, az unió legmagasabb szintű politikai döntéshozatalért felel; a Lisszaboni Szerződéssel vált intézménnyé, állandó elnöke van (2,5 évre választják), félévente kétszer ülésezik, de nem lát el jogalkotási feladatot – szerepe a politikai irányok és prioritások lefektetése. A Tanács (Miniszterek Tanácsa) a tagállamok egy-egy miniszteri szintű képviselőjéből áll, kormányközi alapon működik, és az Európai Parlament melletti fő jogalkotó. Különböző formációkban ülésezik, a tagállamok rotációs rendszerben, félévente váltva (elnökségi triókban) töltik be a soros elnökséget. Munkáját a COREPER (Állandó Képviselők Bizottsága) készíti elő. A Tanács két nevesített formációja az Általános Ügyek Tanácsa és a Külügyek Tanácsa. A Tanács döntéshozatala főszabályként minősített többséggel történik, míg az Európai Tanács főszabálya a konszenzus.","hv":"4.1.2 (2925-3060. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/13","pont":10,"q":"Ismertesse az Európai Bizottság szervezeti felépítését!","ks":["európai bizottság","biztosi testület","elnök","egy tagállam egy biztos","portfólió","öt év","csúcsjelölt","politikai elszámoltathatóság","biztosok függetlensége","főigazgatóságok","kabinetek","főtitkárság","külügyi főképviselő alelnök","bizalmatlansági indítvány"],"mv":"Az Európai Bizottság az unió szupranacionális intézménye, a biztosi testületből áll, amelyet az elnök vezet, és amelynek egy-egy tagja az unió 27 tagállamából származik (egy tagállam – egy biztos). Minden biztos az elnök által kijelölt tárcáért (portfólióért) felelős, megbízatásuk öt év, és nem az őket delegáló tagállam, hanem az unió érdekében kell tevékenykedniük (függetlenség). Az elnökjelöltet az Európai Tanács az európai parlamenti választások eredménye alapján javasolja (csúcsjelölti rendszer), az Európai Parlament választja meg, majd jóváhagyja a biztosok testületét, és az Európai Tanács minősített többséggel nevezi ki. Speciális a külügyi és biztonságpolitikai főképviselő helyzete, aki egyben a Bizottság alelnöke. Belső felépítését a főigazgatóságok, igazgatóságok és osztályok adják, koordinációs szerve a Főtitkárság, a biztosok mellett kabinetek működnek; testületileg az Európai Parlamentnek tartozik felelősséggel (bizalmatlansági indítvány).","hv":"4.1.2 (3193-3282. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/14","pont":10,"q":"Ismertesse, hogy a politikai elszámoltathatóság tekintetében az Európai Parlament milyen jogosultságokkal rendelkezik a Bizottsággal szemben!","ks":["politikai elszámoltathatóság","európai parlament","bizottság elnökének megválasztása","biztosi testület jóváhagyása","bizalmatlansági indítvány","csúcsjelölt","jelentéstételi kötelezettség","meghallgatás","kétharmados szavazat","testületi lemondás","ellenőrző funkció","vizsgálóbizottság"],"mv":"A politikai elszámoltathatóság tekintetében az Európai Parlament fontos jogosultságokkal rendelkezik a Bizottsággal szemben. Az Európai Tanács az európai parlamenti választások eredménye alapján tesz javaslatot a Bizottság elnökének jelölt személyre (csúcsjelölti rendszer), akit a Parlament tagjainak többségével választ meg. Ezután a Parlament szavaz a Bizottság egészének (a testület tagjainak és a külügyi főképviselőnek) a jóváhagyásáról, a biztos-jelölteket meghallgatja. A Bizottság testületileg az Európai Parlamentnek tartozik felelősséggel, így a Parlament bizalmatlansági indítványt fogadhat el, amelynek elfogadása esetén (a leadott szavazatok kétharmadával és a tagok többségével) a Bizottság tagjainak testületileg le kell mondaniuk. Ellenőrző funkciója keretében az intézmények jelentéstételre kötelesek a Parlament felé, amelyet az megtárgyal.","hv":"4.1.2 (3155-3165. sor); 4.1.1 (2816-2829. sor); 4.1.2 (3218-3221. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/15","pont":10,"q":"Ismertesse az Európai Unió Bíróságának szerepét az integráció előmozdításában, valamint szervezeti felépítését, a bírák kiválasztásának és kinevezésének fő szabályait!","ks":["eu bírósága","integráció előmozdítása","esetjog","jogfejlesztés","bíróság","törvényszék","egy tagállam egy bíró","főtanácsnok","bírák kinevezése","tagállami kormányok közös megegyezése","hat év megújítható","luxembourg","elsőfokú bíróság","közszolgálati törvényszék"],"mv":"Az Európai Unió Bírósága biztosítja az uniós jog tiszteletben tartását, egységes alkalmazását és értelmezését; bírói jogfejlesztő (esetjogi) tevékenységével az integráció egyik legerősebb előmozdítója volt, számos alapvető jogtételt (elsőbbség, közvetlen hatály) mondott ki. Székhelye Luxembourg, két szinten működik. A legmagasabb szintű ítélkező fórum a Bíróság, amelynek tagjait az egy tagállam – egy bíró elv alapján a tagállami kormányok közös megegyezéssel nevezik ki hat éves, megújítható időtartamra; munkáját főtanácsnokok segítik indítványaikkal. A Törvényszéket 1989-ben hozták létre (eredetileg Elsőfokú Bíróság) a Bíróság tehermentesítésére; a Közszolgálati Törvényszék 2016-os megszűnése után a Törvényszéket tagállamonként két-két bíró alkotja. A bírák tevékenységük során függetlenek, az elnököt tagjaik közül három évre választják.","hv":"4.1.2 (3284-3324. sor); 2.4 (2040-2062. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/16","pont":10,"q":"Mutassa be az Európai Unió Bíróságának eljárástípusait! Ezen belül ismertesse részletesen az előzetes döntéshozatali eljárás jellemzőit!","ks":["eljárástípusok","kötelezettségszegési eljárás","semmisségi eljárás","megsemmisítés iránti per","mulasztási per","kártérítési per","előzetes döntéshozatal","tagállami bíró","uniós jog bírája","értelmezés","másodlagos jog érvényessége","felfüggesztés","nem peres eljárás"],"mv":"Az Európai Unió Bíróságának fő eljárástípusai: a kötelezettségszegés megállapítása iránti per (a Bizottság, másik tagállam vagy az EKB indít pert egy tagállam ellen az uniós jogból fakadó kötelezettség megszegése miatt), a semmisségi (megsemmisítés iránti) eljárás (uniós jogi aktus megsemmisítése jogsértés esetén), a mulasztási per (kötelező döntéshozatal elmulasztása), a szerződésen kívül okozott károk megtérítése iránti per, valamint a közszolgálati perek. Kiemelkedő jelentőségű a nem peres jellegű előzetes döntéshozatali eljárás: az uniós jog bírájaként eljáró tagállami bírónak lehetősége (bizonyos esetben kötelessége), hogy a tagállami bíróság előtt folyamatban lévő ügy felfüggesztése mellett a Bírósághoz forduljon. A Bíróság előzetesen dönt az ügyben felmerült uniós jogi rendelkezések értelmezéséről és a másodlagos jogforrások érvényességéről, majd a tagállami bíró ennek alapján hozza meg végső döntését.","hv":"4.1.2 (3325-3349. sor); 4.1.1 (2839-2846. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/17","pont":10,"q":"Hasonlítsa össze a Gazdasági és Szociális Bizottság és a Régiók Bizottsága szervezeti felépítését, működését és funkcióit!","ks":["gazdasági és szociális bizottság","gszb","régiók bizottsága","tanácsadó szerv","konzultációs testület","munkaadók és munkavállalók","civil társadalom","regionális és helyi testületek","350 tag","kötelező konzultáció","nem kötelező vélemény","öt év","maastricht","1957"],"mv":"A Gazdasági és Szociális Bizottság (GSZB) és a Régiók Bizottsága az unió két tanácsadó (konzultációs) testülete, amelyek már nem sorolhatók az intézmények közé. A GSZB 1957 óta létezik, tagjai a munkaadói és munkavállalói oldal, valamint a civil társadalom szervezeteinek képviselői; biztosítja a társadalmi részvételt és a demokratikus deficit leküzdését. A Régiók Bizottságát a Maastrichti Szerződés hívta életre, tagjai választással mandátumot nyert regionális és helyi testületi képviselők, így a regionális és helyi érdekek becsatornázását biztosítja. Mindkét testület tagjainak száma legfeljebb 350, tagjaikat öt évre, megújítható kinevezéssel bízzák meg, és saját maguk közül választanak elnököt. Funkciójuk hasonló: a Szerződésekben meghatározott esetekben kötelező, máskor opcionális a velük való konzultáció, és saját kezdeményezésre is adhatnak véleményt, amely azonban nem bír kötelező erővel.","hv":"4.1.3 (3451-3528. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/18","pont":10,"q":"Mutassa be az Európai Unió ügynökségeinek definícióját, egyes típusait, valamint legfontosabb funkcióit!","ks":["uniós ügynökségek","decentralizált ügynökség","végrehajtási ügynökség","euratom-ügynökség","kbvp-ügynökség","önálló jogi személyiség","speciális feladat","végrehajtási deficit","közvetlen végrehajtás","piacfelügyelet","szerződésidegen szervek","generációs felosztás","frontex","europol"],"mv":"Az uniós ügynökség szakirodalmi fogalom: relatív önállósággal, állandó jelleggel, önálló jogi személyiséggel rendelkező, az uniós jog által speciális feladatok ellátására létrehozott szerv. Számuk növekedése a végrehajtási deficit leküzdését, a közvetlen uniós végrehajtás erősödését jelzi. Kategorizálásuk történhet generációs, funkcionális vagy a Szerződések rendszere szerinti felosztás alapján. Főbb típusaik: az Euratom-ügynökségek (nukleáris energia, pl. ESA), a közös biztonság- és védelempolitika ügynökségei (pl. Európai Védelmi Ügynökség), a végrehajtási ügynökségek (a Bizottság hozza létre uniós programok igazgatására, pl. ERCEA), valamint a decentralizált ügynökségek, ahol elsősorban zajlik a hatáskörbővülés (pl. Frontex, Europol, ECHA, EBH). Akadály, hogy az ügynökségek többnyire nem rendelkeznek elsődleges jogi alappal a Szerződésekben (szerződésidegen szervek), így csak korlátozott mérlegelési jogkört ruházhatnak rájuk.","hv":"4.1.4 (3530-3603. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/19","pont":10,"q":"Ismertesse a Szerződések felülvizsgálati eljárásainak legfontosabb típusait!","ks":["felülvizsgálati eljárás","rendes felülvizsgálati eljárás","egyszerűsített felülvizsgálati eljárás","konvent","kormányközi konferencia","ratifikáció","passerelle záradék","átvezető záradék","minősített többségre áttérés","vészfékzáradék","hatáskör bővítése","nemzeti parlamentek kifogása","európai tanács"],"mv":"A Szerződések módosítására két fő típusú eljárás létezik. A rendes felülvizsgálati eljárás keretében a módosítások a hatáskörök bővítésére vagy szűkítésére is irányulhatnak; az eljárás konvent összehívásával vagy annak mellőzésével folyhat, és a tagállami kormányok képviselőinek konferenciája dönt közös megegyezéssel, a módosítás pedig valamennyi tagállam ratifikálása után lép hatályba. Az egyszerűsített felülvizsgálati eljárásoknak több típusa van: az EU belső politikáira vonatkozó rendelkezések felülvizsgálatakor az Európai Tanács egyhangúlag határoz (a hatásköröket nem bővítheti), majd a tagállamok jóváhagyják. Másik kategória az általános átvezető (passerelle) záradékok, amelyek lehetővé teszik az egyhangúságról a minősített többségi szavazásra, illetve a különleges jogalkotási eljárásról a rendes eljárásra való áttérést – az Európai Parlament egyetértésével és a nemzeti parlamentek kifogási jogával. Léteznek különleges átvezető záradékok és vészfékzáradékok is.","hv":"4.2.2 (3696-3748. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/20","pont":10,"q":"Ismertesse az EU költségvetési és pénzügyi alapelveit!","ks":["költségvetési alapelvek","teljesség","éves jelleg","egyensúly elve","elszámolási egység","globális fedezet","specifikáció","megbízható pénzügyi menedzsment","átláthatóság","nincs hiány","euró","beruházási költségvetés","megosztott irányítás","gni egy százaléka"],"mv":"Az EU költségvetése a GNI hozzávetőleg 1%-át teszi ki, döntően beruházási jellegű, és a szubszidiaritás elve alapján csak ott lép fel, ahol a fellépés uniós szinten hatékonyabb. A költségvetés alapelvei: a teljesség és pénzügyi pontosság elve (egyetlen költségvetés, minden bevétel és kiadás feltüntetésével), az éves jelleg elve (évente kell tervezni és elfogadni), az egyensúly elve (a bevételeknek fedezniük kell a kiadásokat, hiány nem tervezhető), az elszámolási egység elve (az euró), a globális fedezet elve (a bevételeket nem rendelik meghatározott kiadásokhoz), a specifikáció elve (minden kiadási tételnek meghatározott célt kell rendelni), a megbízható pénzügyi menedzsment elve (gazdaságosság, hatékonyság, ex ante és ex post értékelés), valamint az átláthatóság elve (a költségvetést közzéteszik az EU hivatalos lapjában).","hv":"5.1.1 (4088-4105. sor); 5.1 (4056-4085. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/21","pont":10,"q":"Ismertesse az uniós közpénzügyi ellenőrzés intézményrendszerét és eljárásait!","ks":["közpénzügyi ellenőrzés","nemzeti szintű ellenőrzés","belső ellenőrzés","külső ellenőrzés","számvevőszék","megbízhatósági nyilatkozat","költségvetési ellenőrző bizottság","mentesítési eljárás","zárszámadás","olaf","csalás elleni küzdelem","éves jelentés","különjelentés"],"mv":"Az uniós közpénzügyi ellenőrzés célja, hogy az uniós költségvetésből származó összegeket jogszerűen, hatékonyan és eredményesen gyűjtsék és költsék el. A bevételek és kiadások első ellenőrzését nagyrészt a nemzeti hatóságok végzik (nemzeti szintű ellenőrzés), a tradicionális saját források és a strukturális alapok operatív kiadásai területén. Uniós szinten a belső ellenőrzést az engedélyezésre jogosult és a számvitelért felelős tisztviselők, valamint az intézmények belső ellenőrei végzik. A külső ellenőrzést a nemzeti számvevőszékek és az Európai Számvevőszék látja el; ez utóbbi évente megbízhatósági nyilatkozatot, éves beszámolót, különjelentéseket és véleményeket nyújt be. A politikai szintű ellenőrzést az Európai Parlament, azon belül a Költségvetési Ellenőrző Bizottság végzi. A költségvetési mentesítési (zárszámadási) eljárásban a Parlament az Európai Számvevőszék jelentései és a Tanács ajánlásai alapján dönt a zárszámadás jóváhagyásáról, megtagadásáról vagy elhalasztásáról, és mentesíti a Bizottságot a költségvetés végrehajtása alól.","hv":"5.4 (4652-4739. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/22","pont":10,"q":"Ismertesse az EUMSZ közbeszerzésekre vonatkozó szabályait, illetve a közbeszerzési irányelveket és a kapcsolódó hazai szabályozást!","ks":["közbeszerzés","eumsz","belső piaci szabályok","diszkrimináció tilalma","közbeszerzési irányelvek","klasszikus ajánlatkérők","közszolgáltatók","koncessziók","kbt","2015. évi cxliii. törvény","ted","nyílt eljárás","meghívásos eljárás","értékhatár"],"mv":"A közbeszerzési szabályok célja, hogy az állami beszerzések transzparens módon, az egyenlő bánásmód és a verseny tisztaságának biztosítása mellett történjenek. Az EUMSZ tiltja a más tagállamban letelepedett gazdasági szereplők hátrányos megkülönböztetését; a közbeszerzésekre irányadóak a belső piaci szabályok (áruk, letelepedés, szolgáltatásnyújtás szabadsága) és a diszkrimináció tilalma. A közbeszerzési szabályok három fő uniós irányelvben szerepelnek: a klasszikus ajánlatkérőkre, a közszolgáltatókra és a koncessziókra vonatkozóan; ezeket Magyarország a közbeszerzésekről szóló 2015. évi CXLIII. törvénybe (Kbt.) ültette át. A hirdetmény nélküli tárgyalásos eljárás kivételével minden eljárás hirdetmény feladásával indul, amelyet a TED-en kell közzétenni. A leggyakoribb eljárásfajták: nyílt, meghívásos, tárgyalásos és hirdetmény nélküli tárgyalásos eljárás. Az uniós értékhatárt el nem érő beszerzések egyszerűbb szabályait a Kbt. harmadik része tartalmazza (8 és 15 millió forintos értékhatárokkal).","hv":"5.5 (4742-4848. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/23","pont":10,"q":"Mutassa be a közös agrárpolitika reformfolyamatát kialakulásától kezdve napjainkig, különös tekintettel a támogatási rendszer átalakítására!","ks":["közös agrárpolitika","kap","emoga","közös ár","intervenciós felvásárlás","exporttámogatás","agrárlefölözés","túltermelés","1992-es reform","agenda 2000","2003-as reform","jövedelemtámogatás","termelésfüggetlen kompenzáció","stratégiai tervek"],"mv":"A Közös Agrárpolitika (KAP) már az 1957-es Római Szerződéssel az együttműködés sarokköve volt, elsősorban francia érdekként, a vámunióért cserébe. Fő céljai: a termelékenység növelése, a szektorban élők megélhetésének biztosítása, a piacok stabilizálása, az ellátás biztosítása és a fogyasztók számára elfogadható ár biztosítása. Az 1962-re kialakuló rendszert az EMOGA működtette, eszközei a közös ár, az intervenciós felvásárlások, az exporttámogatások és az agrárlefölözések voltak; három alapelve az egységes piac, a közösségi preferencia és a pénzügyi szolidaritás elve. A rendszer drága volt, túltermelést és környezetkárosodást okozott, és a költségvetés kétharmadát kötötte le. A reform 1992-ben indult (garantált árak csökkentése, termelésfüggetlen jövedelemkompenzáció), legjelentősebb átalakítása az Agenda 2000 keretében a 2003-as reform volt (jövedelemtámogatások növelése, vidékfejlesztés). Az új, 2023-tól hatályos KAP tagállami stratégiai terveket vezetett be, zöld és szociális dimenzióval.","hv":"6.2.2 (5262-5371. sor); 1.3 (603-625. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/24","pont":10,"q":"Ismertesse a szabadságon, biztonságon és a jog érvényesülésén alapuló térséget a Lisszaboni Szerződés hatályba lépését követő időszakban!","ks":["szabadság biztonság jog érvényesülése","lisszaboni szerződés","harmadik pillér megszüntetése","schengeni rendszer","europol","eurojust","frontex","európai ügyészség","eppo","rendes jogalkotási eljárás","kölcsönös elismerés","rendőrségi együttműködés","menekültügy","büntetőügyi együttműködés"],"mv":"A szabadságon, biztonságon és a jog érvényesülésén alapuló térség a maastrichti harmadik pillér (bel- és igazságügyi együttműködés) területeit tartalmazza; a Lisszaboni Szerződés a pilléres szerkezet eltörlésével hozta létre, és a döntéshozatalban főszabállyá tette a rendes jogalkotási eljárást. Négy kategóriába sorolja a kérdéseket: határellenőrzés, menekültügy és bevándorlás; igazságügyi együttműködés polgári ügyekben; igazságügyi együttműködés büntetőügyekben; rendőrségi együttműködés. Újításai: hatékonyabb és demokratikusabb döntéshozatal, az EU Bíróságának megnövekedett hatásköre, a nemzeti parlamentek szerepének megerősítése, valamint az alapjogok megerősítése a kötelező Alapjogi Chartával. Uniós ügynökségek jöttek létre: Europol, Eurojust, Frontex, EASO, EU-LISA, FRA, EUDA. A Lisszaboni Szerződés teremtette meg a jogi alapot az Európai Ügyészség (EPPO) létrehozására megerősített együttműködés keretében; ehhez Magyarország nem csatlakozott, Dánia és Írország kívülmaradási joggal (opt out) rendelkezik.","hv":"6.2.3 (5389-5542. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/25","pont":10,"q":"Ismertesse a monetáris politika „koncentrikus köreit” és értelmezze azokat az euró bevezetési kötelezettsége, illetve a túlzott deficit eljárás alkalmazhatósága szempontjából!","ks":["monetáris politika","koncentrikus körök","eurózóna","euró bevezetési kötelezettsége","túlzottdeficit-eljárás","opt-out","dánia","konvergenciakritériumok","erm ii","három szakasz","kizárólagos hatáskör","ecofin","euró csoport","európai hagyma"],"mv":"A Gazdasági és Monetáris Uniót három szakaszban vezették be, és a tagállamokat részvételük alapján három csoportba (koncentrikus körbe) sorolhatjuk. A legbelső kör az eurózóna (jelenleg 21 tagállam): ezek elérték a harmadik szakaszt, fizetőeszközük az euró, monetáris politikájuk kizárólagos uniós hatáskör, és rájuk alkalmazható a túlzottdeficit-eljárás szankciós része is. A második csoportba az opt-outtal élő Dánia tartozik, amely eljutott a második szakaszig, de nem kíván csatlakozni; vele szemben a túlzottdeficit-eljárás csak korlátozottan alkalmazható. A harmadik csoportba a Maastrichti Szerződés után belépett tagállamok tartoznak, amelyeknek az euró bevezetése nem választás kérdése (kötelező), de még nem teljesítették az ERM II és a konvergenciakritériumok kétéves betartását; velük szemben a túlzottdeficit-eljárás szankciós szakasza addig nem alkalmazható, amíg nem vezették be a közös valutát. A differenciálódás miatt az integrációt európai hagymához is hasonlítják.","hv":"6.2.6 (5728-5805. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/26","pont":10,"q":"Ismertesse a tagállami gazdaságpolitikák uniós koordinációjának céljait és eszközeit!","ks":["gazdaságpolitikák koordinációja","stabilitási és növekedési paktum","snp","konvergenciakritériumok","túlzottdeficit-eljárás","átfogó gazdaságpolitikai iránymutatások","többoldalú felügyelet","európa 2020","költségvetési paktum","európai szemeszter","hatos csomag","bankunió","fiskális politika harmonizációja","stratégiai menetrend"],"mv":"A tagállami gazdaságpolitikák uniós koordinációjának egyik fő célja a monetáris stabilitás és a GMU működésének biztosítása, mivel a monetáris politika nem működhet a fiskális politikák harmonizációja nélkül. Egyik első eszköze a Stabilitási és Növekedési Paktum (SNP), amely a konvergenciakritériumokra (árstabilitás, 3%-os hiánycél, 60%-os államadósság, árfolyam- és kamatkritérium) épül, prevenciós ágában éves stabilitási és konvergenciaprogramokat ír elő, korrekciós ágában pedig a túlzottdeficit-eljárást alkalmazza. Másik domináns eszköz az átfogó gazdaságpolitikai iránymutatások, amelyek tagállami reformokat tartalmaznak, és a többoldalú felügyeleti eljárás keretében a Tanács és a Bizottság nyomon követi végrehajtásukat (figyelmeztetés, ajánlások, végső soron túlzottdeficit-eljárás). A 2008-as válság után fogadták el a Költségvetési Paktumot, alakították ki az Európai Szemesztert (Hatos és Kettes csomag), és kezdték a bankunió kidolgozását. Az iránymutatások illeszkednek az aktuális gazdasági programhoz (Lisszaboni Stratégia, Európa 2020, stratégiai menetrend).","hv":"6.2.7 (5907-5987. sor); 6.2.6 (5807-5904. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/27","pont":10,"q":"Ismertesse az EU fogyasztóvédelmi jogalkotásának főbb jellemzőit és területeit!","ks":["fogyasztóvédelem","megosztott hatáskör","1975 első program","magas szintű védelem","fogyasztói érdekek","eumsz","szektorális szabályozás","információs hiány","átültetési hiány","fogyasztói társadalom","egészség és biztonság","tájékoztatáshoz való jog","jogérvényesítés"],"mv":"Az EU fogyasztóvédelmi politikája az 1975-ben elfogadott első program óta az egyik leglátványosabban fejlődő és legátfogóbb uniós politikává nőtte ki magát, amelynek hangsúlya a fogyasztók mint társadalmi csoport politikai, jogi és gazdasági érdekeinek előmozdítására és európai szintű képviseletére helyeződött. Térnyerése nem meglepő, mivel az uniós polgárok mintegy 500 millió fős fejlett fogyasztói társadalmat alkotnak, amelynek fogyasztói kiadásai az uniós GDP 57%-át teszik ki. Az EUMSZ a fogyasztóvédelmet az EU és a tagállamok közötti megosztott hatáskörként határozza meg, célja a fogyasztói érdekek érvényesülésének előmozdítása és a fogyasztók magas szintű védelmének biztosítása (egészség, biztonság, tájékoztatás, jogérvényesítés). A politika mérlege vegyes: a Bizottság által 2011-ben azonosított hármas hiány – az információban, az uniós szabályok átültetésében és az uniós jogalkotásban – máig fennáll.","hv":"6.2.8 (6038-6165. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/28","pont":10,"q":"Mutassa be az EU2020 stratégia energiapolitikára vonatkozó elképzeléseit! Térjen ki az energiabiztonság és a környezetvédelem kérdésköreire!","ks":["eu 2020 stratégia","energiapolitika","versenyképesség","energiabiztonság","környezetvédelem","megújuló energiaforrások","20 százalék cél","megújulóenergia-irányelv","repowereu","orosz gázfüggőség","energiaunió","liberalizáció","diverzifikáció","energiatakarékosság"],"mv":"Az energiapolitika önálló európai területként csak az 1980-as évek második felében jelent meg, és 1995-ben három cél köré épült: versenyképesség, energiabiztonság és környezetvédelem. A Lisszaboni Szerződés megosztott hatáskörként határozza meg, de külön biztosítja a tagállami hatásköröket és bevezeti a szolidaritás elemét. Az Európa 2020 stratégia részeként kiemelt cél a megújuló energiaforrások nagyobb arányú használata: az EU 2020 célkitűzése 20% alternatív energia volt, a felülvizsgált megújulóenergia-irányelv 2030-ra 32%-ot tűzött ki, összhangban a Párizsi Megállapodással. Az energiabiztonságon ma már a tagállamok energiaforrásainak biztosítását is értik; az orosz gázfüggőség (a felhasználás mintegy 40%-a) és az orosz agresszió okozta energiaválság miatt az EU a REPowerEU tervet dolgozta ki, amelynek céljai az energiatakarékosság növelése, a tiszta energiára való átállás felgyorsítása és az energiaellátás diverzifikálása, végcélként az energiaunió kialakítása. Akadály, hogy bármely tagállam saját eszközt választhat és kétoldalú megállapodást köthet harmadik országgal.","hv":"6.2.10 (6221-6427. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/29","pont":10,"q":"Ismertesse az EU környezetvédelmi politikájának célkitűzéseit, alapelveit, kereteit és eszközeit!","ks":["környezetvédelem","egységes európai okmány jogalap","rendes jogalkotási eljárás","8. cselekvési program","elővigyázatosság elve","megelőzés elve","szennyező fizet elv","forrásnál való elhárítás","európai zöld megállapodás","klímasemlegesség","környezeti hatásvizsgálat","aarhusi egyezmény","eea ügynökség","integrációs követelmény"],"mv":"Az EU környezetvédelmi politikája 1972-ben született, az első kifejezett jogalap az Egységes Európai Okmányban jelent meg, és a döntéshozatal főszabálya ma a rendes jogalkotási eljárás. Fő célkitűzései a környezet minőségének védelme és javítása, az emberi egészség védelme, a természeti erőforrások észszerű hasznosítása és a globális problémák (különösen az éghajlatváltozás) elleni küzdelem. Alapelvei: az elővigyázatosság, a megelőzés, a környezeti károk forrásuknál történő elhárítása, valamint a szennyező fizet elv. Az EUMSZ integrációs követelményt is előír: a környezetvédelmi szempontokat valamennyi uniós politikába be kell építeni. Kerete a többéves cselekvési program; a 8. cselekvési program (2021-2030) az európai zöld megállapodásra épül, és a klímasemlegesség (2050) felé mutat. Eszközei közé tartozik a környezeti hatásvizsgálat, a stratégiai környezeti vizsgálat, az Aarhusi Egyezmény szerinti nyilvánosság-részvétel, valamint az Európai Környezetvédelmi Ügynökség (EEA).","hv":"6.2.12 (6606-6744. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/30","pont":10,"q":"Ismertesse az EU közös kereskedelempolitikáját a Lisszaboni Szerződés hatályba lépését követő időszakban!","ks":["közös kereskedelempolitika","kizárólagos hatáskör","vámunió","harmadik országok","wto","szabadkereskedelmi megállapodás","bizottság képviseli","szellemi tulajdon","külföldi közvetlen befektetés","eumsz 206-207. cikk","társulási megállapodás","ceta","mercosur","védintézkedések"],"mv":"Az EU a világ egyik legnyitottabb gazdasága, a 27 tagú unió bonyolítja a világ árukereskedelmének mintegy 15%-át. A közös kereskedelempolitika a vámunió kialakulásából nőtt ki, 1970-től indult, és ma teljes egészében uniós szinten, kizárólagos hatáskörben valósul meg, így a tagállamok harmadik országokkal nem köthetnek kereskedelmi megállapodásokat. A politika kiterjed a termékek és szolgáltatások kereskedelmére, a szellemi tulajdon kereskedelmi vonatkozásaira és a külföldi közvetlen befektetésekre is; eszközei közé tartoznak az exportra, importra és a kereskedelem védelmére (dömping, exporttámogatások) vonatkozó szabályok. Szabályozása az EUMSZ 206-207. cikkeiben szerepel. Három fő cselekvési iránya: a WTO égisze alatti többoldalú tárgyalások, a kétoldalú kereskedelmi kapcsolatok és preferenciális elbánás fejlődő országoknak, valamint az exportakadályok lebontása. A WTO-alapú tárgyalásokon az EU-t a Bizottság képviseli; kiemelendő megállapodások a CETA (Kanada), a dél-koreai szabadkereskedelmi megállapodás és a Mercosur-megállapodás.","hv":"6.3.1 (6889-7003. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/31","pont":10,"q":"Ismertesse a nemzetközi fejlesztési együttműködés jelentőségét!","ks":["fejlesztési együttműködés","nemzetközi fejlesztési együttműködés","fejlesztéspolitika","legnagyobb donorközösség","volt gyarmatok","európai fejlesztési alap","efa","cotonoui megállapodás","európai konszenzus","oecd dac","fenntartható fejlesztési célok","devco","eksz","humanitárius segítségnyújtás"],"mv":"A nemzetközi fejlesztési együttműködés (fejlesztéspolitika) az integráció kezdetétől kiemelt fontosságú, és az EU külkapcsolati rendszerének egyik legfontosabb eszközévé vált. Kezdetben a tagok volt gyarmataihoz fűződő kapcsolatai ösztönözték, mára az EU mintegy 160 országban támogat fejlesztési feladatokat, és a világ legnagyobb donorközössége lett. A szerteágazó kapcsolatrendszer hátterében gazdasági, történelmi, biztonságpolitikai és erkölcsi okok állnak. A támogatások alapját az uniós Szerződések, az OECD DAC irányelvei és az ENSZ célok adják; jogalapja az EUSZ és az EUMSZ, valamint a Cotonoui Megállapodás (afrikai, karibi és csendes-óceáni államokkal). Legfontosabb dokumentuma a 2005-ös európai konszenzus, legrégebbi eszköze az Európai Fejlesztési Alap (EFA), amely nem része az uniós költségvetésnek. A tervezés a Bizottság DEVCO főigazgatóságának feladata, az összhangért az Európai Külügyi Szolgálat (EKSZ) felel.","hv":"6.3.2 (7006-7032. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/32","pont":10,"q":"Mutassa be az EU jogi személyiségét!","ks":["jogi személyiség","lisszaboni szerződés","nemzetközi jogalany","ek jogutódja","nemzetközi szerződéskötés","24. jegyzőkönyv","származékos jogi személyiség","hatáskör-átruházás","diplomáciai képviselet","delegációk","nemzetközi szervezeti tagság","saját nevében tárgyalás"],"mv":"A három alapító Közösség (Euratom, ESZAK, EGK) alapító szerződései kimondták az egyes közösségek jogi személyiségét, de az unió egészére nézve sem a Maastrichti, sem az Amszterdami, sem a Nizzai Szerződés nem tette ezt meg. A Lisszaboni Szerződés orvosolta ezt: hatálybalépésével az Európai Unió jogi személyiséget szerzett, nemzetközi jogalannyá vált, és az Európai Közösség jogutódja lett, így saját nevében tárgyalhat és köthet nemzetközi szerződéseket. A 24. jegyzőkönyv azonban származékossá teszi a jogi személyiséget: az unió csak a Szerződésekben ráruházott hatáskörökön belül járhat el. Az EU szupranacionális jellegéből fakadóan a hagyományos nemzetközi szervezetekhez képest erősebb jogosítványokat kapott más szervezetek (ENSZ, WTO) tagjaként. Az unióhoz mintegy 170 állam és nemzetközi szervezet akkreditált képviselőt, és az EU maga is mintegy 150 államhoz, illetve szervezethez küld delegációkat.","hv":"6.3.4 (7385-7455. sor); 2.1 (1601-1611. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/33","pont":10,"q":"Mutassa be Magyarország és az Európai Közösség/Európai Unió kapcsolatát az 1960-as évektől a csatlakozásig!","ks":["magyarország és ek/eu kapcsolata","1960-as évek technikai megállapodások","imf-tagság 1973","ágazati megállapodások","1988 de jure kapcsolatfelvétel","európai megállapodás","társulási szerződés 1991","kgst-orientáció","visszatérés európába","felvételi kérelem 1994","phare","koppenhágai kritériumok","csatlakozási tárgyalások","népszavazás 2003"],"mv":"Magyarország és az Európai Közösség kapcsolata a szocializmus idején megalapozott, de facto gazdasági kapcsolatrendszeren nyugodott: az 1960-as években kötött technikai megállapodások, az 1973-as magyar IMF-tagság és az 1980-as évek ágazati megállapodásai megalapozták az 1988-as de jure kapcsolatfelvételt és kereskedelmi megállapodást. Az 1991 decemberében aláírt Európai Megállapodás (társulási szerződés) – bár nem tartalmazott kötelezettségvállalást a teljes jogú tagságra – a politikai kapcsolatrendszert is intézményesítette. A csatlakozás gazdasági motivációja a külkereskedelem KGST-orientációról az EU felé fordulása volt, politikai oka a visszatérés Európába és a transzatlanti biztonsági rendszerbe illeszkedés. Magyarország 1994. április 1-jén kérte hivatalosan felvételét. A keleti bővítés mintegy tizenöt évig tartott; a PHARE-, ISPA- és SAPARD-programok segítették a felzárkózást, a csatlakozási tárgyalás 1998 márciusától 2002 decemberéig (három kormányon át) tartott, a 2003. áprilisi népszavazáson a résztvevők 83,76%-a igennel szavazott, a tagság 2004. május 1-jén lépett életbe.","hv":"7.1 (7522-7601. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/34","pont":10,"q":"Mutassa be az Európai Koordinációs Tárcaközi Bizottság struktúráját és feladatait!","ks":["európai koordinációs tárcaközi bizottság","ektb","kettős szintű kormányzás","horizontális és vertikális koordináció","egységes magyar álláspont","tanácsi álláspont","kötelezettségszegési eljárások","szakértői csoportok","helyettes államtitkárok","állandó képviselet","coreper nagykövet","kormányhatározat","országgyűlési egyeztetés"],"mv":"Az Európai Koordinációs Tárcaközi Bizottság (EKTB) az európai kormányzás hazai központja, amely a csatlakozás óta biztosítja Magyarország részvételét az unió kormányzásában. Feladatai közé tartozik az uniós intézményekben, elsősorban a Tanács fórumain és az Európai Bíróság elé kerülő ügyekben képviselendő magyar álláspont kialakítása, valamint az Országgyűléssel folytatott egyeztetési eljárás tárgyalási álláspontjainak előkészítése; megtárgyal minden releváns EU-tagsággal kapcsolatos témát, így a kötelezettségszegési eljárásokat és az ügynökségi vezetői kinevezéseket. Üléseit szakértői csoportok készítik elő, amelyeket az adott területért felelős tárcák vezetnek. Az EKTB résztvevői helyettes államtitkárok, akik a közigazgatási államtitkári értekezlethez, végső soron a Kormányhoz terjesztik fel javaslataikat. Az EKTB és a szakértői csoportok folyamatos kapcsolatban állnak a brüsszeli magyar Állandó Képviselettel (COREPER I és II nagykövet), főszabály szerint hetente egyszer ülésezik.","hv":"7.2 (7604-7693. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/35","pont":10,"q":"Mutassa be a Bizottság magyar tagjainak (biztosok) pozícióját és teljesítményét a csatlakozást megelőző időszaktól napjainkig!","ks":["magyar biztosok","balázs péter társbiztos","kovács lászló adóügyek","andor lászló szociális ügyek","navracsics tibor kultúra oktatás","várhelyi olivér szomszédságpolitika bővítés","egészségügyi biztos","portfólió","kevéssé befolyásos","ifjúsági garancia program","trócsányi összeférhetetlenség","von der leyen-bizottság"],"mv":"Csatlakozásunk óta öt személy töltött be biztosi pozíciót az Európai Bizottságban, portfóliójuk alapján egyikük sem tartozott az igazán befolyásos biztosok közé. A 2004-es átmeneti időszakban Balázs Péter társbiztos volt a regionális politikáért felelős Michel Barnier mellett. Kovács László (2004-2010) az adóügyek biztosa lett (eredetileg az energiaügyeket szánták neki); mivel az adózás többsége tagállami kompetencia, munkássága kevés figyelmet kapott, de a kedvezményes áfakulcsú termékek uniós meghatározása az érdeme. Andor László (2010-2014) a szociális ügyekért és társadalmi összetartozásért felelt, tevékeny biztos volt, nevéhez köthető az Ifjúsági Garancia Program. Navracsics Tibor (2014-től) a kultúra, oktatás, ifjúságpolitika és sport biztosa lett, meghallgatása politikai okokból hangosra sikeredett. Trócsányi László jelölésénél az EP összeférhetetlenséget állapított meg, ezért Várhelyi Olivér lett a szomszédságpolitikáért és bővítésért felelős biztos az első von der Leyen-Bizottságban, majd a második Bizottságban az egészségügyi és állatjóléti posztot kapta.","hv":"7.4 (8315-8352. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"10/36","pont":10,"q":"Mutassa be a tagállami parlamentek szerepeinek modelljeit a tagállami Európa-politikák alakításában! Ismertesse, hogy milyen szerepet játszik az Országgyűlés a magyar Európa-politika alakításában!","ks":["tagállami parlamentek szerepe","három modell","dán folketing mandátum","német bundesrat","középerős ellenőrzés","minimális szerep","országgyűlés","európai ügyek bizottsága","egyeztetési eljárás","ügydöntő hatáskör","gyenge mandátum","alaptörvény 19. cikk","harmadik modell"],"mv":"A tagállami EU-politika alakítása szempontjából a nemzeti parlamentek három csoportba oszthatók. Az első csoportba azok tartoznak, amelyek voltaképpen országuk EU-politikáját irányítják (a dán Folketing mandátumot ad a Brüsszelben tárgyaló kormánytagnak, hasonlóan erős a német Bundesrat). A középerős, második csoport nem ad mandátumot, de szorosan ellenőrzi kormánya EU-politikáját és ragaszkodik az álláspontok előzetes kontrolljához (Finnország, Hollandia). A harmadik csoportban a parlament minimális szerepet játszik. A magyar Országgyűlésben 1994 óta állandó bizottság az Európai Ügyek Bizottsága; legfontosabb feladata az egyeztetési eljárásban való közreműködés, melyben ügydöntő hatásköre van (egyes előterjesztések nem kerülnek plenáris ülésre). Az Alaptörvény 19. cikke alapján az Országgyűlés tájékoztatást kérhet és állást foglalhat (gyenge típusú mandátum). Mivel az EKTB több ezer ügyet kezel, míg a bizottság félévente 10-15 ügyet egyeztet, a magyar Országgyűlés a harmadik, minimális szerepet betöltő modellhez sorolható, és a kormányé a főszerep.","hv":"7.2 (7811-7866. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/1","pont":5,"q":"Ismertesse a koppenhágai kritériumokat!","ks":["koppenhágai kritériumok","stabil demokratikus intézményrendszer","működő piacgazdaság","tagsági követelmények teljesítése","acquis átvétele","csatlakozás feltételei","európai tanács","bizottság vizsgálata","keleti bővítés","tagjelölt országok"],"mv":"A keleti bővítés során a társulási megállapodások megkötését követően az Európai Tanács határozta meg a csatlakozás feltételeit, az úgynevezett koppenhágai kritériumokat. Eszerint a csatlakozó országoknak stabil, demokratikus intézményrendszerrel és működő piacgazdasággal kell bírniuk, valamint képesnek kell lenniük arra, hogy eleget tegyenek a tagságból adódó követelményeknek (vagyis átvegyék és alkalmazzák az uniós acquis-t). E feltételek teljesülését az Európai Bizottság folyamatosan vizsgálta a tagjelölt országokban. Pénzügyi támogatásként a PHARE-program 1989-től, az ISPA- és a SAPARD-program 1999-től segítette Magyarország és a régió felzárkózását a kritériumok teljesítéséhez.","hv":"1.7 (1089-1095. sor); 7.1 (7568-7574. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/2","pont":5,"q":"Mutassa be az északi (1973-as) bővítési kört!","ks":["északi bővítés","1973","nagy-britannia","írország","dánia","norvégia referendum","kilenc tagúra bővülés","de gaulle távozása","francia-brit alku","brit költségvetési hozzájárulás","kap viták","halászati kérdések"],"mv":"Az 1970-es években De Gaulle távozása után elhárult az akadály a bővítés elől, és kilenc tagúra bővült a Közösség. Az európai integráció 1973-ban Nagy-Britanniával, Írországgal és Dániával gyarapodott. Norvégia végül referendumon döntött úgy, hogy mégsem lép be a Közösségbe. A csatlakozási tárgyalások során a legélesebb viták a közös agrárpolitika (KAP), a büdzsébe történő befizetések és a halászati kérdések körül alakultak ki. A csatlakozás végül a francia-brit politikai alku következtében jött létre. A brit költségvetési hozzájárulás mértékének ügye azonban évekig meghatározó témája maradt az Európai Közösség és a szigetország összetűzéseinek.","hv":"1.4 (696-702. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/3","pont":5,"q":"Mutassa be röviden a mediterrán bővítési kört!","ks":["mediterrán bővítés","déli bővítés","görögország 1981","spanyolország 1986","portugália 1986","diktatúrák megszűnése","tizenkét tagú","geostratégiai helyzet","agrárpolitika kihívás","ibériai-félsziget","regionális diszparitások"],"mv":"A mediterrán (déli) bővítés a diktatúrák megszűnéséhez kötődik: az 1970-es évek közepére Spanyolországban, Portugáliában és Görögországban is megszűnt a diktatúra, és megkezdődött közeledésük az Európai Közösségekhez. Görögországgal indultak meg legkorábban a tárgyalások, és geostratégiailag kulcsfontosságú helyzetére tekintettel a csatlakozási szerződése 1981-ben lépett hatályba. Spanyolország és Portugália az 1970-es évek második felében nyújtotta be csatlakozási kérelmét, de tárgyalásaikat lassította az éppen zajló brit költségvetési vita. 1986. január elsejétől az Európai Közösségek immár tizenkét tagot számláltak. A kevésbé fejlett mediterrán országok komoly kihívást jelentettek az intézményrendszernek, és felvetették a regionális (kohéziós) politika és a strukturális támogatások erősítésének szükségességét.","hv":"1.5 (725-732. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/4","pont":5,"q":"Mutassa be az EU 1995-ös bővítési körét!","ks":["1995-ös bővítés","negyedik bővítés","ausztria","svédország","finnország","efta-tagok","semleges országok","tizenöt tagú","legkevesebb zökkenő","norvégia elutasítás","hasonló fejlettség","szovjetunió összeomlása"],"mv":"Az EU negyedik bővítésére 1995-ben került sor, amellyel a tagok száma tizenötre emelkedett; ez a bővítés zajlott a legkevesebb zökkenővel az integráció történetében. A Szovjetunió összeomlása az EFTA-tag, semleges országok kötelezettségvállalásait is felbontotta, így ezek az országok szorosabb együttműködésre, teljes jogú tagságra törekedtek. A zökkenőmentesség legfőbb oka az volt, hogy a tizenkettekhez politikailag és gazdaságilag is hasonló országok kívántak taggá válni, így a befogadást illetően nem kellett kompromisszumot kötni. Ausztria, Svédország és Finnország esetében a régi tagállamok polgárainak jelentős többsége támogatta a csatlakozást. A norvég választópolgárok azonban immár második alkalommal utasították el országuk EU-csatlakozását.","hv":"1.6 (1047-1055. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/5","pont":5,"q":"Ismertesse az uniós acquis fogalmát!","ks":["uniós acquis","uniós jogi vívmányok","közösen elért dolgok","teljes joganyag","kötelező és nem kötelező","jogszabály alapelv egyezmény","bíróság gyakorlata","csatlakozás feltétele","átvétel és adaptálás","csatlakozási tárgyalások","francia eredetű kifejezés"],"mv":"Az acquis francia eredetű kifejezés, magyar megfelelője az uniós jogi vívmányok (jelentése: közösen elért dolgok). Valójában az EU teljes joganyagát jelenti, függetlenül attól, hogy az jogilag kötelező-e vagy sem. Magában foglal minden olyan jogszabályt, alapelvet, egyezményt, nyilatkozatot, határozatot, véleményt, célkitűzést és gyakorlatot (köztük az Európai Unió Bírósága gyakorlatát), amely az unióra vonatkozik. Az acquis-t az EU-hoz csatlakozó államoknak is el kell fogadniuk; elismerése és adaptálása a taggá válás feltétele. Ebből kifolyólag az acquis kérdése a csatlakozási tárgyalások központi témáját képezi, mivel a csatlakozási folyamatban kerül sor az acquis átvételére.","hv":"2.1.3 (1888-1897. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/6","pont":5,"q":"Ismertesse, hogy mi az uniós jogharmonizáció fogalma és mi a jogharmonizáció célkitűzése!","ks":["jogharmonizáció","jogközelítés","nem jogegységesítés","nemzeti jogrendszerek közelítése","belső piac működése","négy alapszabadság","római szerződés intézményesítette","tagállami szuverenitás","nagyobb különbségek megszüntetése","büntető és polgári igazságügyi együttműködés"],"mv":"A tagállamok nemzeti jogrendszerei közelítésének igénye már a Közösségek megalakulásakor felmerült, és a Római Szerződés intézményesítette a jogharmonizációt mint a tagállamok jogközelítésének fő formáját. Sok területen nincs lehetőség és nem is cél a jogszabályok uniós szintű egységesítése – elsősorban a tagállamok szuverenitásának megőrzése és az eltérő tagállami érdekek miatt –, ezért az EU hangsúlyozottan jogharmonizációra és nem jogegységesítésre törekszik. A jogharmonizáció célja tehát nem az egységes uniós jog kialakítása, hanem a nemzeti jogrendszerek belső jogszabályainak közelítése és a nagyobb különbségek megszüntetése. Az unió olyan mértékben kívánja meg a közelítést, amennyire azt a belső piac megfelelő működése megköveteli; a technika ma már kiterjed a büntető és a polgári igazságügyi együttműködésre is.","hv":"2.3 (2023-2037. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/7","pont":5,"q":"Ismertesse az uniós polgári kezdeményezés intézményét!","ks":["uniós polgári kezdeményezés","részvételi demokrácia","lisszaboni szerződés","egymillió aláírás","tagállamok egynegyede","bizottság hatásköre","polgári bizottság","tizenkét hónap","magyarország 16500 fő","nyilvántartásba vétel","nincs jogalkotási kötelezettség","rendeleti szabályozás"],"mv":"A részvételi demokrácia körében a Lisszaboni Szerződés legfontosabb újítása az uniós polgári kezdeményezés bevezetése, amelynek részletszabályait az EU rendeleti úton határozta meg. Polgári kezdeményezést olyan ügyben lehet tenni, amely az Európai Bizottság hatáskörébe tartozik, és ahol a Szerződések végrehajtásához uniós jogi aktus elfogadására van szükség. A kezdeményezést az EU tagállamainak legalább egynegyedéből származó 1 millió uniós polgárnak kell támogatnia, a tagállamonként megállapított alsó korlátnak megfelelően (Magyarország esetében legalább 16 500 fő). Az aláírásgyűjtést egy legalább hét tagú polgári bizottság kezdeményezheti, a nyilvántartásba vétel után a szervezőknek 12 hónap áll rendelkezésre. A megfelelő számú aláírás után a Bizottságnak három hónapja van a mérlegelésre, de jogalkotási kötelezettsége nincs; eddig három sikeres kezdeményezés volt, de egyik sem eredményezett kifejezett jogalkotást.","hv":"3.2 (2392-2410. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/8","pont":5,"q":"Ismertesse az EUSZ 7. cikke szerinti eljárást az emberi jogok tiszteletben tartásának értékével ellentétes magatartást tanúsító tagállamokkal szemben!","ks":["eusz 7. cikk","emberi jogok megsértése","alapértékek súlyos megsértése","tanács","egyértelmű veszély","szavazati jog felfüggesztése","nukleáris opció","megelőző és szankciós szakasz","magyarország és lengyelország","jogállamiság","eusz 2. cikk","jogállamisági keret"],"mv":"Az EUSZ 7. cikke olyan eljárást szabályoz, amely lehetővé teszi az unió fellépését a tagállamokkal szemben, ha az emberi jogok tiszteletben tartásának értékével (EUSZ 2. cikk) ellentétes magatartást tanúsítanak. Az eljárás keretében a Tanács megállapíthatja, hogy fennáll az egyértelmű veszélye annak, hogy egy tagállam súlyosan megsérti ezeket az értékeket (megelőző szakasz), illetve hogy az értékek súlyos és tartós megsértése fennáll (szankciós szakasz). Ez utóbbi esetben a Tanács dönthet úgy, hogy a tagállam egyes szerződéses jogait – például a Tanácsban megillető szavazati jogokat – felfüggeszti. Ez sajátos eljárás, amely különbözik a kötelezettségszegési eljárástól és nem az egyéni alapjogsérelmek orvoslására irányul. A döntés megbélyegző jellege és nagy politikai súlya miatt nukleáris opciónak nevezik; alkalmazására Magyarországgal és Lengyelországgal szemben került sor. Rugalmasabb fellépést tesz lehetővé a 2014-ben bevezetett jogállamiság megerősítésére irányuló keret.","hv":"3.3.1 (2566-2599. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/9","pont":5,"q":"Mutassa be röviden az Európai Bizottság szerepét az Unió külkapcsolatainak alakításában!","ks":["bizottság külkapcsolatok","külügyi és biztonságpolitikai főképviselő","alelnök","külügyek tanácsa elnöke","kereskedelempolitika képviselete","nemzetközi tárgyalások","wto","nemzetközi szerződések előkészítése","nemzetközi szervezeti kapcsolatok","unió képviselete"],"mv":"Az Európai Bizottság fontos szerepet játszik az unió külkapcsolatainak alakításában. Kiemelkedő az EU külügyi és biztonságpolitikai főképviselőjének szerepe, aki egyben a Bizottság alelnöke és a Külügyek Tanácsának elnöke is, így részt vesz az Európai Tanács munkájában. A Bizottság tevékenysége felöleli az unió által megkötendő nemzetközi szerződések előkészítését megelőző tárgyalások vitelét, a nemzetközi kereskedelmi kapcsolatokban az unió képviseletét és a nemzetközi szervezetekkel való kapcsolatok fenntartását. A közös kereskedelempolitika WTO-alapú tárgyalásain az Európai Uniót a Bizottság képviseli, szorosan együttműködve a tagállami kormányokkal és az Európai Parlamenttel. A közös kül- és biztonságpolitika, valamint a Szerződések által meghatározott más esetek kivételével a Bizottság látja el az unió külső képviseletét.","hv":"4.1.2 (3275-3279. sor); 6.3.4 (7412-7414. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/10","pont":5,"q":"Ismertesse röviden, hogy mi az Európai Bizottság szerepe a „Szerződések őreként” és „az integráció motorjaként”!","ks":["szerződések őre","integráció motorja","európai bizottság","javaslattétel","jogszabályok kikényszerítése","kötelezettségszegési eljárás","uniós jog végrehajtásának ellenőrzése","tagállamokkal szembeni fellépés","ösztönző","szupranacionális intézmény"],"mv":"Az Európai Bizottság az unió szupranacionális intézménye, amely két fontos szerepkört tölt be. Az integráció motoraként a folyamat ösztönzője, így az uniós jogalkotási folyamatokban a legfőbb javaslattevő szerv: kidolgozza a javaslatokat, amelyeket megküld a Tanácsnak és az Európai Parlamentnek, ezzel meghatározva a további jogalkotás irányát; emellett bizonyos esetekben önállóan is rendelkezik jogalkotási jogkörrel. A Szerződések őreként a Bizottság érvényre juttatja az unió érdekeit, és ellenőrzi a jogszabályok tagállami végrehajtását: fellép a tagállamokkal szemben, ha azok nem tartják meg az uniós jog rendelkezéseit, és az Európai Unió Bírósága előtt kötelezettségszegés megállapítása iránti per megindítására jogosult. Magánfelekkel szemben is felléphet a versenypolitika, agrárpolitika és kereskedelempolitika területén az uniós jog kikényszerítése érdekében.","hv":"4.1.2 (3193-3199. sor); 4.2.1 (3649-3652. sor); 4.1.1 (2801-2804. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/11","pont":5,"q":"Vázolja fel röviden a petíciós jog gyakorlásának feltételeit!","ks":["petíciós jog","európai parlament","uniós polgár","lakóhely vagy székhely","eu tevékenységi területe","közvetlen érintettség","petíciós bizottság","egyéni vagy kollektív","elfogadhatóság","jelentés","továbbítás illetékes hatósághoz"],"mv":"A petíciós jog gyakorlásának feltétele, hogy a petíciót benyújtó uniós polgár (vagy valamely tagállamban lakóhellyel, illetve székhellyel rendelkező természetes vagy jogi személy) olyan ügyben forduljon az Európai Parlamenthez, amely az EU tevékenységi területéhez tartozik, és amelyben a benyújtó közvetlenül érintett. A petíciók az Európai Parlament Petíciós Bizottságához kerülnek, amely azok elfogadhatósága esetén vizsgálatot folytat le. A benyújtott petíciók lehetnek egyéni vagy kollektív jellegűek, és panasz mellett politikai jellegű kezdeményezéseket vagy nyomásgyakorlást is tartalmazhatnak. A Petíciós Bizottság jelentést készíthet, kezdeményezheti az Európai Parlament állásfoglalását, illetve a petíciót továbbíthatja az illetékes uniós vagy tagállami hatósághoz. A benyújtott petíciók száma évente több ezer.","hv":"3.1.2 (2203-2209. sor); 4.1.2 (3167-3169. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/12","pont":5,"q":"Ismertesse tömören az Európai Központi Bank feladat- és hatásköreit!","ks":["európai központi bank","ekb","kber","árstabilitás","monetáris politika","euróbankjegy kibocsátás","rendeletalkotás","pénzbírság","egységes felügyeleti mechanizmus","függetlenség","kormányzótanács","igazgatóság","frankfurt"],"mv":"Az Európai Központi Bank (EKB) a Központi Bankok Európai Rendszerének (KBER) része, önálló jogi személy, székhelye Frankfurt am Main; döntéshozó szervei a Kormányzótanács és az Igazgatóság. A KBER elsődleges célja az árstabilitás fenntartása, ennek veszélyeztetése nélkül támogatja az általános gazdaságpolitikát. Az EKB feladatai: jogosult engedélyezni az euróbankjegyek kibocsátását; a KBER feladatainak teljesítése érdekében rendeleteket fogadhat el, határozatokat hozhat, ajánlásokat tehet és véleményeket adhat ki; pénzbírságot vagy kényszerítő bírságot szabhat ki a kötelezettségeiket nem teljesítő vállalkozásokra; 2014 vége óta keretein belül, de szervezetileg elkülönülten felel az egységes felügyeleti mechanizmus működtetéséért, amely a rendszerkockázatot jelentő hitelintézetek közvetlen felügyeletét végzi. Alapvető szabály az EKB függetlensége: nem kérhet és nem fogadhat el utasítást.","hv":"4.1.2 (3399-3448. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/13","pont":5,"q":"Jellemezze röviden a különleges jogalkotási eljárásokat a rendes jogalkotási eljárásokkal összehasonlítva!","ks":["különleges jogalkotási eljárás","rendes jogalkotási eljárás","egyetértési eljárás","konzultációs eljárás","tanács önállóan","parlament közreműködésével","vétójog","nem köti a tanácsot","társjogalkotó","éves költségvetés","fordított helyzet nem létezik"],"mv":"A rendes jogalkotási eljárásban a Tanács és a Parlament egyenrangú társjogalkotóként vesz részt, és a Bizottság javaslata alapján közösen fogadnak el rendeleteket, irányelveket vagy határozatokat. Ezzel szemben a különleges jogalkotási eljárásokban a Tanács vagy a Parlament önállóan alkot jogszabályt a másik intézmény közreműködésével. Két fő típusa az egyetértési (hozzájárulási) és a konzultációs eljárás. Az egyetértési eljárásban a jogszabály elfogadásához a másik intézmény egyetértése szükséges; az egyetértési joggal élő intézménynek nincs lehetősége módosítási javaslatokra, de a jogosultság gyakorlatilag vétójogot ad (egyetértés hiányában nem jön létre jogszabály). A konzultációs eljárásban a Tanács alkotja meg a jogszabályt az Európai Parlamenttel folytatott konzultációt követően, és a Parlament véleménye nem köti a Tanácsot (a fordított helyzet nem létezik). Szintén különleges eljárás az unió éves költségvetésének elfogadása.","hv":"4.2.3 (3796-3820. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/14","pont":5,"q":"Jellemezze röviden az Európai Bizottság delegált döntéshozatali szerepkörét (komitológia)!","ks":["komitológia","delegált döntéshozatal","végrehajtási aktus","bizottság végrehajtási hatásköre","egységes feltételek","182/2011/eu rendelet","tagállami bizottság","vizsgálóbizottság","tanácsadó bizottság","fellebbviteli bizottság","vélemény","végrehajtási kifejezés"],"mv":"A Tanács és a Parlament által elfogadott jogalkotási aktusok végrehajtási normáit főszabály szerint a tagállamok alkotják meg, de ha a végrehajtásnak egységes feltételek szerint kell történnie, a jogszabály végrehajtási hatásköröket ruházhat a Bizottságra; ezeken az aktusokon fel kell tüntetni a végrehajtási kifejezést. A Bizottság e delegált döntéshozói szerepe kapcsán kiépült, ellenőrzést gyakorló bizottsági rendszer miatt nevezik az eljárást komitológiának, amelyet jelenleg a 182/2011/EU rendelet szabályoz. Az eljárás lényege, hogy a Bizottság munkáját a tagállamok képviselőiből álló bizottság segíti, illetve ellenőrzi (elnöke a Bizottság képviselője, aki nem szavaz). A bizottság vizsgálóbizottságként vagy tanácsadó bizottságként jár el, és lehetőség van fellebbviteli bizottság összehívására is. Tanácsadó eljárásban a Bizottság a vélemény figyelembevételével dönt; vizsgálóbizottsági eljárásban kedvező vélemény esetén elfogadja, elutasító vélemény esetén nem fogadhatja el a tervezetet.","hv":"4.2.4 (3858-3883. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/15","pont":5,"q":"Mutassa be röviden az intézményi döntéshozatalt az Európai Tanácsban, a Tanácsban, az Európai Parlamentben és az Európai Bizottságban!","ks":["intézményi döntéshozatal","európai tanács konszenzus","tanács minősített többség","kettős többség","55 százalék 65 százalék","európai parlament leadott szavazatok többsége","bizottság tagjainak többsége","szóbeli és írásbeli eljárás","egyhangúság","egyszerű többség","határozatképesség"],"mv":"Az Európai Tanácsban a Szerződések főszabályként a konszenzuson alapuló döntéshozatalt írják elő; ha szavazással dönt, az elnöke és a Bizottság elnöke nem szavaz, minősített többség esetén pedig a tanácsi szabályok érvényesülnek. A Tanács döntéshozatala főszabályként a minősített többségi (kettős többség) elve szerint történik: a tagok legalább 55%-ának szavazata szükséges, akik a népesség legalább 65%-át kiteszik (ha nem bizottsági javaslat alapján jár el, akkor 72%). A Tanács egyszerű többséget eljárási kérdésekben alkalmaz. Az Európai Parlament főszabályként a leadott szavazatok többségével határoz, akkor határozatképes, ha a képviselők egyharmada jelen van. Az Európai Bizottság szóbeli (ülésen, tagjainak többsége jelen van, többségi szavazat) vagy írásbeli eljárás útján dönt; az írásbeli eljárás során fenntartás hiányában a tervezet elfogadottnak tekintendő.","hv":"4.2.5 (3894-4017. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/16","pont":5,"q":"Ismertesse a közpénzügyek fenntarthatóságának és átláthatóságának fogalmait!","ks":["fenntarthatóság","átláthatóság","közpénzügyek","jövőbeli kötelezettségek","források finanszírozása","elszámoltathatóság","szabad információáramlás","tartalmi formai eljárási követelmény","jövő generációk","demográfiai feltételezések","hozzáférhető információ","tervek és szándékok összevetése"],"mv":"A közpénzügyi gazdálkodás akkor fenntartható, ha a belőlük fakadó jövőbeli kötelezettségeket a hozzájuk rendelt, várt jövőbeli források finanszírozni tudják. Az óvatos meghatározás szerint fenntartható az a rendszer vagy funkció, amely a fő szabályok változatlansága esetén, konzervatív demográfiai és gazdasági feltételezések mellett, váratlan sokkok hiányában előre láthatólag képes eredeti céljainak eleget tenni a jelenlegi szolgáltatási színvonalon, anélkül hogy más rendszerek átalakítását vagy az adóterhek növelését tenné szükségessé, illetve a jövő generációkat jobban korlátozná. Az átláthatóság részben tartalmi, részben formai, részben eljárási követelményeket támaszt, amelyek az elszámoltathatósághoz és a szabad információáramláshoz kapcsolódnak. Az átlátható működés azt jelenti, hogy minden gazdasági eseményről hozzáférhetővé válik minden olyan – teljes körű, releváns, összevethető és értelmezhető – információ, amely lehetővé teszi a jogszerűség, célszerűség és hatékonyság megítélését, valamint a megvalósult döntések összevetését a meghirdetett tervekkel.","hv":"5. fejezet bevezető (4027-4053. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/17","pont":5,"q":"Ismertesse az EU saját forrásait!","ks":["saját források","gni-alapú hozzájárulás","áfa-alapú forrás","importvámok","tradicionális saját források","tagállami hozzájárulások","szolidaritás és fizetőképesség","bírságok","egyéb bevételek","költségvetés legnagyobb forrása","harmadik országok hozzájárulása"],"mv":"Az EU bevételei a tagállami hozzájárulásokból, az importvámokból és a bírságokból állnak össze. A kiadásokat a következő saját forrásokból finanszírozzák: minden tagállam befizeti bruttó nemzeti jövedelmének egy meghatározott hányadát (általában 0,7% körüli részét) – ez a GNI-alapú hozzájárulás a költségvetés legnagyobb forrása, amely a szolidaritás és a fizetőképesség elvén alapul. A tagállamok az egységes hozzáadottérték-adóból befolyó bevételeik kis részével (kb. 0,3%) is támogatják a költségvetést (áfa-alapú forrás). A nem uniós termékekre kivetett importvámok (tradicionális saját források) nagyobb része szintén az EU-hoz kerül, kisebb részben a vámot beszedő tagállam részesül belőlük. Egyéb bevételként folyik be az uniós intézmények dolgozóinak jövedelemadója, a harmadik országok programokhoz fizetett hozzájárulása és az uniós szabályokat megsértő vállalatokra kiszabott bírság.","hv":"5.2 (4164-4198. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/18","pont":5,"q":"Ismertesse az uniós döntéshozatalra és a hatáskörök gyakorlására vonatkozó szubszidiaritás és arányosság elveit!","ks":["szubszidiaritás elve","arányosság elve","nem kizárólagos hatáskör","hatékonyabb uniós szinten","uniós fellépés indokoltsága","túlterjeszkedés tilalma","szükséges mérték","polgárokhoz legközelebbi szint","többszintű kormányzás","tagállami parlamentek ellenőrzése","sárga lapos eljárás"],"mv":"Az uniós hatáskörök gyakorlására a szubszidiaritás és az arányosság elve irányadó. A szubszidiaritás elve azt jelenti, hogy azokon a területeken, amelyek nem tartoznak az unió kizárólagos hatáskörébe, az unió csak akkor és annyiban jár el, amikor és amennyiben a tervezett intézkedés céljait a tagállamok sem központi, sem regionális vagy helyi szinten nem tudják kielégítően megvalósítani, és azok az intézkedés terjedelme vagy hatása miatt uniós szinten jobban megvalósíthatók. Az arányosság elvének megfelelően az unió intézkedése sem tartalmilag, sem formailag nem terjeszkedhet túl azon, ami a Szerződések célkitűzéseinek eléréséhez szükséges. Az uniós jogalkotási aktusok tervezeteit e két elv tekintetében külön indokolni és a nemzeti parlamenteknek megküldeni kell, amelyek indokolt véleményt küldhetnek a szubszidiaritás sérelméről; meghatározott arány esetén a tervezetet felül kell vizsgálni (sárga lapos eljárás).","hv":"4.2.1 (3614-3620. sor); 6.1 (4963-4981. sor)"},{"mod":"V. modul","modName":"V. modul – Az Európai Unió szervezete, működése és jogrendszere","file":"kerdessor_V_modul_2026.html","qid":"5/19","pont":5,"q":"Ismertesse röviden a gazdasági integráció fokozatait!","ks":["gazdasági integráció fokozatai","balassa béla","szabadkereskedelmi övezet","vámunió","közös piac","gazdasági és pénzügyi unió","politikai unió","négy szabadság","egységes valuta","közös vámhatár","preferenciális megállapodás"],"mv":"A gazdasági integráció szakaszolása Balassa Béla nevéhez fűződik, aki megkülönböztette a szabadkereskedelmi övezet, a vámunió, a
